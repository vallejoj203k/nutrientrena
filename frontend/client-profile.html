<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NutriEntrena — Perfil Cliente</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--purple:#5B2D8E;--purple-dark:#4A2475;--purple-light:#7C3AED;--purple-pale:#F3EEFF;--gray-bg:#F0F2F5;--sidebar-w:240px;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray-bg);display:flex;height:100vh;overflow:hidden;}

    /* Sidebar */
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--purple);display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
    .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.1);}
    .sidebar-logo span{font-size:20px;font-weight:900;color:#fff;letter-spacing:1px;font-style:italic;text-transform:uppercase;}
    .sidebar-logo span em{color:#C084FC;font-style:inherit;}
    .sidebar-logo small{display:block;color:rgba(255,255,255,.5);font-size:11px;margin-top:2px;}
    .sidebar-nav{flex:1;padding:16px 0;}
    .nav-section{padding:8px 20px 4px;font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:rgba(255,255,255,.75);cursor:pointer;font-size:14px;transition:all .15s;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
    .nav-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#C084FC;}
    .nav-item svg{opacity:.8;flex-shrink:0;}
    .sidebar-user{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);}
    .user-row{display:flex;align-items:center;gap:10px;}
    .user-avatar{width:36px;height:36px;border-radius:50%;background:#C084FC;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;flex-shrink:0;}
    .user-info{flex:1;min-width:0;}
    .user-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .user-role{font-size:11px;color:rgba(255,255,255,.5);}
    .logout-btn{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:4px;border-radius:4px;display:flex;}
    .logout-btn:hover{color:#fff;background:rgba(255,255,255,.1);}

    /* Main */
    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    .topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:64px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .back-btn{background:none;border:none;cursor:pointer;color:#6B7280;display:flex;align-items:center;gap:6px;font-size:13px;padding:6px 10px;border-radius:8px;transition:.15s;}
    .back-btn:hover{background:#F3F4F6;color:#111;}
    .topbar h1{font-size:18px;font-weight:700;color:#111;flex:1;}
    .btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;display:flex;align-items:center;gap:6px;}
    .btn-primary{background:var(--purple);color:#fff;}
    .btn-primary:hover{background:var(--purple-dark);}
    .btn-ghost{background:#F3F4F6;color:#374151;}
    .btn-ghost:hover{background:#E5E7EB;}
    .btn-sm{padding:6px 12px;font-size:12px;}

    /* Content */
    .content{flex:1;overflow-y:auto;padding:24px;}
    .content::-webkit-scrollbar{width:6px;}
    .content::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px;}

    /* Profile header */
    .profile-header{background:#fff;border-radius:16px;padding:24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0;}
    .profile-info{flex:1;}
    .profile-name{font-size:22px;font-weight:800;color:#111;margin-bottom:4px;}
    .profile-email{font-size:14px;color:#6B7280;margin-bottom:8px;}
    .profile-badges{display:flex;gap:8px;flex-wrap:wrap;}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;}
    .badge-status{background:var(--purple-pale);color:var(--purple);}
    .badge-coach{background:#EFF6FF;color:#1D4ED8;}
    .badge-weeks{background:#FFF7ED;color:#C2410C;}
    .profile-actions{display:flex;gap:10px;flex-wrap:wrap;}

    /* Grid */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
    @media(max-width:900px){.grid-2{grid-template-columns:1fr;}.grid-3{grid-template-columns:1fr 1fr;}}

    /* Card */
    .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .card-title{font-size:13px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
    .card-title a{font-size:12px;color:var(--purple);text-transform:none;letter-spacing:0;font-weight:600;text-decoration:none;}
    .card-title a:hover{text-decoration:underline;}

    /* Stat cards */
    .stat-card{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:14px;}
    .stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .stat-val{font-size:22px;font-weight:800;color:#111;line-height:1;}
    .stat-label{font-size:12px;color:#6B7280;margin-top:3px;}

    /* Info grid */
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .info-item label{font-size:11px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;}
    .info-item span{font-size:14px;color:#111;font-weight:500;}

    /* Checkin list */
    .checkin-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F3F4F6;}
    .checkin-row:last-child{border-bottom:none;}
    .checkin-date{font-size:13px;font-weight:600;color:#374151;}
    .checkin-weight{font-size:15px;font-weight:800;color:#111;}
    .checkin-delta{font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;}
    .delta-down{background:#ECFDF5;color:#059669;}
    .delta-up{background:#FEF2F2;color:#DC2626;}
    .delta-zero{background:#F3F4F6;color:#6B7280;}
    .checkin-note{font-size:12px;color:#9CA3AF;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* Weight chart */
    .chart-wrap{width:100%;height:120px;position:relative;margin-top:8px;}
    svg.chart{width:100%;height:100%;}

    /* Form response */
    .form-answer{padding:10px 0;border-bottom:1px solid #F3F4F6;}
    .form-answer:last-child{border-bottom:none;}
    .fa-question{font-size:12px;color:#9CA3AF;margin-bottom:3px;}
    .fa-answer{font-size:14px;color:#111;font-weight:500;}

    /* Skeleton */
    .skeleton{background:linear-gradient(90deg,#E5E7EB 25%,#F3F4F6 50%,#E5E7EB 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;background:#1F2937;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:.3s;z-index:200;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{background:#059669;}
    .toast.error{background:#DC2626;}

    /* Deliver modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:#fff;border-radius:16px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);transform:translateY(20px);transition:.2s;}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-head{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F3F4F6;}
    .modal-head h2{font-size:16px;font-weight:700;color:#111;}
    .modal-close{background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:22px;line-height:1;padding:2px 6px;}
    .modal-close:hover{color:#374151;}
    .modal-body{padding:20px 24px;}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:14px;outline:none;transition:.15s;color:#111;font-family:inherit;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--purple);}
    .form-group textarea{resize:vertical;min-height:80px;}
    .modal-footer{padding:16px 24px;border-top:1px solid #F3F4F6;display:flex;justify-content:flex-end;gap:10px;}
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span>Nutri<em>Entrena</em></span>
    <small>Panel de gestión</small>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Principal</div>
    <a class="nav-item" href="dashboard.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a class="nav-item" href="kanban.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="5" height="18"/><rect x="10" y="3" width="5" height="12"/><rect x="17" y="3" width="5" height="15"/></svg>
      Kanban Clientes
    </a>
    <div class="nav-section">Gestión</div>
    <a class="nav-item active" href="clients.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clientes
    </a>
    <a class="nav-item" href="checkins.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Check-ins
    </a>
    <a class="nav-item" href="#">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Formularios
    </a>
    <a class="nav-item" href="#">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h18v18H3zM3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
      Nutrición
    </a>
    <a class="nav-item" href="#">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Rutinas
    </a>
  </nav>
  <div class="sidebar-user">
    <div class="user-row">
      <div class="user-avatar" id="sidebarAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebarName">Cargando…</div>
        <div class="user-role" id="sidebarRole">—</div>
      </div>
      <button class="logout-btn" onclick="logout()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Volver
    </button>
    <h1 id="pageTitle">Perfil del cliente</h1>
    <button class="btn btn-ghost btn-sm" onclick="openDeliverModal()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Entregar plan
    </button>
  </div>

  <div class="content" id="content">
    <!-- skeleton while loading -->
    <div class="profile-header">
      <div class="skeleton" style="width:72px;height:72px;border-radius:50%;flex-shrink:0;"></div>
      <div style="flex:1;">
        <div class="skeleton" style="width:200px;height:22px;margin-bottom:8px;"></div>
        <div class="skeleton" style="width:160px;height:14px;margin-bottom:10px;"></div>
        <div style="display:flex;gap:8px;">
          <div class="skeleton" style="width:90px;height:26px;border-radius:20px;"></div>
          <div class="skeleton" style="width:110px;height:26px;border-radius:20px;"></div>
        </div>
      </div>
    </div>
    <div class="grid-3">
      <div class="skeleton" style="height:80px;border-radius:12px;"></div>
      <div class="skeleton" style="height:80px;border-radius:12px;"></div>
      <div class="skeleton" style="height:80px;border-radius:12px;"></div>
    </div>
  </div>
</div>

<!-- Deliver Plan Modal -->
<div class="modal-overlay" id="deliverOverlay" onclick="if(event.target===this)closeDeliverModal()">
  <div class="modal">
    <div class="modal-head">
      <h2>Entregar plan al cliente</h2>
      <button class="modal-close" onclick="closeDeliverModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Dieta (opcional)</label>
        <select id="deliverDiet"><option value="">— Sin dieta —</option></select>
      </div>
      <div class="form-group">
        <label>Rutina (opcional)</label>
        <select id="deliverRoutine"><option value="">— Sin rutina —</option></select>
      </div>
      <div class="form-group">
        <label>Mensaje del coach</label>
        <textarea id="deliverMsg" placeholder="Escribe un mensaje personalizado para el cliente…"></textarea>
      </div>
      <div id="deliverError" style="color:#DC2626;font-size:13px;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDeliverModal()">Cancelar</button>
      <button class="btn btn-primary" id="deliverBtn" onclick="deliverPlan()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Enviar por email
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://nutrientrena-production.up.railway.app/api';
let token = localStorage.getItem('token');
if (!token) location.href = 'login.html';

const params = new URLSearchParams(location.search);
const clientId = params.get('id');
if (!clientId) location.href = 'clients.html';

let clientData = null;

// ── Auth ─────────────────────────────────────────────────────────────────────
async function loadUser() {
  try {
    const r = await fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${token}` }});
    if (r.status === 401) { logout(); return; }
    const j = await r.json();
    const u = j.data || j;
    const name = u.name || u.full_name || 'Usuario';
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('sidebarRole').textContent = u.role?.name || u.role || '—';
    document.getElementById('sidebarAvatar').textContent = name.charAt(0).toUpperCase();
  } catch {}
}

function logout() {
  localStorage.clear();
  location.href = 'login.html';
}

// ── Load client ───────────────────────────────────────────────────────────────
async function loadClient() {
  try {
    const [profileRes, checkinsRes, formRes] = await Promise.all([
      fetch(`${API}/users/${clientId}/edit`, { headers: { Authorization: `Bearer ${token}` }}),
      fetch(`${API}/checkins/client/${clientId}`, { headers: { Authorization: `Bearer ${token}` }}),
      fetch(`${API}/form-assignments/client/${clientId}`, { headers: { Authorization: `Bearer ${token}` }}),
    ]);

    const profileJ = await profileRes.json();
    clientData = profileJ.data || profileJ;

    let checkins = [];
    if (checkinsRes.ok) {
      const cj = await checkinsRes.json();
      checkins = cj.data || cj || [];
      if (!Array.isArray(checkins)) checkins = [];
    }

    let formAssignment = null;
    let formResponses = [];
    if (formRes.ok) {
      const fj = await formRes.json();
      formAssignment = fj.data || fj;
      if (formAssignment?.id) {
        const respRes = await fetch(`${API}/form-assignments/${formAssignment.id}/responses`, { headers: { Authorization: `Bearer ${token}` }});
        if (respRes.ok) {
          const rj = await respRes.json();
          formResponses = rj.data || rj || [];
          if (!Array.isArray(formResponses)) formResponses = [];
        }
      }
    }

    renderProfile(clientData, checkins, formResponses, formAssignment);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div style="text-align:center;padding:60px;color:#9CA3AF;">Error al cargar el perfil del cliente.</div>`;
  }
}

function renderProfile(c, checkins, formResponses, formAssignment) {
  const name = `${c.first_name || ''} ${c.last_name || ''}`.trim() || 'Sin nombre';
  const initials = name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('pageTitle').textContent = name;

  const statusName = c.status_name || c.status?.description || '—';
  const coachName  = c.coach_name || '—';

  // Checkin summary
  const totalCheckins = checkins.length;
  const firstWeight = totalCheckins > 0 ? checkins[checkins.length - 1].weight : null;
  const lastWeight  = totalCheckins > 0 ? checkins[0].weight : null;
  const weightDelta = (firstWeight && lastWeight) ? (lastWeight - firstWeight) : null;

  document.getElementById('content').innerHTML = `
    <!-- Profile header -->
    <div class="profile-header">
      <div class="profile-avatar">${initials}</div>
      <div class="profile-info">
        <div class="profile-name">${esc(name)}</div>
        <div class="profile-email">${esc(c.email || '—')}</div>
        <div class="profile-badges">
          <span class="badge badge-status">${esc(statusName)}</span>
          ${coachName !== '—' ? `<span class="badge badge-coach">Coach: ${esc(coachName)}</span>` : ''}
          ${c.training_weeks ? `<span class="badge badge-weeks">${c.training_weeks} semanas</span>` : ''}
        </div>
      </div>
      <div class="profile-actions">
        <button class="btn btn-ghost btn-sm" onclick="openDeliverModal()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Entregar plan
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid-3">
      <div class="stat-card">
        <div class="stat-icon" style="background:#F3EEFF;">
          <svg width="20" height="20" fill="none" stroke="#5B2D8E" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div>
          <div class="stat-val">${totalCheckins}</div>
          <div class="stat-label">Check-ins realizados</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:${weightDelta === null ? '#F3F4F6' : weightDelta <= 0 ? '#ECFDF5' : '#FEF2F2'};">
          <svg width="20" height="20" fill="none" stroke="${weightDelta === null ? '#9CA3AF' : weightDelta <= 0 ? '#059669' : '#DC2626'}" stroke-width="2" viewBox="0 0 24 24"><polyline points="${weightDelta !== null && weightDelta <= 0 ? '23 6 13.5 15.5 8.5 10.5 1 18' : '1 6 10.5 15.5 15.5 10.5 23 18'}"/></svg>
        </div>
        <div>
          <div class="stat-val" style="color:${weightDelta === null ? '#9CA3AF' : weightDelta <= 0 ? '#059669' : '#DC2626'};">
            ${weightDelta === null ? '—' : (weightDelta > 0 ? '+' : '') + weightDelta.toFixed(1) + ' kg'}
          </div>
          <div class="stat-label">Cambio de peso total</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#FFF7ED;">
          <svg width="20" height="20" fill="none" stroke="#C2410C" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div>
          <div class="stat-val">${formAssignment ? (formAssignment.submitted_at ? '✓' : 'Pendiente') : '—'}</div>
          <div class="stat-label">Formulario intake</div>
        </div>
      </div>
    </div>

    <!-- Details + Checkins -->
    <div class="grid-2">
      <!-- Info personal -->
      <div class="card">
        <div class="card-title">Información personal</div>
        <div class="info-grid">
          <div class="info-item"><label>Nombre completo</label><span>${esc(name)}</span></div>
          <div class="info-item"><label>Email</label><span>${esc(c.email || '—')}</span></div>
          <div class="info-item"><label>Teléfono</label><span>${esc(c.phone || '—')}</span></div>
          <div class="info-item"><label>Género</label><span>${esc(c.gender || '—')}</span></div>
          <div class="info-item"><label>Peso actual</label><span>${c.weight ? c.weight + ' kg' : '—'}</span></div>
          <div class="info-item"><label>Altura</label><span>${c.height ? c.height + ' cm' : '—'}</span></div>
          <div class="info-item"><label>Objetivo</label><span>${esc(c.goal || '—')}</span></div>
          <div class="info-item"><label>Nivel actividad</label><span>${esc(c.activity_level || '—')}</span></div>
        </div>
      </div>

      <!-- Checkins -->
      <div class="card">
        <div class="card-title">
          Últimos check-ins
          <a href="checkins.html?client=${clientId}">Ver todos →</a>
        </div>
        ${totalCheckins === 0
          ? `<div style="text-align:center;padding:20px;color:#9CA3AF;font-size:13px;">Sin check-ins registrados</div>`
          : `
            ${renderMiniChart(checkins)}
            ${checkins.slice(0, 5).map((ck, i) => {
              const d = new Date(ck.checkin_date || ck.created_at).toLocaleDateString('es-CO',{day:'2-digit',month:'short'});
              const delta = ck.weight_progress;
              return `
                <div class="checkin-row">
                  <div>
                    <div class="checkin-date">${d}</div>
                    ${ck.notes ? `<div class="checkin-note">${esc(ck.notes)}</div>` : ''}
                  </div>
                  <div style="display:flex;align-items:center;gap:8px;">
                    ${delta !== null && delta !== undefined
                      ? `<span class="checkin-delta ${delta < 0 ? 'delta-down' : delta > 0 ? 'delta-up' : 'delta-zero'}">${delta > 0 ? '+' : ''}${Number(delta).toFixed(1)} kg</span>`
                      : ''}
                    <div class="checkin-weight">${ck.weight ? ck.weight + ' kg' : '—'}</div>
                  </div>
                </div>
              `;
            }).join('')}
          `
        }
      </div>
    </div>

    <!-- Form responses -->
    ${formResponses.length > 0 ? `
    <div class="card">
      <div class="card-title">Respuestas del formulario de intake</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:0;">
        ${formResponses.map(r => `
          <div class="form-answer">
            <div class="fa-question">${esc(r.field_label || r.question || r.field_name || '—')}</div>
            <div class="fa-answer">${esc(r.value || r.answer || '—')}</div>
          </div>
        `).join('')}
      </div>
    </div>
    ` : ''}
  `;
}

function renderMiniChart(checkins) {
  if (checkins.length < 2) return '';
  const weights = checkins.map(c => c.weight).filter(w => w != null).reverse();
  if (weights.length < 2) return '';
  const min = Math.min(...weights);
  const max = Math.max(...weights);
  const range = max - min || 1;
  const w = 100, h = 50;
  const pts = weights.map((v, i) => {
    const x = (i / (weights.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 8) - 4;
    return `${x},${y}`;
  }).join(' ');

  return `
    <div class="chart-wrap" style="margin-bottom:12px;">
      <svg class="chart" viewBox="0 0 100 50" preserveAspectRatio="none">
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5B2D8E" stop-opacity=".15"/>
            <stop offset="100%" stop-color="#5B2D8E" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <polygon points="${pts} ${(weights.length-1)*w/(weights.length-1)},${h} 0,${h}" fill="url(#cg)"/>
        <polyline points="${pts}" fill="none" stroke="#5B2D8E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  `;
}

// ── Deliver plan ──────────────────────────────────────────────────────────────
async function openDeliverModal() {
  document.getElementById('deliverError').textContent = '';
  document.getElementById('deliverMsg').value = '';

  // Load diets and routines
  try {
    const [dietRes, routineRes] = await Promise.all([
      fetch(`${API}/diets`, { headers: { Authorization: `Bearer ${token}` }}),
      fetch(`${API}/routines`, { headers: { Authorization: `Bearer ${token}` }}),
    ]);
    if (dietRes.ok) {
      const dj = await dietRes.json();
      const diets = dj.data || dj || [];
      const sel = document.getElementById('deliverDiet');
      sel.innerHTML = '<option value="">— Sin dieta —</option>';
      (Array.isArray(diets) ? diets : []).forEach(d => {
        sel.innerHTML += `<option value="${d.id}">${esc(d.name || d.title || d.id)}</option>`;
      });
    }
    if (routineRes.ok) {
      const rj = await routineRes.json();
      const routines = rj.data || rj || [];
      const sel = document.getElementById('deliverRoutine');
      sel.innerHTML = '<option value="">— Sin rutina —</option>';
      (Array.isArray(routines) ? routines : []).forEach(r => {
        sel.innerHTML += `<option value="${r.id}">${esc(r.name || r.title || r.id)}</option>`;
      });
    }
  } catch {}

  document.getElementById('deliverOverlay').classList.add('open');
}

function closeDeliverModal() {
  document.getElementById('deliverOverlay').classList.remove('open');
}

async function deliverPlan() {
  const dietId    = document.getElementById('deliverDiet').value;
  const routineId = document.getElementById('deliverRoutine').value;
  const message   = document.getElementById('deliverMsg').value.trim();
  const btn       = document.getElementById('deliverBtn');

  document.getElementById('deliverError').textContent = '';
  btn.textContent = 'Enviando…';
  btn.disabled = true;

  try {
    const body = { client_user_detail_id: clientId };
    if (dietId)    body.diet_id    = dietId;
    if (routineId) body.routine_id = parseInt(routineId);
    if (message)   body.message    = message;

    const r = await fetch(`${API}/plans/deliver`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify(body),
    });
    const j = await r.json();
    if (!r.ok) {
      document.getElementById('deliverError').textContent = j.detail || j.message || 'Error al enviar';
      return;
    }

    const d = j.data || j;
    closeDeliverModal();
    toast(d.email_sent ? `Plan enviado a ${d.client_email}` : 'Plan procesado (email no enviado)', d.email_sent ? 'success' : '');
    loadClient();
  } catch {
    document.getElementById('deliverError').textContent = 'Error de conexión';
  } finally {
    btn.innerHTML = '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Enviar por email';
    btn.disabled = false;
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type || ''}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'toast'; }, 4000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadUser();
loadClient();
</script>
