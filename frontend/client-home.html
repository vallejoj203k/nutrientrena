<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <title>NutriEntrena — Mi espacio</title>
  <!-- Guard: esta zona es solo del cliente (rol 6). -->
  <script>
    (function(){
      var t = localStorage.getItem('token');
      var r = localStorage.getItem('role_id') || '';
      if (!t) { location.replace('login.html'); return; }
      if (r && r !== '6') { location.replace('dashboard.html'); }
    })();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--indigo:#4F46E5;--indigo-dark:#4338CA;--indigo-pale:#EEF2FF;--green:#059669;--amber:#F59E0B;--gray-bg:#F8FAFC;--sidebar-w:240px;}
    body{font-family:'Space Grotesk','Segoe UI',system-ui,sans-serif;background:var(--gray-bg);display:flex;height:100vh;overflow:hidden;}
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
    .sidebar-logo{display:flex;align-items:center;gap:11px;padding:18px 18px 16px;border-bottom:1px solid #EBEBEB;}
    .sl-mark{width:40px;height:40px;border-radius:9px;background:url('logo.webp') no-repeat 50% 41%;background-size:210px;flex-shrink:0;}
    .sl-txt{display:flex;flex-direction:column;line-height:1.15;}
    .sl-txt b{font-size:17px;font-weight:800;letter-spacing:.3px;}
    .sl-txt b .n1{color:var(--indigo);}.sl-txt b .n2{color:var(--green);}
    .sl-txt small{color:#6B7280;font-size:11px;margin-top:2px;}
    .sidebar-nav{flex:1;padding:12px 0;}
    .nav-section{padding:12px 20px 4px;font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#374151;cursor:pointer;font-size:14px;transition:all .15s;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:#F8FAFC;color:var(--indigo);}
    .nav-item.active{background:#EEF2FF;color:var(--indigo);border-left-color:var(--indigo);font-weight:600;}
    .nav-item svg{flex-shrink:0;opacity:.75;}
    .nav-item.active svg,.nav-item:hover svg{opacity:1;}
    .nav-item.disabled{opacity:.6;cursor:default;}
    .nav-item.disabled:hover{background:none;color:#374151;}
    .nav-soon-tag{margin-left:auto;font-size:9px;font-weight:700;color:#9CA3AF;background:#F3F4F6;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;}
    .sidebar-user{padding:14px 20px;border-top:1px solid #F3F4F6;display:flex;align-items:center;gap:10px;}
    .s-avatar{width:34px;height:34px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0;overflow:hidden;}
    .s-avatar img{width:100%;height:100%;object-fit:cover;}
    .user-info{flex:1;min-width:0;}
    .user-name{color:#111827;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .user-role{color:#6B7280;font-size:11px;}
    .logout-btn{background:none;border:none;color:#9CA3AF;cursor:pointer;padding:4px;border-radius:4px;display:flex;}
    .logout-btn:hover{color:#EF4444;}

    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    .topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 28px;height:64px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
    .menu-btn{display:none;background:none;border:none;cursor:pointer;color:#374151;padding:6px;border-radius:8px;}
    .menu-btn:hover{background:#F3F4F6;}
    .topbar-title{font-size:17px;font-weight:800;color:#111827;flex:1;}
    .bell{position:relative;width:38px;height:38px;border-radius:50%;border:1px solid #E5E7EB;background:#fff;display:flex;align-items:center;justify-content:center;color:#374151;cursor:pointer;}
    .bell .dot{position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;background:#DC2626;border:2px solid #fff;display:none;}
    .bell.has-unread .dot{display:block;}

    .content{flex:1;overflow-y:auto;padding:26px 28px 40px;}
    .content-inner{max-width:1000px;margin:0 auto;}
    .hero{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;}
    .hero .hi{font-size:14px;color:#6B7280;}
    .hero .name{font-size:26px;font-weight:800;color:#111827;margin-top:2px;}
    .hero-av{width:48px;height:48px;border-radius:50%;background:var(--indigo);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0;overflow:hidden;}
    .hero-av img{width:100%;height:100%;object-fit:cover;}

    .card{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:20px;box-shadow:0 1px 2px rgba(16,24,40,.04);}

    /* Semana */
    .wk-card{background:#fff;border:1px solid #E5E7EB;border-radius:18px;padding:18px 16px;margin-bottom:16px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
    .wk-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .wk-nav{width:34px;height:34px;border-radius:50%;border:none;background:#F3F4F6;color:#6B7280;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
    .wk-nav:hover{background:#E5E7EB;color:#111827;}
    .wk-title{text-align:center;}
    .wk-title b{font-size:15px;font-weight:800;color:#111827;}
    .wk-title span{display:block;font-size:12px;color:#9CA3AF;margin-top:1px;}
    .wk-days{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
    .wk-day{text-align:center;}
    .wk-dl{font-size:11px;font-weight:700;color:#9CA3AF;margin-bottom:6px;}
    .wk-day.today .wk-dl{color:var(--indigo);}
    .wk-circle{width:40px;height:40px;margin:0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#6B7280;background:#F3F4F6;position:relative;}
    .wk-circle.done{background:var(--green);color:#fff;}
    .wk-circle.today{background:var(--indigo);color:#fff;}
    .wk-circle.future{background:#F9FAFB;color:#C4C7CF;}
    .wk-circle .b{position:absolute;top:-4px;right:-4px;width:17px;height:17px;border-radius:50%;background:var(--amber);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
    .wk-emoji{font-size:12px;margin-top:5px;height:15px;color:#D1D5DB;}

    /* Sección de hoy */
    .today-sec{background:#fff;border:1px solid #E5E7EB;border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
    .today-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .today-head .t{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:#6B7280;text-transform:uppercase;letter-spacing:.4px;}
    .today-pill{font-size:11px;font-weight:800;color:var(--green);background:#D1FAE5;padding:3px 10px;border-radius:20px;}

    .ci-card{background:#FFF7ED;border:1px solid #FCE3BE;border-radius:14px;padding:15px;margin-bottom:12px;}
    .ci-card.done{background:#ECFDF3;border-color:#C6F0D8;}
    .ci-top{display:flex;gap:12px;}
    .ci-ico{width:46px;height:46px;border-radius:12px;background:var(--amber);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .ci-card.done .ci-ico{background:var(--green);}
    .ci-h{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .ci-h b{font-size:15px;font-weight:800;color:#111827;}
    .ci-tag{font-size:10px;font-weight:800;color:#B45309;background:#FDE68A;padding:2px 8px;border-radius:20px;text-transform:uppercase;}
    .ci-card.done .ci-tag{color:#047857;background:#A7F3D0;}
    .ci-txt{font-size:13px;color:#6B7280;margin-top:4px;line-height:1.5;}
    .ci-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .ci-chip{font-size:11.5px;font-weight:600;color:#6B7280;background:#fff;border:1px solid #E5E7EB;padding:4px 10px;border-radius:20px;}
    .ci-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;flex-wrap:wrap;}
    .ci-coach{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#6B7280;}
    .ci-coach .av{width:26px;height:26px;border-radius:50%;background:var(--indigo);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .ci-btn{background:var(--amber);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;text-decoration:none;display:inline-block;}
    .ci-btn:hover{background:#D97706;}

    .hr-row{display:flex;align-items:center;gap:12px;border-radius:14px;padding:14px;margin-bottom:12px;}
    .hr-row.train{background:#F5F3FF;border:1px solid #E7E3FB;}
    .hr-row.menu{background:#ECFDF3;border:1px solid #C6F0D8;text-decoration:none;}
    .hr-row.rest{background:#F9FAFB;border:1px solid #EEF0F3;}
    .hr-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;}
    .hr-row.train .hr-ico{background:var(--indigo);}
    .hr-row.menu .hr-ico{background:var(--green);}
    .hr-row.rest .hr-ico{background:#D1D5DB;}
    .hr-info{flex:1;min-width:0;}
    .hr-info b{font-size:15px;font-weight:800;color:#111827;}
    .hr-info div{font-size:12.5px;color:#6B7280;margin-top:2px;}
    .hr-btn{background:var(--indigo);color:#fff;border:none;border-radius:10px;padding:10px 15px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;text-decoration:none;}
    .hr-btn:hover{background:var(--indigo-dark);}
    .hr-arrow{color:#9CA3AF;flex-shrink:0;}

    /* Racha */
    .streak{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:16px 18px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
    .streak b{font-size:15px;font-weight:800;color:#111827;}
    .streak span{display:block;font-size:12.5px;color:#9CA3AF;margin-top:2px;}
    .streak .val{display:flex;align-items:center;gap:7px;font-size:22px;font-weight:800;color:var(--amber);}
    .streak .val small{font-size:12px;color:#9CA3AF;font-weight:600;}

    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;}
    .sidebar-overlay.open{display:block;}
    @media(max-width:768px){
      body{overflow:auto;}
      .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);transition:transform .25s;z-index:200;}
      .sidebar.open{transform:translateX(0);}
      .menu-btn{display:flex;align-items:center;justify-content:center;}
      .content{padding:18px 14px 40px;}
      .hero .name{font-size:23px;}
    }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sl-mark" role="img" aria-label="NutriEntrena"></div>
    <div class="sl-txt"><b><span class="n1">NUTRI</span><span class="n2">ENTRENA</span></b><small>Mi espacio</small></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Principal</div>
    <a class="nav-item active" href="client-home.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/></svg>
      Inicio
    </a>
    <div class="nav-section">Mi plan</div>
    <a class="nav-item" href="client-entrena.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6.5 6.5 17.5 17.5M4 12l-1.5 1.5a2.12 2.12 0 0 0 3 3L7 18M17 6l1-1a2.12 2.12 0 0 1 3 3l-1 1"/><path d="m8 8 8 8"/></svg>
      Entrena
    </a>
    <a class="nav-item" href="client-nutricion.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4Z"/><path d="M6 2v2M10 2v2M14 2v2"/></svg>
      Nutrición
    </a>
    <div class="nav-section">Seguimiento</div>
    <a class="nav-item" href="client-progreso.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></svg>
      Progreso
    </a>
    <div class="nav-section">Comunicación</div>
    <a class="nav-item" href="client-chat.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Chat
    </a>
      <div class="nav-section">Cuenta</div>
    <a class="nav-item" href="client-perfil.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Perfil</a>
</nav>
  <div class="sidebar-user">
    <div class="s-avatar" id="sidebarAvatar">C</div>
    <div class="user-info">
      <div class="user-name" id="sidebarName">Cargando…</div>
      <div class="user-role">Cliente</div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Cerrar sesión">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menú">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-title">Inicio</div>
    <button class="bell" id="bell" title="Notificaciones">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="dot"></span>
    </button>
  </div>

  <div class="content">
    <div class="content-inner" style="max-width:560px;">
      <div class="hero">
        <div>
          <div class="hi" id="greet">Hola 👋</div>
          <div class="name" id="clientName">…</div>
        </div>
        <div class="hero-av" id="heroAvatar">C</div>
      </div>
      <div id="homeBody">
        <div class="card" style="text-align:center;color:#9CA3AF;padding:38px;">Cargando tu espacio…</div>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'https://nutrientrena-production.up.railway.app/api';
  const token = localStorage.getItem('token');

  function logout(){ localStorage.removeItem('token'); localStorage.removeItem('role_id'); localStorage.removeItem('refresh_token'); location.href = 'login.html'; }
  function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
  function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }

  const H = () => ({ Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' });
  function esc(s){ if(s==null)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function greetByHour(){
    const h = new Date().getHours();
    if (h < 6)  return 'Buenas noches 🌙';
    if (h < 12) return 'Buenos días 👋';
    if (h < 20) return 'Buenas tardes 👋';
    return 'Buenas noches 🌙';
  }

  let _weekOffset = 0;

  const IC = {
    check: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
    dumbbell: '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6.5 6.5 17.5 17.5M4 12l-1.5 1.5a2.12 2.12 0 0 0 3 3L7 18M17 6l1-1a2.12 2.12 0 0 1 3 3l-1 1"/><path d="m8 8 8 8"/></svg>',
    scale: '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 21h18"/><path d="M12 3v18"/><path d="M7 7h10l3 8a5 5 0 0 1-10 0"/><path d="M7 7 4 15a5 5 0 0 0 10 0"/></svg>',
    fork: '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 2v7c0 1.1.9 2 2 2h1v11M8 2v20M13 2v20M18 2c-1.5 0-3 1.5-3 4v6h3z"/></svg>',
    play: '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>',
    moon: '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>',
  };

  function renderWeek(w){
    var days = (w && w.days) || [];
    return '<div class="wk-card">'
      + '<div class="wk-head">'
      +   '<button class="wk-nav" onclick="shiftWeek(-1)"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>'
      +   '<div class="wk-title"><b>' + (_weekOffset===0?'Esta semana':(_weekOffset<0?'Semana anterior':'Próxima semana')) + '</b><span>' + esc(w.range||'') + '</span></div>'
      +   '<button class="wk-nav" onclick="shiftWeek(1)"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>'
      + '</div>'
      + '<div class="wk-days">' + days.map(function(d){
          var cls = 'wk-circle' + (d.is_today?' today':(d.done?' done':(d.is_future?' future':'')));
          var inner = (d.done || d.is_today && d.done) ? IC.check : d.day;
          if (d.is_today && !d.done) inner = d.day;
          var badge = d.is_today ? '<span class="b">'+IC.dumbbell.replace('width="20" height="20"','width="10" height="10"')+'</span>' : '';
          var emoji = d.done ? '💪' : '·';
          return '<div class="wk-day'+(d.is_today?' today':'')+'"><div class="wk-dl">'+esc(d.label)+'</div>'
            + '<div class="'+cls+'">'+inner+badge+'</div>'
            + '<div class="wk-emoji">'+emoji+'</div></div>';
        }).join('')
      + '</div></div>';
  }

  function renderCheckin(ci){
    if (!ci) return '';
    var done = ci.status === 'done';
    var chips = (ci.requested_fields||[]).map(function(f){
      var lbl = {peso:'⚖️ Peso', fotos:'📷 Fotos', medidas:'📏 Medidas'}[f] || f;
      return '<span class="ci-chip">'+lbl+'</span>';
    }).join('');
    var coach = ci.coach_name
      ? '<div class="ci-coach"><span class="av">'+esc(ci.coach_initials||(ci.coach_name[0]||'C'))+'</span>'+esc((ci.coach_name.split(' ')[0])||'Tu coach')+' · tu coach</div>'
      : '<div class="ci-coach">Tu coach espera tu reporte</div>';
    if (done){
      return '<div class="ci-card done"><div class="ci-top"><div class="ci-ico">'+IC.check.replace('width="18" height="18"','width="22" height="22"')+'</div>'
        + '<div style="flex:1;"><div class="ci-h"><b>Check-in semanal</b><span class="ci-tag">Hecho</span></div>'
        + '<div class="ci-txt">Ya enviaste tu check-in de esta semana. ¡Bien hecho!</div></div></div>'
        + '<div class="ci-foot">'+coach+'<a class="ci-btn" style="background:var(--green);" href="client-progreso.html">Ver progreso →</a></div></div>';
    }
    return '<div class="ci-card"><div class="ci-top"><div class="ci-ico">'+IC.scale+'</div>'
      + '<div style="flex:1;"><div class="ci-h"><b>Check-in semanal</b><span class="ci-tag">Pendiente</span></div>'
      + '<div class="ci-txt">Tu coach espera tu reporte. Comparte lo que puedas: peso, fotos, medidas o un comentario.</div>'
      + '<div class="ci-chips">'+chips+'</div></div></div>'
      + '<div class="ci-foot">'+coach+'<a class="ci-btn" href="client-progreso.html">Hacer check-in →</a></div></div>';
  }

  function renderRoutine(rt){
    if (!rt) return '';
    if (rt.is_rest){
      return '<div class="hr-row rest"><div class="hr-ico">'+IC.moon+'</div>'
        + '<div class="hr-info"><b>Día de descanso</b><div>Hoy no tienes entrenamiento. Recupera bien.</div></div></div>';
    }
    var sub = [rt.focus, rt.duration_min ? (rt.duration_min+' min') : null].filter(Boolean).join(' · ');
    return '<div class="hr-row train"><div class="hr-ico">'+IC.dumbbell+'</div>'
      + '<div class="hr-info"><b>'+esc(rt.name||'Entrenamiento')+'</b><div>'+esc(sub||'Entrenamiento de hoy')+'</div></div>'
      + '<a class="hr-btn" href="client-entrena.html">'+IC.play+' Empezar</a></div>';
  }

  function renderMenu(mn){
    if (!mn) return '';
    var sub = [mn.kcal ? (mn.kcal+' kcal') : null, (mn.meals_count!=null?mn.meals_count+' comida'+(mn.meals_count!==1?'s':''):null)].filter(Boolean).join(' · ');
    return '<a class="hr-row menu" href="client-nutricion.html"><div class="hr-ico">'+IC.fork+'</div>'
      + '<div class="hr-info"><b>Menú · '+esc(mn.weekday||'Hoy')+'</b><div>'+esc(sub||'Tu plan de hoy')+'</div></div>'
      + '<span class="hr-arrow"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span></a>';
  }

  function render(data){
    var t = data.today || {};
    var pin = '📌 ' + ((t.weekday||'').toUpperCase()) + ' ' + (t.day||'') + ' ' + ((t.month||'').toUpperCase());
    var streak = data.streak || 0;
    var html = renderWeek(data.week || {});
    html += '<div class="today-sec"><div class="today-head"><div class="t">'+esc(pin)+'</div><span class="today-pill">Hoy</span></div>'
      + renderCheckin(data.checkin)
      + renderRoutine(data.routine)
      + renderMenu(data.menu)
      + '</div>';
    html += '<div class="streak"><div><b>Tu racha</b><span>Sigue así, cada día cuenta</span></div>'
      + '<div class="val">🔥 '+streak+' <small>día'+(streak!==1?'s':'')+'</small></div></div>';
    document.getElementById('homeBody').innerHTML = html;
    // Campana
    var bell = document.getElementById('bell');
    if (bell) bell.classList.toggle('has-unread', (data.notifications_unread||0) > 0);
  }

  function applyProfile(p){
    if (!p) return;
    var name = p.name || 'Cliente';
    document.getElementById('clientName').textContent = name;
    document.getElementById('sidebarName').textContent = name;
    var av = document.getElementById('heroAvatar'), sav = document.getElementById('sidebarAvatar');
    if (p.photo){ av.innerHTML = '<img src="'+p.photo+'" alt="">'; sav.innerHTML = '<img src="'+p.photo+'" alt="">'; sav.style.background='transparent'; }
    else { av.textContent = p.initials || (name.trim()[0]||'C').toUpperCase(); sav.textContent = (name.trim()[0]||'C').toUpperCase(); }
  }

  function shiftWeek(dir){ _weekOffset += dir; load(); }

  async function load(){
    try{
      const r = await fetch(API + '/client/home?week_offset=' + _weekOffset, { headers: H() });
      const d = await r.json(); const data = d.data || {};
      applyProfile(data.profile);
      render(data);
    }catch(e){
      document.getElementById('homeBody').innerHTML = '<div class="card" style="text-align:center;color:#9CA3AF;padding:38px;">No se pudo cargar tu espacio.</div>';
    }
  }

  document.getElementById('greet').textContent = greetByHour();
  load();
</script>
<script>
/* CHAT_UNREAD_BADGE — badge rojo de mensajes de chat no leídos en el panel */
(function(){
  var API='https://nutrientrena-production.up.railway.app/api';
  var token=localStorage.getItem('token'); if(!token) return;
  function attach(){
    var link=document.querySelector('a[href="chat.html"], a[href="client-chat.html"]');
    if(!link){ return; }
    var dot=document.createElement('span');
    dot.setAttribute('data-chat-unread','');
    dot.style.cssText='display:none;margin-left:auto;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#DC2626;color:#fff;font-size:10px;font-weight:700;line-height:18px;text-align:center;';
    link.appendChild(dot);
    function refresh(){
      fetch(API+'/chat/unread-count',{headers:{Authorization:'Bearer '+token}})
        .then(function(r){return r.json();})
        .then(function(d){
          var n=(d&&d.data&&d.data.total)||0;
          if(n>0){ dot.style.display='inline-block'; dot.textContent=n>99?'99+':String(n); }
          else { dot.style.display='none'; dot.textContent=''; }
        }).catch(function(){});
    }
    window.refreshChatUnread=refresh;
    refresh();
    setInterval(refresh, 20000);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',attach);
  else attach();
})();
</script>
