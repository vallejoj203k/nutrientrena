<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NutriEntrena — Analíticas</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--purple:#5B2D8E;--purple-dark:#4A2475;--purple-light:#7C3AED;--purple-pale:#F3EEFF;--gray-bg:#F0F2F5;--sidebar-w:240px;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray-bg);display:flex;height:100vh;overflow:hidden;}

    /* Sidebar */
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--purple);display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
    .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.1);}
    .sidebar-logo span{font-size:20px;font-weight:900;color:#fff;letter-spacing:1px;font-style:italic;text-transform:uppercase;}
    .sidebar-logo span em{color:#C084FC;font-style:inherit;}
    .sidebar-logo small{display:block;color:rgba(255,255,255,.5);font-size:11px;margin-top:2px;}
    .sidebar-nav{flex:1;padding:16px 0;}
    .nav-section{padding:8px 20px 4px;font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:rgba(255,255,255,.75);cursor:pointer;font-size:14px;transition:all .15s;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
    .nav-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#C084FC;}
    .nav-item svg{opacity:.8;flex-shrink:0;}
    .sidebar-user{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);}
    .user-row{display:flex;align-items:center;gap:10px;}
    .user-avatar{width:36px;height:36px;border-radius:50%;background:#C084FC;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;flex-shrink:0;}
    .user-info{flex:1;min-width:0;}
    .user-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .user-role{font-size:11px;color:rgba(255,255,255,.5);}
    .logout-btn{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:4px;border-radius:4px;display:flex;}
    .logout-btn:hover{color:#fff;background:rgba(255,255,255,.1);}

    /* Main */
    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    .topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .topbar h1{font-size:18px;font-weight:700;color:#111;}
    .topbar-right{display:flex;align-items:center;gap:10px;}
    .filter-select{padding:8px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;outline:none;color:#374151;background:#fff;cursor:pointer;}
    .filter-select:focus{border-color:var(--purple);}
    .btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;display:flex;align-items:center;gap:6px;}
    .btn-ghost{background:#F3F4F6;color:#374151;}
    .btn-ghost:hover{background:#E5E7EB;}

    /* Content */
    .content{flex:1;overflow-y:auto;padding:24px;}
    .content::-webkit-scrollbar{width:6px;}
    .content::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px;}

    /* Stat cards */
    .stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:24px;}
    @media(max-width:1200px){.stats-row{grid-template-columns:repeat(3,1fr);}}
    @media(max-width:720px){.stats-row{grid-template-columns:repeat(2,1fr);}}
    .stat-card{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
    .stat-val{font-size:26px;font-weight:800;color:#111;line-height:1;}
    .stat-label{font-size:12px;color:#6B7280;margin-top:4px;}
    .stat-sub{font-size:11px;font-weight:600;margin-top:6px;}
    .stat-sub.up{color:#DC2626;}
    .stat-sub.down{color:#059669;}
    .stat-sub.neutral{color:#6B7280;}

    /* Charts grid */
    .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
    .charts-row.full{grid-template-columns:1fr;}
    @media(max-width:900px){.charts-row{grid-template-columns:1fr;}}
    .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .card-title{font-size:13px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;}

    /* Bar chart */
    .bar-chart{display:flex;flex-direction:column;gap:10px;}
    .bar-row{display:flex;align-items:center;gap:10px;}
    .bar-label{font-size:12px;color:#374151;width:160px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .bar-track{flex:1;background:#F3F4F6;border-radius:4px;height:22px;overflow:hidden;position:relative;}
    .bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;padding-left:8px;}
    .bar-fill span{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;}
    .bar-count{font-size:12px;color:#6B7280;width:28px;text-align:right;flex-shrink:0;}

    /* Donut */
    .donut-wrap{display:flex;align-items:center;gap:24px;}
    .donut-legend{flex:1;display:flex;flex-direction:column;gap:8px;}
    .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#374151;}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .legend-pct{margin-left:auto;font-weight:700;color:#111;}

    /* Line chart */
    .line-chart-wrap{width:100%;height:160px;}

    /* Coaches table */
    .coaches-table{width:100%;border-collapse:collapse;}
    .coaches-table th{padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #F3F4F6;}
    .coaches-table td{padding:12px;font-size:13px;color:#374151;border-bottom:1px solid #F9FAFB;}
    .coaches-table tr:last-child td{border-bottom:none;}
    .coaches-table tr:hover td{background:#FAFAFA;}
    .coach-name-cell{display:flex;align-items:center;gap:10px;}
    .c-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
    .progress-mini{height:6px;background:#F3F4F6;border-radius:3px;overflow:hidden;width:80px;}
    .progress-mini-fill{height:100%;border-radius:3px;background:var(--purple);}

    /* Skeleton */
    .skeleton{background:linear-gradient(90deg,#E5E7EB 25%,#F3F4F6 50%,#E5E7EB 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;background:#1F2937;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:.3s;z-index:200;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.error{background:#DC2626;}
  </style>
</head>

<script>
const API = 'https://nutrientrena-production.up.railway.app/api';
let token = localStorage.getItem('token');
if (!token) location.href = 'login.html';

const COLORS = ['#5B2D8E','#7C3AED','#3B82F6','#10B981','#F59E0B','#EF4444','#6366F1','#EC4899','#14B8A6','#F97316','#84CC16','#06B6D4','#A855F7','#22C55E','#EAB308'];

// ── Auth ─────────────────────────────────────────────────────────────────────
async function loadUser() {
  try {
    const r = await fetch(`${API}/auth/me`, { headers:{ Authorization:`Bearer ${token}` }});
    if (r.status === 401) { logout(); return; }
    const j = await r.json(); const u = j.data || j;
    const name = u.name || u.full_name || 'Usuario';
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('sidebarRole').textContent = u.role?.name || u.role || '—';
    document.getElementById('sidebarAvatar').textContent = name.charAt(0).toUpperCase();
  } catch {}
}
function logout() { localStorage.clear(); location.href = 'login.html'; }

async function loadCoaches() {
  try {
    const r = await fetch(`${API}/analytics/coaches`, { headers:{ Authorization:`Bearer ${token}` }});
    const j = await r.json();
    const coaches = (j.data || j)?.coaches || [];
    const sel = document.getElementById('coachFilter');
    coaches.forEach(c => {
      const o = document.createElement('option');
      o.value = c.coach_id; o.textContent = c.coach_name;
      sel.appendChild(o);
    });
  } catch {}
}

// ── Load all ─────────────────────────────────────────────────────────────────
async function loadAll() {
  const coachId = document.getElementById('coachFilter').value;
  const qs = coachId ? `?coach_id=${coachId}` : '';

  const [overviewRes, statesRes, checkinsRes, coachesRes] = await Promise.all([
    fetch(`${API}/analytics/overview${qs}`, { headers:{ Authorization:`Bearer ${token}` }}),
    fetch(`${API}/analytics/states${qs}`,   { headers:{ Authorization:`Bearer ${token}` }}),
    fetch(`${API}/analytics/checkins${qs}`, { headers:{ Authorization:`Bearer ${token}` }}),
    fetch(`${API}/analytics/coaches`,        { headers:{ Authorization:`Bearer ${token}` }}),
  ]);

  if (overviewRes.status === 401) { logout(); return; }

  const overview = (await overviewRes.json());
  const states   = (await statesRes.json());
  const checkins = (await checkinsRes.json());
  const coaches  = (await coachesRes.json());

  const ov = overview.data || overview;
  const st = (states.data || states)?.distribution || [];
  const ck = checkins.data || checkins;
  const co = (coaches.data || coaches)?.coaches || [];

  renderStats(ov, ck);
  renderStatesChart(st);
  renderDonut(st);
  renderTrend(ck?.weekly_trend || []);
  renderCoaches(co);
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats(ov, ck) {
  const cards = [
    { icon:'#5B2D8E', bg:'#F3EEFF', val: ov.total_clients ?? '—', label:'Total clientes',
      sub: `+${ov.new_this_month ?? 0} este mes`, cls:'neutral',
      svg:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'},
    { icon:'#059669', bg:'#ECFDF5', val: ov.active_clients ?? '—', label:'Clientes activos',
      sub: ov.total_clients ? `${Math.round((ov.active_clients/ov.total_clients)*100)}% del total` : '—', cls:'down',
      svg:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>'},
    { icon:'#D97706', bg:'#FFF7ED', val: ov.new_this_month ?? '—', label:'Nuevos este mes',
      sub:'Registros del mes actual', cls:'neutral',
      svg:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>'},
    { icon:'#3B82F6', bg:'#EFF6FF', val: ov.total_coaches ?? '—', label:'Coaches activos',
      sub:'Con clientes asignados', cls:'neutral',
      svg:'<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>'},
    { icon:'#6366F1', bg:'#EEF2FF', val: ov.total_checkins ?? '—', label:'Total check-ins',
      sub:'Registros históricos', cls:'neutral',
      svg:'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>'},
    { icon: ck.avg_weight_change_kg <= 0 ? '#059669' : '#DC2626',
      bg:   ck.avg_weight_change_kg <= 0 ? '#ECFDF5' : '#FEF2F2',
      val: ck.avg_weight_change_kg != null ? (ck.avg_weight_change_kg > 0 ? '+' : '') + ck.avg_weight_change_kg + ' kg' : '—',
      label:'Cambio peso promedio', sub:`${ck.adherence_pct ?? 0}% adherencia`, cls: ck.avg_weight_change_kg <= 0 ? 'down' : 'up',
      svg:'<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>'},
  ];

  document.getElementById('statsRow').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="stat-icon" style="background:${c.bg};">
        <svg width="20" height="20" fill="none" stroke="${c.icon}" stroke-width="2" viewBox="0 0 24 24">${c.svg}</svg>
      </div>
      <div class="stat-val">${c.val}</div>
      <div class="stat-label">${c.label}</div>
      <div class="stat-sub ${c.cls}">${c.sub}</div>
    </div>
  `).join('');
}

// ── States bar chart ──────────────────────────────────────────────────────────
function renderStatesChart(distribution) {
  const top = distribution.slice(0, 8);
  const maxCount = top[0]?.count || 1;

  document.getElementById('chartsRow1').innerHTML = `
    <div class="card">
      <div class="card-title">Distribución por estado</div>
      <div class="bar-chart">
        ${top.map((s, i) => {
          const pct = Math.round((s.count / maxCount) * 100);
          return `
            <div class="bar-row">
              <div class="bar-label" title="${esc(s.status_name)}">${esc(s.status_name)}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${pct}%;background:${COLORS[i % COLORS.length]};">
                  ${s.count > 0 ? `<span>${s.count}</span>` : ''}
                </div>
              </div>
              <div class="bar-count">${s.percentage}%</div>
            </div>
          `;
        }).join('')}
        ${top.length === 0 ? '<div style="text-align:center;padding:30px;color:#9CA3AF;font-size:13px;">Sin datos</div>' : ''}
      </div>
    </div>
    <div class="card" id="donutCard">
      <div class="card-title">Resumen visual</div>
      <div class="donut-wrap" id="donutWrap"></div>
    </div>
  `;
}

// ── Donut ─────────────────────────────────────────────────────────────────────
function renderDonut(distribution) {
  const top5 = distribution.slice(0, 5);
  const total = top5.reduce((s, x) => s + x.count, 0) || 1;
  const others = distribution.slice(5).reduce((s, x) => s + x.count, 0);
  const items = others > 0 ? [...top5, { status_name:'Otros', count: others, percentage: Math.round(others/total*100) }] : top5;

  const r = 60, cx = 70, cy = 70, stroke = 22;
  const circumference = 2 * Math.PI * r;
  let offset = 0;

  const segments = items.map((item, i) => {
    const pct = item.count / total;
    const dash = pct * circumference;
    const gap  = circumference - dash;
    const seg  = `<circle cx="${cx}" cy="${cy}" r="${r}"
      fill="none" stroke="${COLORS[i % COLORS.length]}" stroke-width="${stroke}"
      stroke-dasharray="${dash} ${gap}"
      stroke-dashoffset="${-offset}"
      transform="rotate(-90 ${cx} ${cy})"
      style="transition:stroke-dasharray .8s ease;"/>`;
    offset += dash;
    return seg;
  }).join('');

  const total_clients = distribution.reduce((s, x) => s + x.count, 0);

  document.getElementById('donutWrap').innerHTML = `
    <svg width="140" height="140" viewBox="0 0 140 140" style="flex-shrink:0;">
      ${segments}
      <text x="${cx}" y="${cy - 6}" text-anchor="middle" font-size="20" font-weight="800" fill="#111">${total_clients}</text>
      <text x="${cx}" y="${cy + 12}" text-anchor="middle" font-size="10" fill="#9CA3AF">clientes</text>
    </svg>
    <div class="donut-legend">
      ${items.map((item, i) => `
        <div class="legend-item">
          <div class="legend-dot" style="background:${COLORS[i % COLORS.length]};"></div>
          <span>${esc(item.status_name)}</span>
          <span class="legend-pct">${item.percentage ?? Math.round(item.count/total*100)}%</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Weekly trend line chart ───────────────────────────────────────────────────
function renderTrend(weekly) {
  if (!weekly.length) {
    document.getElementById('chartsRow2').innerHTML = `
      <div class="card">
        <div class="card-title">Tendencia semanal de check-ins</div>
        <div style="text-align:center;padding:40px;color:#9CA3AF;font-size:13px;">Sin datos suficientes</div>
      </div>
      ${renderCheckinStatsCard(null)}
    `;
    return;
  }

  const counts = weekly.map(w => w.count);
  const max = Math.max(...counts) || 1;
  const W = 400, H = 140, pad = 30;
  const pts = weekly.map((w, i) => {
    const x = pad + (i / Math.max(weekly.length - 1, 1)) * (W - pad * 2);
    const y = pad + (1 - w.count / max) * (H - pad * 2);
    return { x, y, w };
  });

  const polyline = pts.map(p => `${p.x},${p.y}`).join(' ');
  const area = `${pts[0].x},${H} ` + pts.map(p => `${p.x},${p.y}`).join(' ') + ` ${pts[pts.length-1].x},${H}`;

  const xLabels = pts.map(p => `<text x="${p.x}" y="${H}" text-anchor="middle" font-size="9" fill="#9CA3AF">${p.w.week.replace(/^\d+-/,'')}</text>`).join('');
  const dots = pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#5B2D8E" stroke="#fff" stroke-width="1.5"/>`).join('');

  document.getElementById('chartsRow2').innerHTML = `
    <div class="card">
      <div class="card-title">Tendencia semanal de check-ins</div>
      <div class="line-chart-wrap">
        <svg viewBox="0 0 ${W} ${H+12}" width="100%" height="100%" preserveAspectRatio="none">
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#5B2D8E" stop-opacity=".18"/>
              <stop offset="100%" stop-color="#5B2D8E" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <polygon points="${area}" fill="url(#lg)"/>
          <polyline points="${polyline}" fill="none" stroke="#5B2D8E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          ${dots}
          ${xLabels}
        </svg>
      </div>
    </div>
    ${renderCheckinStatsCard(null)}
  `;
}

function renderCheckinStatsCard(ck) {
  return `<div id="checkinStatsCard" class="card"><div class="card-title">Métricas de adherencia</div><div style="text-align:center;padding:20px;color:#9CA3AF;font-size:13px;">Cargando...</div></div>`;
}

async function fillCheckinStats() {
  const coachId = document.getElementById('coachFilter').value;
  const qs = coachId ? `?coach_id=${coachId}` : '';
  try {
    const r = await fetch(`${API}/analytics/checkins${qs}`, { headers:{ Authorization:`Bearer ${token}` }});
    const j = await r.json(); const ck = j.data || j;
    const el = document.getElementById('checkinStatsCard');
    if (!el) return;
    el.innerHTML = `
      <div class="card-title">Métricas de adherencia</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <div style="font-size:28px;font-weight:800;color:var(--purple);">${ck.adherence_pct ?? 0}%</div>
          <div style="font-size:12px;color:#6B7280;margin-top:4px;">Adherencia general</div>
          <div style="font-size:11px;color:#9CA3AF;margin-top:2px;">${ck.clients_with_checkin ?? 0} clientes con check-in</div>
        </div>
        <div>
          <div style="font-size:28px;font-weight:800;color:${(ck.avg_weight_change_kg??0)<=0?'#059669':'#DC2626'};">
            ${ck.avg_weight_change_kg != null ? (ck.avg_weight_change_kg>0?'+':'')+ck.avg_weight_change_kg+' kg' : '—'}
          </div>
          <div style="font-size:12px;color:#6B7280;margin-top:4px;">Cambio peso promedio</div>
          <div style="font-size:11px;color:#9CA3AF;margin-top:2px;">${ck.clients_losing_weight??0} bajando · ${ck.clients_gaining_weight??0} subiendo</div>
        </div>
      </div>
    `;
  } catch {}
}

// ── Coaches ───────────────────────────────────────────────────────────────────
function renderCoaches(coaches) {
  const maxClients = Math.max(...coaches.map(c => c.clients_assigned), 1);
  const el = document.createElement('div');
  el.className = 'card'; el.style.marginTop = '20px';
  el.innerHTML = `
    <div class="card-title">Rendimiento por coach</div>
    ${coaches.length === 0
      ? '<div style="text-align:center;padding:30px;color:#9CA3AF;font-size:13px;">Sin coaches registrados</div>'
      : `<table class="coaches-table">
        <thead>
          <tr>
            <th>Coach</th>
            <th>Clientes asignados</th>
            <th>Check-ins recibidos</th>
            <th>Carga</th>
          </tr>
        </thead>
        <tbody>
          ${coaches.map((c, i) => {
            const initials = c.coach_name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
            const pct = Math.round((c.clients_assigned / maxClients) * 100);
            return `
              <tr>
                <td>
                  <div class="coach-name-cell">
                    <div class="c-av" style="background:${COLORS[i%COLORS.length]};">${initials}</div>
                    <span style="font-weight:600;color:#111;">${esc(c.coach_name)}</span>
                  </div>
                </td>
                <td><strong>${c.clients_assigned}</strong></td>
                <td>${c.checkins_received}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px;">
                    <div class="progress-mini"><div class="progress-mini-fill" style="width:${pct}%;background:${COLORS[i%COLORS.length]};"></div></div>
                    <span style="font-size:12px;color:#6B7280;">${pct}%</span>
                  </div>
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>`
    }
  `;
  document.querySelector('.content').appendChild(el);

  setTimeout(fillCheckinStats, 100);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${type||''}`;
  clearTimeout(el._t); el._t = setTimeout(()=>{ el.className='toast'; }, 3000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadUser();
loadCoaches().then(() => loadAll());
</script>
