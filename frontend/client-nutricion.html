<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <title>NutriEntrena — Nutrición</title>
  <script>
    (function(){ var t=localStorage.getItem('token'),r=localStorage.getItem('role_id')||'';
      if(!t){location.replace('login.html');return;} if(r&&r!=='6'){location.replace('dashboard.html');} })();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--indigo:#4F46E5;--indigo-dark:#4338CA;--indigo-pale:#EEF2FF;--green:#059669;--amber:#F59E0B;--red:#DC2626;--gray-bg:#F8FAFC;--sidebar-w:240px;}
    body{font-family:'Space Grotesk','Segoe UI',system-ui,sans-serif;background:var(--gray-bg);display:flex;height:100vh;overflow:hidden;}
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
    .sidebar-logo{display:flex;align-items:center;gap:11px;padding:18px 18px 16px;border-bottom:1px solid #EBEBEB;}
    .sl-mark{width:40px;height:40px;border-radius:9px;background:url('logo.webp') no-repeat 50% 41%;background-size:210px;flex-shrink:0;}
    .sl-txt{display:flex;flex-direction:column;line-height:1.15;}
    .sl-txt b{font-size:17px;font-weight:800;letter-spacing:.3px;}
    .sl-txt b .n1{color:var(--indigo);}.sl-txt b .n2{color:var(--green);}
    .sl-txt small{color:#6B7280;font-size:11px;margin-top:2px;}
    .sidebar-nav{flex:1;padding:12px 0;}
    .nav-section{padding:12px 20px 4px;font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#374151;cursor:pointer;font-size:14px;transition:all .15s;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:#F8FAFC;color:var(--indigo);}
    .nav-item.active{background:#EEF2FF;color:var(--indigo);border-left-color:var(--indigo);font-weight:600;}
    .nav-item svg{flex-shrink:0;opacity:.75;}
    .nav-item.active svg,.nav-item:hover svg{opacity:1;}
    .nav-item.disabled{opacity:.6;cursor:default;}
    .nav-item.disabled:hover{background:none;color:#374151;}
    .nav-soon-tag{margin-left:auto;font-size:9px;font-weight:700;color:#9CA3AF;background:#F3F4F6;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;}
    .sidebar-user{padding:14px 20px;border-top:1px solid #F3F4F6;display:flex;align-items:center;gap:10px;}
    .s-avatar{width:34px;height:34px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0;overflow:hidden;}
    .s-avatar img{width:100%;height:100%;object-fit:cover;}
    .user-info{flex:1;min-width:0;}.user-name{color:#111827;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.user-role{color:#6B7280;font-size:11px;}
    .logout-btn{background:none;border:none;color:#9CA3AF;cursor:pointer;padding:4px;border-radius:4px;display:flex;}
    .logout-btn:hover{color:#EF4444;}

    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    .topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 28px;height:64px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
    .menu-btn{display:none;background:none;border:none;cursor:pointer;color:#374151;padding:6px;border-radius:8px;}
    .menu-btn:hover{background:#F3F4F6;}
    .topbar-title{font-size:17px;font-weight:800;color:#111827;flex:1;}

    .content{flex:1;overflow-y:auto;padding:26px 28px 40px;}
    .content-inner{max-width:760px;margin:0 auto;}
    .page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;}
    .page-head h1{font-size:26px;font-weight:800;color:#111827;}
    .page-head p{font-size:14px;color:#6B7280;margin-top:2px;}
    .btn-list{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:10px;border:1px solid #A7F3D0;background:#ECFDF5;color:var(--green);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
    .btn-list:hover{background:#D1FAE5;}

    .weekbar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;}
    .wday{flex:1;min-width:44px;background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:9px 4px;text-align:center;cursor:pointer;transition:.15s;}
    .wday:hover{border-color:#C7D2FE;}
    .wday.sel{background:var(--indigo);border-color:var(--indigo);}
    .wday .wl{font-size:12px;font-weight:700;color:#6B7280;}
    .wday .wn{font-size:13px;font-weight:700;color:#111827;margin-top:2px;}
    .wday.sel .wl,.wday.sel .wn{color:#fff;}

    .day-card{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
    .day-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .day-name{font-size:18px;font-weight:800;color:#111827;}
    .day-kcal{font-size:16px;font-weight:800;color:var(--green);}
    .macros{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .macro{background:#F9FAFB;border-radius:12px;padding:12px;text-align:center;}
    .macro-v{font-size:17px;font-weight:800;}
    .macro-l{font-size:11px;color:#9CA3AF;margin-top:1px;}
    .macro.p .macro-v{color:var(--green);}.macro.c .macro-v{color:var(--amber);}.macro.g .macro-v{color:var(--red);}
    .day-note{margin-top:12px;font-size:13px;color:#9CA3AF;text-align:center;}

    .meal{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:15px 16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(16,24,40,.03);}
    .meal-ico{width:42px;height:42px;border-radius:12px;background:var(--indigo-pale);color:var(--indigo);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .meal-info{flex:1;min-width:0;}
    .meal-nm{font-size:15px;font-weight:800;color:#111827;}
    .meal-sub{font-size:13px;color:#9CA3AF;margin-top:1px;}

    .empty{padding:44px 22px;text-align:center;color:#6B7280;font-size:14px;background:#fff;border:1px solid #E5E7EB;border-radius:16px;}

    .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#1F2937;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:400;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;}
    .sidebar-overlay.open{display:block;}
    @media(max-width:768px){
      body{overflow:auto;}
      .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);transition:transform .25s;z-index:200;}
      .sidebar.open{transform:translateX(0);}
      .menu-btn{display:flex;align-items:center;justify-content:center;}
      .content{padding:18px 14px 40px;}
      .page-head h1{font-size:22px;}
    }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sl-mark" role="img" aria-label="NutriEntrena"></div>
    <div class="sl-txt"><b><span class="n1">NUTRI</span><span class="n2">ENTRENA</span></b><small>Mi espacio</small></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Principal</div>
    <a class="nav-item" href="client-home.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/></svg>Inicio</a>
    <div class="nav-section">Mi plan</div>
    <a class="nav-item" href="client-entrena.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6.5 6.5 17.5 17.5M4 12l-1.5 1.5a2.12 2.12 0 0 0 3 3L7 18M17 6l1-1a2.12 2.12 0 0 1 3 3l-1 1"/><path d="m8 8 8 8"/></svg>Entrena</a>
    <a class="nav-item active" href="client-nutricion.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4Z"/><path d="M6 2v2M10 2v2M14 2v2"/></svg>Nutrición</a>
    <div class="nav-section">Seguimiento</div>
    <a class="nav-item" href="client-progreso.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></svg>Progreso</a>
    <div class="nav-section">Comunicación</div>
    <a class="nav-item" href="client-chat.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</a>
      <div class="nav-section">Cuenta</div>
    <a class="nav-item" href="client-perfil.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Perfil</a>
</nav>
  <div class="sidebar-user">
    <div class="s-avatar" id="sidebarAvatar">C</div>
    <div class="user-info"><div class="user-name" id="sidebarName">Cargando…</div><div class="user-role">Cliente</div></div>
    <button class="logout-btn" onclick="logout()" title="Cerrar sesión"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menú"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="topbar-title">Nutrición</div>
  </div>

  <div class="content">
    <div class="content-inner">
      <div class="page-head">
        <div>
          <h1>Plan Nutricional</h1>
          <p id="menuSub">Menú semanal personalizado</p>
        </div>
        <button class="btn-list" onclick="soon()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
          Lista
        </button>
      </div>

      <div class="weekbar" id="weekbar" style="display:none;"></div>
      <div id="daybox"><div class="empty" id="loadingBox">Cargando tu plan nutricional…</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://nutrientrena-production.up.railway.app/api';
  const token = localStorage.getItem('token');
  const headers = () => ({ Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' });
  function esc(s){ if(s==null)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function logout(){ localStorage.clear(); location.href='login.html'; }
  function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
  function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
  let _tt; function soon(){ const t=document.getElementById('toast'); t.textContent='Disponible próximamente'; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2200); }

  function mealIcon(name){
    var n=(name||'').toLowerCase();
    var COFFEE='<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>';
    var APPLE='<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path d="M12 20.94c1.5 0 2.75 1.06 4 1.06 3 0 6-8 6-12.22A4.91 4.91 0 0 0 17 5c-2.22 0-4 1.44-5 2-1-.56-2.78-2-5-2a4.9 4.9 0 0 0-5 4.78C2 14 5 22 8 22c1.25 0 2.5-1.06 4-1.06Z"/><path d="M10 2c1 .5 2 2 2 5"/></svg>';
    var FORK='<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/><path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7"/><path d="m2.1 21.8 6.4-6.3"/><path d="m19 5-7 7"/></svg>';
    if(/desayun/.test(n))return COFFEE;
    if(/media|merienda|snack|colaci/.test(n))return APPLE;
    if(/comida|almuerzo|cena/.test(n))return FORK;
    return FORK;
  }
  function g(v){ return (v==null) ? '—' : (Math.round(v)+'g'); }

  let _days=[], _sel=0;

  function renderWeek(){
    var bar=document.getElementById('weekbar');
    bar.style.display='';
    bar.innerHTML=_days.map(function(d,i){
      var dt=d.date?new Date(d.date+'T00:00:00').getDate():'';
      return '<div class="wday'+(i===_sel?' sel':'')+'" onclick="selectDay('+i+')"><div class="wl">'+esc(d.label)+'</div><div class="wn">'+dt+'</div></div>';
    }).join('');
  }
  function renderDay(){
    var d=_days[_sel], box=document.getElementById('daybox');
    if(!d){ box.innerHTML='<div class="empty">Sin datos para este día.</div>'; return; }
    var html='<div class="day-card"><div class="day-top"><div class="day-name">'+esc(d.name)+'</div>'
      + (d.kcal!=null?'<div class="day-kcal">'+Math.round(d.kcal)+' kcal</div>':'')+'</div>';
    if(d.has_diet){
      html+='<div class="macros">'
        +'<div class="macro p"><div class="macro-v">'+g(d.protein)+'</div><div class="macro-l">Proteína</div></div>'
        +'<div class="macro c"><div class="macro-v">'+g(d.carbs)+'</div><div class="macro-l">Carbohidratos</div></div>'
        +'<div class="macro g"><div class="macro-v">'+g(d.fats)+'</div><div class="macro-l">Grasa</div></div>'
        +'</div>';
    } else {
      html+='<div class="day-note">No hay menú asignado para este día.</div>';
    }
    html+='</div>';
    (d.meals||[]).forEach(function(m){
      var sub=[m.time, (m.kcal!=null?m.kcal+' kcal':null)].filter(Boolean).join(' · ');
      html+='<div class="meal"><div class="meal-ico">'+mealIcon(m.name)+'</div>'
        +'<div class="meal-info"><div class="meal-nm">'+esc(m.name||'Comida')+'</div><div class="meal-sub">'+esc(sub||'')+'</div></div></div>';
    });
    if(d.has_diet && !(d.meals||[]).length){ html+='<div class="empty">Este día no tiene comidas cargadas.</div>'; }
    box.innerHTML=html;
  }
  function selectDay(i){ _sel=i; renderWeek(); renderDay(); }

  async function loadProfile(){
    try{ const r=await fetch(API+'/auth/me',{headers:headers()}); const d=await r.json(); const u=d.data||d;
      const name=u.name||u.email||'Cliente'; document.getElementById('sidebarName').textContent=name;
      const sav=document.getElementById('sidebarAvatar');
      if(u.photo){sav.innerHTML='<img src="'+u.photo+'" alt="">';sav.style.background='transparent';}else{sav.textContent=(name.trim()[0]||'C').toUpperCase();}
    }catch(e){}
  }
  async function loadNutrition(){
    try{
      const r=await fetch(API+'/client/nutrition',{headers:headers()});
      const d=await r.json(); const data=d.data||{};
      _days=data.days||[];
      if(!data.menu || !_days.length){
        document.getElementById('weekbar').style.display='none';
        document.getElementById('daybox').innerHTML='<div class="empty">Tu coach aún no te ha asignado un menú semanal.</div>';
        return;
      }
      document.getElementById('menuSub').textContent=data.menu.name || 'Menú semanal personalizado';
      var t=_days.findIndex(function(x){return x.is_today;}); _sel=t>=0?t:0;
      renderWeek(); renderDay();
    }catch(e){
      document.getElementById('daybox').innerHTML='<div class="empty">No se pudo cargar tu plan nutricional.</div>';
    }
  }
  loadProfile(); loadNutrition();
</script>
<script>
/* CHAT_UNREAD_BADGE — badge rojo de mensajes de chat no leídos en el panel */
(function(){
  var API='https://nutrientrena-production.up.railway.app/api';
  var token=localStorage.getItem('token'); if(!token) return;
  function attach(){
    var link=document.querySelector('a[href="chat.html"], a[href="client-chat.html"]');
    if(!link){ return; }
    var dot=document.createElement('span');
    dot.setAttribute('data-chat-unread','');
    dot.style.cssText='display:none;margin-left:auto;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#DC2626;color:#fff;font-size:10px;font-weight:700;line-height:18px;text-align:center;';
    link.appendChild(dot);
    function refresh(){
      fetch(API+'/chat/unread-count',{headers:{Authorization:'Bearer '+token}})
        .then(function(r){return r.json();})
        .then(function(d){
          var n=(d&&d.data&&d.data.total)||0;
          if(n>0){ dot.style.display='inline-block'; dot.textContent=n>99?'99+':String(n); }
          else { dot.style.display='none'; dot.textContent=''; }
        }).catch(function(){});
    }
    window.refreshChatUnread=refresh;
    refresh();
    setInterval(refresh, 20000);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',attach);
  else attach();
})();
</script>
</body>
</html>
