<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ALZUM.io — Chat</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --indigo:#4F46E5;--indigo-dark:#4338CA;--indigo-light:#6366F1;
      --indigo-pale:#EEF2FF;--gray-bg:#F8FAFC;--sidebar-w:240px;
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray-bg);display:flex;height:100vh;overflow:hidden;}

    /* ── Sidebar ── */
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
    .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid #EBEBEB;}
    .sidebar-logo span{font-size:20px;font-weight:900;color:#111827;letter-spacing:1px;font-style:italic;text-transform:uppercase;}
    .sidebar-logo span em{color:var(--indigo);font-style:inherit;}
    .sidebar-logo small{display:block;color:#6B7280;font-size:11px;margin-top:2px;}
    .sidebar-nav{flex:1;padding:12px 0;}
    .nav-section{padding:8px 20px 4px;font-size:10px;color:#6B7280;text-transform:uppercase;letter-spacing:1px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#374151;cursor:pointer;font-size:14px;transition:all .15s;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:#F8FAFC;color:var(--indigo);}
    .nav-item.active{background:#EEF2FF;color:var(--indigo);border-left-color:var(--indigo);font-weight:600;}
    .nav-item svg{flex-shrink:0;opacity:.7;}
    .nav-item.active svg,.nav-item:hover svg{opacity:1;}
    .sidebar-user{padding:14px 20px;border-top:1px solid #F3F4F6;display:flex;align-items:center;gap:10px;}
    .s-avatar{width:34px;height:34px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0;}
    .user-info{flex:1;min-width:0;}
    .user-name{color:#111827;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .user-role{color:#6B7280;font-size:11px;}
    .logout-btn{background:none;border:none;color:#9CA3AF;cursor:pointer;padding:4px;border-radius:4px;}
    .logout-btn:hover{color:#EF4444;}

    /* ── Chat layout ── */
    .chat-container{flex:1;display:flex;height:100vh;overflow:hidden;}

    /* Conversation list panel */
    .conv-panel{width:320px;min-width:280px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;height:100vh;}
    .conv-header{padding:20px 16px 12px;border-bottom:1px solid #E5E7EB;flex-shrink:0;}
    .conv-header h2{font-size:18px;font-weight:800;color:#111827;margin-bottom:10px;}
    .conv-search{position:relative;}
    .conv-search input{width:100%;padding:8px 12px 8px 34px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;outline:none;color:#374151;background:#F9FAFB;}
    .conv-search input:focus{border-color:var(--indigo);background:#fff;}
    .conv-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9CA3AF;pointer-events:none;}
    .btn-new-conv{width:100%;margin-top:10px;padding:9px;background:var(--indigo);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s;}
    .btn-new-conv:hover{background:var(--indigo-dark);}
    .conv-list{flex:1;overflow-y:auto;padding:8px 0;}
    .conv-list::-webkit-scrollbar{width:4px;}
    .conv-list::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:2px;}
    .conv-item{padding:12px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:background .1s;border-bottom:1px solid #F3F4F6;}
    .conv-item:hover{background:#F8FAFC;}
    .conv-item.active{background:#EEF2FF;}
    .conv-avatar{width:40px;height:40px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;flex-shrink:0;overflow:hidden;}
    .conv-avatar img{width:100%;height:100%;object-fit:cover;}
    .conv-info{flex:1;min-width:0;}
    .conv-name{font-size:13px;font-weight:600;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .conv-preview{font-size:11px;color:#9CA3AF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
    .conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
    .conv-time{font-size:10px;color:#9CA3AF;}
    .conv-badge{background:#EF4444;color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:10px;}
    .conv-type-badge{font-size:9px;background:#EEF2FF;color:var(--indigo);padding:2px 6px;border-radius:10px;font-weight:700;}

    /* Message panel */
    .msg-panel{flex:1;display:flex;flex-direction:column;height:100vh;background:#F8FAFC;}
    .msg-header{background:#fff;border-bottom:1px solid #E5E7EB;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .msg-header-avatar{width:38px;height:38px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;overflow:hidden;}
    .msg-header-avatar img{width:100%;height:100%;object-fit:cover;}
    .msg-header-info{flex:1;}
    .msg-header-name{font-size:15px;font-weight:700;color:#111827;}
    .msg-header-sub{font-size:11px;color:#9CA3AF;}
    .msg-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9CA3AF;}
    .msg-empty svg{margin-bottom:12px;opacity:.4;}
    .msg-empty p{font-size:14px;}
    .msg-thread{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
    .msg-thread::-webkit-scrollbar{width:4px;}
    .msg-thread::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:2px;}
    .msg-row{display:flex;align-items:flex-end;gap:8px;}
    .msg-row.mine{flex-direction:row-reverse;}
    .msg-bubble-avatar{width:30px;height:30px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden;}
    .msg-bubble-avatar img{width:100%;height:100%;object-fit:cover;}
    .msg-bubble-wrap{max-width:68%;}
    .msg-sender-name{font-size:10px;color:#9CA3AF;margin-bottom:3px;font-weight:600;}
    .msg-row.mine .msg-sender-name{text-align:right;}
    .msg-bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word;}
    .msg-row:not(.mine) .msg-bubble{background:#fff;color:#111827;border:1px solid #E5E7EB;border-bottom-left-radius:4px;}
    .msg-row.mine .msg-bubble{background:var(--indigo);color:#fff;border-bottom-right-radius:4px;}
    .msg-time{font-size:10px;color:#9CA3AF;margin-top:4px;}
    .msg-row.mine .msg-time{text-align:right;}
    .typing-indicator{font-size:11px;color:#9CA3AF;font-style:italic;padding:0 24px 8px;}

    /* Input bar */
    .msg-input-bar{background:#fff;border-top:1px solid #E5E7EB;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .msg-input{flex:1;border:1.5px solid #E5E7EB;border-radius:24px;padding:10px 16px;font-size:13px;outline:none;resize:none;max-height:100px;color:#111827;font-family:inherit;}
    .msg-input:focus{border-color:var(--indigo);}
    .btn-send{width:40px;height:40px;border:none;background:var(--indigo);color:#fff;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;}
    .btn-send:hover{background:var(--indigo-dark);}
    .btn-send:disabled{background:#E5E7EB;cursor:not-allowed;}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:#fff;border-radius:16px;width:480px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15);}
    .modal-header{padding:20px 24px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .modal-header h3{font-size:17px;font-weight:700;color:#111827;}
    .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#9CA3AF;padding:4px;}
    .modal-close:hover{color:#111827;}
    .modal-body{flex:1;overflow-y:auto;padding:20px 24px;}
    .modal-footer{padding:16px 24px;border-top:1px solid #E5E7EB;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}
    .type-toggle{display:flex;gap:8px;margin-bottom:16px;}
    .type-btn{flex:1;padding:9px;border:1.5px solid #E5E7EB;border-radius:8px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#374151;transition:.15s;}
    .type-btn.active{border-color:var(--indigo);background:#EEF2FF;color:var(--indigo);}
    .form-label{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;display:block;}
    .form-input{width:100%;padding:10px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;outline:none;color:#111827;}
    .form-input:focus{border-color:var(--indigo);}
    .form-select{width:100%;padding:10px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;outline:none;color:#111827;background:#fff;}
    .form-select:focus{border-color:var(--indigo);}
    .user-search-results{margin-top:8px;border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;max-height:200px;overflow-y:auto;}
    .user-result-item{padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;color:#374151;border-bottom:1px solid #F3F4F6;transition:background .1s;}
    .user-result-item:last-child{border-bottom:none;}
    .user-result-item:hover{background:#F8FAFC;}
    .user-result-item.selected{background:#EEF2FF;color:var(--indigo);}
    .selected-users{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .selected-user-chip{background:#EEF2FF;color:var(--indigo);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;}
    .chip-remove{background:none;border:none;cursor:pointer;color:var(--indigo);font-size:14px;padding:0;line-height:1;}
    .mb-16{margin-bottom:16px;}
    .btn-primary{padding:9px 18px;background:var(--indigo);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
    .btn-primary:hover{background:var(--indigo-dark);}
    .btn-ghost{padding:9px 18px;background:#F3F4F6;color:#374151;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
    .btn-ghost:hover{background:#E5E7EB;}

    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;background:#1F2937;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:.3s;z-index:200;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{background:#059669;}
    .toast.error{background:#DC2626;}

    .ws-status{font-size:10px;display:flex;align-items:center;gap:4px;}
    .ws-dot{width:6px;height:6px;border-radius:50%;background:#9CA3AF;}
    .ws-dot.connected{background:#22C55E;}

    @media(max-width:768px){.sidebar{display:none;}.conv-panel{width:100%;}.msg-panel{display:none;}.msg-panel.open{display:flex;}}
  </style>
</head>

<!-- Chat container -->
<div class="chat-container">

  <!-- Conversation list -->
  <div class="conv-panel">
    <div class="conv-header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <h2>Mensajes</h2>
        <div class="ws-status">
          <div class="ws-dot" id="wsDot"></div>
          <span id="wsLabel">Desconectado</span>
        </div>
      </div>
      <div class="conv-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="convSearch" placeholder="Buscar conversación…" oninput="filterConversations()"/>
      </div>
      <button class="btn-new-conv" id="btnNewConv" onclick="openModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva conversación
      </button>
    </div>
    <div class="conv-list" id="convList">
      <div style="text-align:center;padding:40px 20px;color:#9CA3AF;font-size:13px;">Cargando…</div>
    </div>
  </div>

  <!-- Message thread -->
  <div class="msg-panel" id="msgPanel">
    <div class="msg-empty" id="msgEmpty">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Selecciona una conversación</p>
    </div>
    <div id="msgActive" style="display:none;flex:1;display:none;flex-direction:column;height:100vh;">
      <div class="msg-header" id="msgHeader">
        <div class="msg-header-avatar" id="msgHeaderAvatar">?</div>
        <div class="msg-header-info">
          <div class="msg-header-name" id="msgHeaderName">—</div>
          <div class="msg-header-sub" id="msgHeaderSub">—</div>
        </div>
      </div>
      <div class="msg-thread" id="msgThread"></div>
      <div class="typing-indicator" id="typingIndicator" style="display:none;"></div>
      <div class="msg-input-bar">
        <textarea class="msg-input" id="msgInput" placeholder="Escribe un mensaje…" rows="1" onkeydown="handleInputKey(event)" oninput="handleTyping()"></textarea>
        <button class="btn-send" id="btnSend" onclick="sendMessage()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- New Conversation Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Nueva conversación</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="type-toggle" id="typeToggle">
        <button class="type-btn active" id="btnTypeIndividual" onclick="setConvType('individual')">Individual</button>
        <button class="type-btn" id="btnTypeGroup" onclick="setConvType('group')">Grupo</button>
      </div>

      <!-- Individual: search user -->
      <div id="sectionIndividual">
        <label class="form-label">Buscar usuario</label>
        <input class="form-input" id="userSearch" placeholder="Nombre o email…" oninput="searchUsers()" autocomplete="off"/>
        <div class="user-search-results" id="userSearchResults" style="display:none;"></div>
        <div class="selected-users" id="selectedUsers"></div>
      </div>

      <!-- Group: config -->
      <div id="sectionGroup" style="display:none;">
        <div class="mb-16">
          <label class="form-label">Nombre del grupo (opcional)</label>
          <input class="form-input" id="groupName" placeholder="Ej: Equipo Alpha…"/>
        </div>
        <div id="groupTargetSection">
          <label class="form-label">Añadir participantes</label>
          <select class="form-select" id="groupTarget">
            <option value="my_clients">Mis clientes</option>
            <option value="coaches">Todos los coaches</option>
            <option value="all_clients">Todos los clientes</option>
          </select>
        </div>
        <div id="groupCustomSection" style="display:none;">
          <label class="form-label" style="margin-top:12px;">O buscar usuarios específicos</label>
          <input class="form-input" id="groupUserSearch" placeholder="Buscar…" oninput="searchGroupUsers()" autocomplete="off"/>
          <div class="user-search-results" id="groupSearchResults" style="display:none;"></div>
          <div class="selected-users" id="groupSelectedUsers"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="createConversation()">Crear</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://nutrientrena-production.up.railway.app/api';
const WS_URL = 'wss://nutrientrena-production.up.railway.app/ws/chat';
let token = localStorage.getItem('token');
let currentUser = null;
let currentUserRoles = [];
let conversations = [];
let activeConvId = null;
let ws = null;
let wsReconnectTimer = null;
let typingTimer = null;
let selectedIndividualUsers = [];
let groupSelectedUsers = [];
let allUsers = [];

// ── Auth guard ────────────────────────────────────────────────────────────────
if (!token) { location.href = 'login.html'; }

function logout() {
  fetch(`${API}/auth/logout`, { method:'POST', headers:{ Authorization:`Bearer ${token}` }}).catch(()=>{});
  localStorage.clear();
  location.href = 'login.html';
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${token}` }});
    if (!r.ok) { localStorage.clear(); location.href = 'login.html'; return; }
    const d = await r.json();
    currentUser = d.data || d;
    currentUserRoles = (currentUser.roles || []).map(ro => ro.id || ro);
    renderSidebarUser();
    adjustUIForRole();
    await loadConversations();
    connectWebSocket();
  } catch(e) {
    showToast('Error al cargar', 'error');
  }
}

function renderSidebarUser() {
  const detail = currentUser.detail || {};
  const name = detail.name || currentUser.name || 'Usuario';
  const initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('sidebarAvatar').textContent = initials;
  document.getElementById('sidebarName').textContent = name;
  const roles = currentUser.roles || [];
  document.getElementById('sidebarRole').textContent = roles.map(r => r.name || r).join(', ') || '—';
}

function adjustUIForRole() {
  const isClient = currentUserRoles.includes(6) && !currentUserRoles.includes(5) && !currentUserRoles.includes(2) && !currentUserRoles.includes(1);
  const isCoach = currentUserRoles.includes(5);
  const isAdmin = currentUserRoles.includes(1) || currentUserRoles.includes(2);

  if (isClient) {
    // Clients can't create groups, hide new conv button or limit it
    document.getElementById('btnNewConv').style.display = 'none';
  }

  // Setup group target options based on role
  const groupTarget = document.getElementById('groupTarget');
  if (isAdmin) {
    groupTarget.innerHTML = `
      <option value="coaches">Todos los coaches</option>
      <option value="all_clients">Todos los clientes</option>
      <option value="custom">Usuarios específicos</option>`;
  } else if (isCoach) {
    groupTarget.innerHTML = `
      <option value="my_clients">Mis clientes</option>
      <option value="custom">Usuarios específicos</option>`;
  }

  groupTarget.addEventListener('change', () => {
    const custom = groupTarget.value === 'custom';
    document.getElementById('groupCustomSection').style.display = custom ? 'block' : 'none';
  });
}

// ── Conversations ─────────────────────────────────────────────────────────────
async function loadConversations() {
  try {
    const r = await fetch(`${API}/chat/conversations`, { headers: { Authorization: `Bearer ${token}` }});
    const d = await r.json();
    conversations = d.data || [];
    renderConversations(conversations);
  } catch(e) {
    document.getElementById('convList').innerHTML = '<div style="text-align:center;padding:40px;color:#9CA3AF;font-size:13px;">Error al cargar</div>';
  }
}

function renderConversations(convs) {
  const list = document.getElementById('convList');
  if (!convs.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#9CA3AF;font-size:13px;">Sin conversaciones aún</div>';
    return;
  }
  list.innerHTML = convs.map(c => convItemHtml(c)).join('');
}

function convItemHtml(c) {
  const isGroup = c.type === 'group';
  let displayName = c.name || '';
  if (!displayName) {
    const others = (c.participants || []).filter(p => p.user_id !== (currentUser && currentUser.id));
    displayName = others.map(p => p.name).join(', ') || 'Sin nombre';
  }
  const preview = c.last_message ? truncate(c.last_message.content, 40) : 'Sin mensajes';
  const time = c.last_message ? fmtTime(c.last_message.created_at) : '';
  const firstP = c.participants && c.participants[0];
  const avatarHtml = isGroup
    ? `<div class="conv-avatar" style="background:#7C3AED;font-size:11px;">GRP</div>`
    : (firstP && firstP.photo
      ? `<div class="conv-avatar"><img src="${firstP.photo}" alt=""/></div>`
      : `<div class="conv-avatar">${initials(displayName)}</div>`);
  const active = activeConvId === c.id ? 'active' : '';
  return `<div class="conv-item ${active}" onclick="selectConversation('${c.id}')">
    ${avatarHtml}
    <div class="conv-info">
      <div class="conv-name">${esc(displayName)}</div>
      <div class="conv-preview">${esc(preview)}</div>
    </div>
    <div class="conv-meta">
      <span class="conv-time">${time}</span>
      ${isGroup ? '<span class="conv-type-badge">Grupo</span>' : ''}
    </div>
  </div>`;
}

function filterConversations() {
  const q = document.getElementById('convSearch').value.toLowerCase();
  if (!q) { renderConversations(conversations); return; }
  const filtered = conversations.filter(c => {
    const name = c.name || (c.participants||[]).map(p=>p.name).join(' ');
    return name.toLowerCase().includes(q);
  });
  renderConversations(filtered);
}

// ── Select conversation ───────────────────────────────────────────────────────
async function selectConversation(id) {
  activeConvId = id;
  renderConversations(conversations);

  const conv = conversations.find(c => c.id === id);
  if (!conv) return;

  // Show active panel
  document.getElementById('msgEmpty').style.display = 'none';
  const msgActive = document.getElementById('msgActive');
  msgActive.style.display = 'flex';
  msgActive.style.flexDirection = 'column';
  msgActive.style.height = '100vh';

  // Header
  const isGroup = conv.type === 'group';
  let displayName = conv.name || '';
  if (!displayName) {
    const others = (conv.participants || []).filter(p => p.user_id !== (currentUser && currentUser.id));
    displayName = others.map(p => p.name).join(', ') || 'Sin nombre';
  }

  const headerAvatar = document.getElementById('msgHeaderAvatar');
  const firstP = conv.participants && conv.participants.find(p => p.user_id !== (currentUser && currentUser.id));
  if (isGroup) {
    headerAvatar.style.background = '#7C3AED';
    headerAvatar.textContent = 'GRP';
  } else if (firstP && firstP.photo) {
    headerAvatar.innerHTML = `<img src="${firstP.photo}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`;
  } else {
    headerAvatar.textContent = initials(displayName);
  }
  document.getElementById('msgHeaderName').textContent = displayName;
  const sub = isGroup
    ? `Grupo · ${(conv.participants||[]).length} participantes`
    : 'Chat individual';
  document.getElementById('msgHeaderSub').textContent = sub;

  await loadMessages(id);
}

async function loadMessages(convId) {
  const thread = document.getElementById('msgThread');
  thread.innerHTML = '<div style="text-align:center;padding:20px;color:#9CA3AF;font-size:13px;">Cargando…</div>';
  try {
    const r = await fetch(`${API}/chat/conversations/${convId}/messages?per_page=100`, { headers: { Authorization: `Bearer ${token}` }});
    const d = await r.json();
    const msgs = (d.data && d.data.messages) || [];
    thread.innerHTML = '';
    msgs.forEach(m => appendMessage(m, false));
    scrollToBottom();
  } catch(e) {
    thread.innerHTML = '<div style="text-align:center;padding:20px;color:#DC2626;font-size:13px;">Error al cargar mensajes</div>';
  }
}

function appendMessage(msg, scroll) {
  if (activeConvId !== msg.conversation_id) return;
  const thread = document.getElementById('msgThread');
  const isMine = currentUser && msg.sender_user_id === currentUser.id;
  const senderName = msg.sender_name || 'Usuario';
  const time = fmtTime(msg.created_at);
  const avatarContent = msg.sender_photo
    ? `<img src="${msg.sender_photo}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`
    : initials(senderName);

  const el = document.createElement('div');
  el.className = `msg-row${isMine ? ' mine' : ''}`;
  el.innerHTML = `
    <div class="msg-bubble-avatar">${avatarContent}</div>
    <div class="msg-bubble-wrap">
      <div class="msg-sender-name">${esc(senderName)}</div>
      <div class="msg-bubble">${esc(msg.content)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  thread.appendChild(el);
  if (scroll) { scrollToBottom(); }
}

function scrollToBottom() {
  const thread = document.getElementById('msgThread');
  thread.scrollTop = thread.scrollHeight;
}

// ── Send message ──────────────────────────────────────────────────────────────
function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function handleTyping() {
  if (!ws || ws.readyState !== WebSocket.OPEN || !activeConvId) return;
  clearTimeout(typingTimer);
  ws.send(JSON.stringify({ type: 'typing', conversation_id: activeConvId }));
  typingTimer = setTimeout(() => {}, 2000);
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !activeConvId) return;
  input.value = '';

  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ conversation_id: activeConvId, content }));
  } else {
    try {
      const r = await fetch(`${API}/chat/conversations/${activeConvId}/messages`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ content }),
      });
      const d = await r.json();
      if (d.data) {
        appendMessage(d.data, true);
        updateConvPreview(activeConvId, d.data);
      }
    } catch(e) {
      showToast('Error al enviar', 'error');
    }
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWebSocket() {
  if (ws) { try { ws.close(); } catch(e) {} }
  ws = new WebSocket(`${WS_URL}?token=${token}`);

  ws.onopen = () => {
    document.getElementById('wsDot').classList.add('connected');
    document.getElementById('wsLabel').textContent = 'En línea';
    clearTimeout(wsReconnectTimer);
  };

  ws.onclose = () => {
    document.getElementById('wsDot').classList.remove('connected');
    document.getElementById('wsLabel').textContent = 'Desconectado';
    wsReconnectTimer = setTimeout(() => connectWebSocket(), 3000);
  };

  ws.onerror = () => {
    ws.close();
  };

  ws.onmessage = (evt) => {
    try {
      const data = JSON.parse(evt.data);
      if (data.type === 'message') {
        appendMessage(data.message, true);
        updateConvPreview(data.conversation_id, data.message);
      } else if (data.type === 'typing') {
        showTyping(data.conversation_id, data.user_id);
      }
    } catch(e) {}
  };
}

function showTyping(convId, userId) {
  if (convId !== activeConvId) return;
  const el = document.getElementById('typingIndicator');
  const conv = conversations.find(c => c.id === convId);
  const p = conv && (conv.participants||[]).find(p => p.user_id === userId);
  const name = p ? p.name : 'Alguien';
  el.style.display = 'block';
  el.textContent = `${name} está escribiendo…`;
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function updateConvPreview(convId, msg) {
  const conv = conversations.find(c => c.id === convId);
  if (conv) {
    conv.last_message = msg;
    // Move to top
    conversations = [conv, ...conversations.filter(c => c.id !== convId)];
    renderConversations(conversations);
  }
}

// ── Modal ─────────────────────────────────────────────────────────────────────
let convType = 'individual';

function openModal() {
  convType = 'individual';
  selectedIndividualUsers = [];
  groupSelectedUsers = [];
  document.getElementById('userSearch').value = '';
  document.getElementById('userSearchResults').style.display = 'none';
  document.getElementById('selectedUsers').innerHTML = '';
  document.getElementById('groupName').value = '';
  document.getElementById('groupUserSearch') && (document.getElementById('groupUserSearch').value = '');
  document.getElementById('groupSearchResults') && (document.getElementById('groupSearchResults').style.display = 'none');
  document.getElementById('groupSelectedUsers') && (document.getElementById('groupSelectedUsers').innerHTML = '');
  setConvType('individual');
  document.getElementById('modalOverlay').classList.add('open');
  loadAllUsers();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function setConvType(t) {
  convType = t;
  document.getElementById('btnTypeIndividual').classList.toggle('active', t === 'individual');
  document.getElementById('btnTypeGroup').classList.toggle('active', t === 'group');
  document.getElementById('sectionIndividual').style.display = t === 'individual' ? 'block' : 'none';
  document.getElementById('sectionGroup').style.display = t === 'group' ? 'block' : 'none';
}

async function loadAllUsers() {
  try {
    const r = await fetch(`${API}/users/client/findAll`, { headers: { Authorization: `Bearer ${token}` }});
    const d = await r.json();
    allUsers = d.data || [];
  } catch(e) {}
  try {
    const r2 = await fetch(`${API}/users/coach/findAll`, { headers: { Authorization: `Bearer ${token}` }});
    const d2 = await r2.json();
    const coaches = d2.data || [];
    const existingIds = new Set(allUsers.map(u => u.user_id || u.id));
    coaches.forEach(c => {
      const uid = c.user_id || c.id;
      if (!existingIds.has(uid)) { allUsers.push(c); }
    });
  } catch(e) {}
}

function searchUsers() {
  const q = document.getElementById('userSearch').value.toLowerCase();
  const res = document.getElementById('userSearchResults');
  if (!q) { res.style.display = 'none'; return; }
  const filtered = allUsers.filter(u => {
    const name = `${u.name || ''} ${u.last_name || ''}`.toLowerCase();
    const email = (u.email || '').toLowerCase();
    return name.includes(q) || email.includes(q);
  }).slice(0, 8);
  if (!filtered.length) { res.style.display = 'none'; return; }
  const alreadySelected = new Set(selectedIndividualUsers.map(u => u.user_id));
  res.style.display = 'block';
  res.innerHTML = filtered.map(u => {
    const uid = u.user_id || u.id;
    const selected = alreadySelected.has(uid);
    return `<div class="user-result-item ${selected ? 'selected' : ''}" onclick="toggleIndividualUser(${uid}, '${esc(u.name)} ${esc(u.last_name||'')}')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>${esc(u.name)} ${esc(u.last_name||'')} ${u.email ? '· ' + esc(u.email) : ''}</span>
    </div>`;
  }).join('');
}

function toggleIndividualUser(uid, name) {
  const idx = selectedIndividualUsers.findIndex(u => u.user_id === uid);
  if (idx > -1) {
    selectedIndividualUsers.splice(idx, 1);
  } else {
    selectedIndividualUsers.push({ user_id: uid, name: name.trim() });
  }
  renderSelectedUsers();
  searchUsers();
}

function renderSelectedUsers() {
  const el = document.getElementById('selectedUsers');
  el.innerHTML = selectedIndividualUsers.map(u =>
    `<div class="selected-user-chip">${esc(u.name)}<button class="chip-remove" onclick="toggleIndividualUser(${u.user_id}, '${esc(u.name)}')">×</button></div>`
  ).join('');
}

function searchGroupUsers() {
  const q = document.getElementById('groupUserSearch').value.toLowerCase();
  const res = document.getElementById('groupSearchResults');
  if (!q) { res.style.display = 'none'; return; }
  const filtered = allUsers.filter(u => {
    const name = `${u.name || ''} ${u.last_name || ''}`.toLowerCase();
    return name.includes(q);
  }).slice(0, 8);
  if (!filtered.length) { res.style.display = 'none'; return; }
  const alreadySelected = new Set(groupSelectedUsers.map(u => u.user_id));
  res.style.display = 'block';
  res.innerHTML = filtered.map(u => {
    const uid = u.user_id || u.id;
    const selected = alreadySelected.has(uid);
    return `<div class="user-result-item ${selected ? 'selected' : ''}" onclick="toggleGroupUser(${uid}, '${esc(u.name)} ${esc(u.last_name||'')}')">
      <span>${esc(u.name)} ${esc(u.last_name||'')}</span>
    </div>`;
  }).join('');
}

function toggleGroupUser(uid, name) {
  const idx = groupSelectedUsers.findIndex(u => u.user_id === uid);
  if (idx > -1) {
    groupSelectedUsers.splice(idx, 1);
  } else {
    groupSelectedUsers.push({ user_id: uid, name: name.trim() });
  }
  const el = document.getElementById('groupSelectedUsers');
  el.innerHTML = groupSelectedUsers.map(u =>
    `<div class="selected-user-chip">${esc(u.name)}<button class="chip-remove" onclick="toggleGroupUser(${u.user_id}, '${esc(u.name)}')">×</button></div>`
  ).join('');
  searchGroupUsers();
}

async function createConversation() {
  const body = { type: convType };

  if (convType === 'individual') {
    if (!selectedIndividualUsers.length) {
      showToast('Selecciona al menos un usuario', 'error'); return;
    }
    body.participant_user_ids = selectedIndividualUsers.map(u => u.user_id);
  } else {
    const target = document.getElementById('groupTarget').value;
    const name = document.getElementById('groupName').value.trim();
    if (name) { body.name = name; }
    if (target === 'custom') {
      if (!groupSelectedUsers.length) {
        showToast('Selecciona al menos un usuario', 'error'); return;
      }
      body.participant_user_ids = groupSelectedUsers.map(u => u.user_id);
    } else if (target === 'coaches') {
      body.target = 'coaches';
    } else if (target === 'all_clients') {
      body.target = 'clients';
    }
    // my_clients: no participant_user_ids, no target => backend auto-adds coach's clients
  }

  try {
    const r = await fetch(`${API}/chat/conversations`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (d.success) {
      closeModal();
      conversations.unshift(d.data);
      renderConversations(conversations);
      selectConversation(d.data.id);
      showToast('Conversación creada', 'success');
    } else {
      showToast(d.message || 'Error', 'error');
    }
  } catch(e) {
    showToast('Error al crear', 'error');
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function initials(name) {
  return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function truncate(s, n) {
  return s && s.length > n ? s.slice(0, n) + '…' : (s || '');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'ahora';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m`;
  if (diff < 86400000) return d.toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('es', {day:'2-digit',month:'2-digit'});
}

let _toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show${type ? ' '+type : ''}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
