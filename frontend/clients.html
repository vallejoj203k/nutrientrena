<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NutriEntrena — Clientes</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --purple:#5B2D8E;--purple-dark:#4A2475;--purple-light:#7C3AED;
      --purple-pale:#F3EEFF;--gray-bg:#F0F2F5;--sidebar-w:240px;
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray-bg);display:flex;height:100vh;overflow:hidden;}

    /* Sidebar */
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--purple);display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
    .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.1);}
    .sidebar-logo span{font-size:20px;font-weight:900;color:#fff;letter-spacing:1px;font-style:italic;text-transform:uppercase;}
    .sidebar-logo span em{color:#C084FC;font-style:inherit;}
    .sidebar-logo small{display:block;color:rgba(255,255,255,.5);font-size:11px;margin-top:2px;}
    .sidebar-nav{flex:1;padding:16px 0;}
    .nav-section{padding:8px 20px 4px;font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:rgba(255,255,255,.75);cursor:pointer;font-size:14px;transition:all .15s;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
    .nav-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#C084FC;}
    .nav-item svg{opacity:.8;flex-shrink:0;}
    .nav-badge{margin-left:auto;background:#EF4444;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;min-width:18px;text-align:center;}
    .sidebar-user{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);}
    .user-row{display:flex;align-items:center;gap:10px;}
    .user-avatar{width:36px;height:36px;border-radius:50%;background:#C084FC;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;flex-shrink:0;}
    .user-info{flex:1;min-width:0;}
    .user-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .user-role{font-size:11px;color:rgba(255,255,255,.5);}
    .logout-btn{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:4px;border-radius:4px;display:flex;}
    .logout-btn:hover{color:#fff;background:rgba(255,255,255,.1);}

    /* Main */
    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    .topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .topbar h1{font-size:18px;font-weight:700;color:#111;}
    .topbar-right{display:flex;gap:10px;}
    .btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;display:flex;align-items:center;gap:6px;}
    .btn-primary{background:var(--purple);color:#fff;}
    .btn-primary:hover{background:var(--purple-dark);}
    .btn-ghost{background:#F3F4F6;color:#374151;}
    .btn-ghost:hover{background:#E5E7EB;}
    .btn-sm{padding:6px 12px;font-size:12px;}
    .btn-danger{background:#FEE2E2;color:#DC2626;}
    .btn-danger:hover{background:#DC2626;color:#fff;}

    /* Toolbar */
    .toolbar{padding:14px 24px;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;}
    .search-wrap{position:relative;flex:1;min-width:200px;max-width:320px;}
    .search-wrap input{width:100%;padding:9px 12px 9px 36px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;outline:none;transition:.15s;}
    .search-wrap input:focus{border-color:var(--purple);}
    .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9CA3AF;}
    .filter-select{padding:9px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;outline:none;color:#374151;background:#fff;cursor:pointer;}
    .filter-select:focus{border-color:var(--purple);}
    .toolbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .total-label{font-size:13px;color:#6B7280;}
    .btn-csv{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #E5E7EB;background:#fff;color:#374151;display:flex;align-items:center;gap:6px;transition:.15s;}
    .btn-csv:hover{border-color:var(--purple);color:var(--purple);}

    /* Mobile responsive */
    @media(max-width:768px){
      body{flex-direction:column;}
      .sidebar{width:100%;min-width:unset;height:auto;flex-direction:row;flex-wrap:wrap;}
      .sidebar-logo{padding:12px 16px;border-bottom:none;border-right:1px solid rgba(255,255,255,.1);}
      .sidebar-nav{display:none;}
      .sidebar-user{display:none;}
      .main{height:calc(100vh - 56px);}
      .topbar h1{font-size:15px;}
      .toolbar{padding:10px 16px;gap:8px;}
      .search-wrap{min-width:140px;}
      .table-wrap{padding:12px 8px;}
      tbody td{padding:10px 8px;font-size:12px;}
      thead th{padding:10px 8px;font-size:10px;}
      .cell-actions{opacity:1;}
    }

    /* Table */
    .table-wrap{flex:1;overflow-y:auto;padding:20px 24px;}
    .table-wrap::-webkit-scrollbar{width:6px;}
    .table-wrap::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px;}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    thead th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;background:#F9FAFB;border-bottom:1px solid #E5E7EB;white-space:nowrap;}
    thead th:first-child{padding-left:20px;}
    tbody tr{border-bottom:1px solid #F3F4F6;transition:background .1s;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:#FAFAFA;}
    tbody td{padding:14px 16px;font-size:13px;color:#374151;vertical-align:middle;}
    tbody td:first-child{padding-left:20px;}

    /* Cell styles */
    .cell-client{display:flex;align-items:center;gap:12px;}
    .c-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;}
    .c-name{font-weight:600;color:#111;font-size:14px;}
    .c-email{font-size:11px;color:#9CA3AF;margin-top:1px;}
    .status-pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
    .cell-actions{display:flex;gap:6px;opacity:0;transition:.15s;}
    tbody tr:hover .cell-actions{opacity:1;}
    .icon-btn{background:none;border:1px solid #E5E7EB;border-radius:6px;padding:5px 8px;cursor:pointer;color:#6B7280;font-size:12px;transition:.15s;display:flex;align-items:center;gap:4px;}
    .icon-btn:hover{background:var(--purple-pale);color:var(--purple);border-color:var(--purple);}
    .icon-btn.del:hover{background:#FEE2E2;color:#DC2626;border-color:#DC2626;}

    /* Pagination */
    .pagination{padding:14px 24px;background:#fff;border-top:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .page-info{font-size:13px;color:#6B7280;}
    .page-btns{display:flex;gap:4px;}
    .page-btn{width:32px;height:32px;border:1px solid #E5E7EB;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.15s;color:#374151;}
    .page-btn:hover{border-color:var(--purple);color:var(--purple);}
    .page-btn.active{background:var(--purple);color:#fff;border-color:var(--purple);}
    .page-btn:disabled{opacity:.4;cursor:default;}

    /* Skeleton */
    .skeleton{background:linear-gradient(90deg,#E5E7EB 25%,#F3F4F6 50%,#E5E7EB 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* Empty */
    .empty-state{text-align:center;padding:60px 20px;color:#9CA3AF;}
    .empty-state svg{margin-bottom:12px;opacity:.3;}
    .empty-state p{font-size:14px;}

    /* Modal overlay */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:#fff;border-radius:16px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);transform:translateY(20px);transition:.2s;}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-head{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F3F4F6;}
    .modal-head h2{font-size:16px;font-weight:700;color:#111;}
    .modal-close{background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:22px;line-height:1;padding:2px 6px;}
    .modal-close:hover{color:#374151;}
    .modal-body{padding:20px 24px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
    .form-row.full{grid-template-columns:1fr;}
    .form-group label{display:block;font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
    .form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:14px;outline:none;transition:.15s;color:#111;}
    .form-group input:focus,.form-group select:focus{border-color:var(--purple);}
    .modal-footer{padding:16px 24px;border-top:1px solid #F3F4F6;display:flex;justify-content:flex-end;gap:10px;}
    .form-error{font-size:12px;color:#DC2626;margin-top:4px;}

    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;background:#1F2937;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:.3s;z-index:200;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{background:#059669;}
    .toast.error{background:#DC2626;}
  </style>
</head>

<script>
const API = 'https://nutrientrena-production.up.railway.app/api';
let token = localStorage.getItem('token');
if (!token) location.href = 'login.html';

const PAGE_SIZE = 15;
let currentPage = 1;
let allClients = [];
let filtered = [];
let statuses = [];
let searchTimer = null;

const AVATAR_COLORS = ['#7C3AED','#2563EB','#059669','#D97706','#DC2626','#4F46E5','#DB2777','#0D9488'];
const STATUS_COLORS = [
  ['#EFF6FF','#1D4ED8'],['#F0FDF4','#15803D'],['#FFF7ED','#C2410C'],
  ['#FDF4FF','#7E22CE'],['#FEF2F2','#B91C1C'],['#F0FDFA','#0F766E'],
  ['#FFFBEB','#B45309'],['#F5F3FF','#6D28D9'],['#ECFDF5','#047857'],
  ['#FFF1F2','#BE123C'],['#EFF6FF','#1E40AF'],['#FDF2F8','#9D174D'],
  ['#F0FDF4','#166534'],['#FAFAFA','#525252'],['#FEF3C7','#92400E'],
];

// ── Auth ─────────────────────────────────────────────────────────────────────
async function loadUser() {
  try {
    const r = await fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${token}` }});
    if (r.status === 401) { logout(); return; }
    const j = await r.json();
    const u = j.data || j;
    const name = u.name || u.full_name || 'Usuario';
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('sidebarRole').textContent = u.role?.name || u.role || '—';
    document.getElementById('sidebarAvatar').textContent = name.charAt(0).toUpperCase();
  } catch {}
}

function logout() {
  fetch(`${API}/auth/logout`, { method:'POST', headers:{ Authorization:`Bearer ${token}` }}).catch(()=>{});
  localStorage.clear();
  location.href = 'login.html';
}

// ── Load coaches ──────────────────────────────────────────────────────────────
async function loadCoaches() {
  try {
    const r = await fetch(`${API}/users/coach/findAll`, { headers: { Authorization: `Bearer ${token}` }});
    if (!r.ok) return;
    const j = await r.json();
    const coaches = j.data || j || [];
    const sel = document.getElementById('coachFilter');
    (Array.isArray(coaches) ? coaches : []).forEach(c => {
      const name = `${c.first_name||c.name||''} ${c.last_name||''}`.trim();
      const o = document.createElement('option');
      o.value = name;
      o.textContent = name || c.id;
      sel.appendChild(o);
    });
  } catch {}
}

// ── Load statuses ─────────────────────────────────────────────────────────────
async function loadStatuses() {
  try {
    const r = await fetch(`${API}/parameters/search?q=Estado+del+Cliente`, { headers: { Authorization: `Bearer ${token}` }});
    if (!r.ok) return;
    const j = await r.json();
    const items = (j.data || j)?.details || j.data || [];
    statuses = Array.isArray(items) ? items : [];
    const sel = document.getElementById('statusFilter');
    statuses.forEach(s => {
      const o = document.createElement('option');
      o.value = s.id;
      o.textContent = s.description || s.name;
      sel.appendChild(o);
    });
  } catch {}
}

// ── Load clients ──────────────────────────────────────────────────────────────
async function load() {
  renderSkeleton();
  try {
    const r = await fetch(`${API}/users/client/findAll`, { headers: { Authorization: `Bearer ${token}` }});
    if (r.status === 401) { logout(); return; }
    const j = await r.json();
    allClients = j.data || j || [];
    if (!Array.isArray(allClients)) allClients = [];
    applyFilters();
  } catch {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="6" style="text-align:center;padding:40px;color:#9CA3AF;">Error al cargar clientes</td></tr>`;
  }
}

function applyFilters() {
  const q        = document.getElementById('searchInput').value.toLowerCase();
  const statusId = document.getElementById('statusFilter').value;
  const coachVal = document.getElementById('coachFilter').value.toLowerCase();

  filtered = allClients.filter(c => {
    const name = `${c.first_name||''} ${c.last_name||''} ${c.email||''}`.toLowerCase();
    const coach = (c.coach_name || '').toLowerCase();
    const matchQ     = !q        || name.includes(q);
    const matchS     = !statusId || String(c.status_id) === statusId;
    const matchCoach = !coachVal || coach.includes(coachVal);
    return matchQ && matchS && matchCoach;
  });

  currentPage = 1;
  renderTable();
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 250);
}

function renderSkeleton() {
  const rows = Array(8).fill(0).map(() => `
    <tr>
      <td><div style="display:flex;align-items:center;gap:12px;">
        <div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div>
        <div><div class="skeleton" style="width:120px;height:14px;margin-bottom:5px;"></div>
        <div class="skeleton" style="width:160px;height:11px;"></div></div>
      </div></td>
      <td><div class="skeleton" style="width:100px;height:22px;border-radius:20px;"></div></td>
      <td><div class="skeleton" style="width:90px;height:14px;"></div></td>
      <td><div class="skeleton" style="width:50px;height:14px;"></div></td>
      <td><div class="skeleton" style="width:80px;height:14px;"></div></td>
      <td></td>
    </tr>
  `).join('');
  document.getElementById('tableBody').innerHTML = rows;
  document.getElementById('emptyState').style.display = 'none';
}

function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const total = filtered.length;

  document.getElementById('totalLabel').textContent = `${total} cliente${total !== 1 ? 's' : ''}`;
  document.getElementById('pageInfo').textContent =
    total === 0 ? 'Sin resultados' : `Mostrando ${start + 1}–${Math.min(start + PAGE_SIZE, total)} de ${total}`;

  if (total === 0) {
    document.getElementById('tableBody').innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('pageBtns').innerHTML = '';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';

  document.getElementById('tableBody').innerHTML = page.map((c, i) => {
    const name = `${c.first_name || ''} ${c.last_name || ''}`.trim() || 'Sin nombre';
    const initials = name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
    const color = AVATAR_COLORS[(start + i) % AVATAR_COLORS.length];
    const statusName = getStatusName(c.status_id);
    const [sbg, sfg] = STATUS_COLORS[(c.status_id || 1) % STATUS_COLORS.length];
    const date = c.created_at ? new Date(c.created_at).toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric' }) : '—';

    return `
      <tr>
        <td>
          <div class="cell-client">
            <div class="c-avatar" style="background:${color};">${initials}</div>
            <div>
              <div class="c-name">${esc(name)}</div>
              <div class="c-email">${esc(c.email || '—')}</div>
            </div>
          </div>
        </td>
        <td>
          ${statusName
            ? `<span class="status-pill" style="background:${sbg};color:${sfg};">${esc(statusName)}</span>`
            : '<span style="color:#9CA3AF;font-size:12px;">—</span>'}
        </td>
        <td style="color:#6B7280;">${esc(c.coach_name || '—')}</td>
        <td style="color:#6B7280;">${c.training_weeks || '—'}</td>
        <td style="color:#6B7280;font-size:12px;">${date}</td>
        <td>
          <div class="cell-actions">
            <button class="icon-btn" onclick="viewClient('${c.id}')" title="Ver perfil">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              Ver
            </button>
            <button class="icon-btn" onclick="goKanban('${c.id}')" title="Ver en Kanban">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="5" height="18"/><rect x="10" y="3" width="5" height="12"/><rect x="17" y="3" width="5" height="15"/></svg>
              Kanban
            </button>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  renderPagination(total);
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  if (pages <= 1) { document.getElementById('pageBtns').innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
  for (let i = 1; i <= pages; i++) {
    if (pages > 7 && Math.abs(i - currentPage) > 2 && i !== 1 && i !== pages) {
      if (i === 2 || i === pages - 1) html += `<span style="padding:0 4px;color:#9CA3AF;">…</span>`;
      continue;
    }
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>›</button>`;
  document.getElementById('pageBtns').innerHTML = html;
}

function goPage(p) {
  const pages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderTable();
  document.querySelector('.table-wrap').scrollTop = 0;
}

function getStatusName(id) {
  const s = statuses.find(x => x.id == id);
  return s ? (s.description || s.name) : null;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function viewClient(id) {
  location.href = `client-profile.html?id=${id}`;
}

function goKanban(id) {
  location.href = `kanban.html`;
}

// ── Create Modal ──────────────────────────────────────────────────────────────
function openCreateModal() {
  ['fFirstName','fLastName','fEmail','fPassword','fPhone','fGender','fGoal'].forEach(id => {
    document.getElementById(id).value = '';
  });
  ['errFirstName','errLastName','errEmail','errPassword','errGeneral'].forEach(id => {
    document.getElementById(id).textContent = '';
  });
  document.getElementById('modalTitle').textContent = 'Nuevo cliente';
  document.getElementById('saveBtn').textContent = 'Crear cliente';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fFirstName').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function saveClient() {
  const firstName = document.getElementById('fFirstName').value.trim();
  const lastName  = document.getElementById('fLastName').value.trim();
  const email     = document.getElementById('fEmail').value.trim();
  const password  = document.getElementById('fPassword').value;
  const phone     = document.getElementById('fPhone').value.trim();
  const gender    = document.getElementById('fGender').value;
  const goal      = document.getElementById('fGoal').value;

  let ok = true;
  const setErr = (id, msg) => { document.getElementById(id).textContent = msg; if (msg) ok = false; };
  setErr('errFirstName', firstName ? '' : 'Campo requerido');
  setErr('errLastName',  lastName  ? '' : 'Campo requerido');
  setErr('errEmail',     email     ? '' : 'Campo requerido');
  setErr('errPassword',  password.length >= 8 ? '' : 'Mínimo 8 caracteres');
  setErr('errGeneral', '');
  if (!ok) return;

  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Creando…';
  btn.disabled = true;

  try {
    const body = { first_name: firstName, last_name: lastName, email, password, role_id: 6 };
    if (phone)  body.phone  = phone;
    if (gender) body.gender = gender;
    if (goal)   body.goal   = goal;

    const r = await fetch(`${API}/users`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify(body),
    });
    const j = await r.json();
    if (!r.ok) {
      setErr('errGeneral', j.detail || j.message || 'Error al crear el cliente');
      return;
    }
    closeModal();
    toast('Cliente creado correctamente', 'success');
    await load();
  } catch {
    setErr('errGeneral', 'Error de conexión');
  } finally {
    btn.textContent = 'Crear cliente';
    btn.disabled = false;
  }
}

// ── CSV Export ────────────────────────────────────────────────────────────────
function exportCSV() {
  if (!filtered.length) { toast('No hay clientes para exportar', 'error'); return; }

  const headers = ['Nombre','Apellido','Email','Teléfono','Estado','Coach','Semanas','Registro'];
  const rows = filtered.map(c => [
    c.first_name || '',
    c.last_name  || '',
    c.email      || '',
    c.phone      || '',
    getStatusName(c.status_id) || '',
    c.coach_name || '',
    c.training_weeks || '',
    c.created_at ? new Date(c.created_at).toLocaleDateString('es-CO') : '',
  ]);

  const csv = [headers, ...rows]
    .map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
    .join('\n');

  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `clientes_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`${filtered.length} clientes exportados`, 'success');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type || ''}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ── Badge: formularios pendientes ─────────────────────────────────────────────
async function loadPendingBadge() {
  try {
    const r = await fetch(`${API}/form-assignments?status=pending&per_page=1`, { headers: { Authorization: `Bearer ${token}` }});
    if (!r.ok) return;
    const j = await r.json();
    const total = j?.data?.total || j?.total || 0;
    const badge = document.getElementById('formsBadge');
    if (badge && total > 0) { badge.textContent = total > 99 ? '99+' : total; badge.style.display = 'inline-block'; }
  } catch {}
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadUser();
loadCoaches();
loadStatuses().then(() => load());
loadPendingBadge();
</script>
