<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <title>NutriEntrena — Chat</title>
  <script>
    (function(){ var t=localStorage.getItem('token'),r=localStorage.getItem('role_id')||'';
      if(!t){location.replace('login.html');return;} if(r&&r!=='6'){location.replace('dashboard.html');} })();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--indigo:#4F46E5;--indigo-dark:#4338CA;--indigo-pale:#EEF2FF;--green:#059669;--green-pale:#D1FAE5;--amber:#F59E0B;--red:#DC2626;--gray-bg:#F8FAFC;--sidebar-w:240px;}
    body{font-family:'Space Grotesk','Segoe UI',system-ui,sans-serif;background:var(--gray-bg);display:flex;height:100vh;overflow:hidden;}
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
    .sidebar-logo{display:flex;align-items:center;gap:11px;padding:18px 18px 16px;border-bottom:1px solid #EBEBEB;}
    .sl-mark{width:40px;height:40px;border-radius:9px;background:url('logo.webp') no-repeat 50% 41%;background-size:210px;flex-shrink:0;}
    .sl-txt{display:flex;flex-direction:column;line-height:1.15;}
    .sl-txt b{font-size:17px;font-weight:800;letter-spacing:.3px;}
    .sl-txt b .n1{color:var(--indigo);}.sl-txt b .n2{color:var(--green);}
    .sl-txt small{color:#6B7280;font-size:11px;margin-top:2px;}
    .sidebar-nav{flex:1;padding:12px 0;}
    .nav-section{padding:12px 20px 4px;font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#374151;cursor:pointer;font-size:14px;transition:all .15s;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:#F8FAFC;color:var(--indigo);}
    .nav-item.active{background:#EEF2FF;color:var(--indigo);border-left-color:var(--indigo);font-weight:600;}
    .nav-item svg{flex-shrink:0;opacity:.75;}
    .nav-item.active svg,.nav-item:hover svg{opacity:1;}
    .nav-item.disabled{opacity:.6;cursor:default;}
    .nav-item.disabled:hover{background:none;color:#374151;}
    .nav-soon-tag{margin-left:auto;font-size:9px;font-weight:700;color:#9CA3AF;background:#F3F4F6;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;}
    .sidebar-user{padding:14px 20px;border-top:1px solid #F3F4F6;display:flex;align-items:center;gap:10px;}
    .s-avatar{width:34px;height:34px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0;overflow:hidden;}
    .s-avatar img{width:100%;height:100%;object-fit:cover;}
    .user-info{flex:1;min-width:0;}.user-name{color:#111827;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.user-role{color:#6B7280;font-size:11px;}
    .logout-btn{background:none;border:none;color:#9CA3AF;cursor:pointer;padding:4px;border-radius:4px;display:flex;}
    .logout-btn:hover{color:#EF4444;}

    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    .topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 28px;height:64px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
    .menu-btn{display:none;background:none;border:none;cursor:pointer;color:#374151;padding:6px;border-radius:8px;}
    .menu-btn:hover{background:#F3F4F6;}
    .topbar-title{font-size:17px;font-weight:800;color:#111827;flex:1;}

    /* Cabecera del coach */
    .chat-head{display:flex;align-items:center;gap:12px;padding:16px 28px;background:#fff;border-bottom:1px solid #E5E7EB;flex-shrink:0;}
    .ch-avatar{position:relative;width:46px;height:46px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;flex-shrink:0;overflow:hidden;}
    .ch-avatar img{width:100%;height:100%;object-fit:cover;}
    .ch-dot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid #fff;}
    .ch-name{font-size:16px;font-weight:800;color:#111827;}
    .ch-status{font-size:12px;color:#6B7280;margin-top:2px;display:flex;align-items:center;gap:5px;}
    .ch-status .live{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;}

    /* Zona de mensajes */
    .chat-body{flex:1;overflow-y:auto;padding:22px 0;background:#F1F2F5;}
    .chat-inner{max-width:760px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:2px;}
    .sep{text-align:center;font-size:11px;color:#9CA3AF;font-weight:600;margin:14px 0 8px;}
    .msg{display:flex;flex-direction:column;max-width:74%;margin-bottom:2px;}
    .msg.them{align-items:flex-start;align-self:flex-start;}
    .msg.me{align-items:flex-end;align-self:flex-end;}
    .msg-sender{font-size:11px;color:#9CA3AF;font-weight:600;margin:6px 2px 3px;}
    .bubble{padding:11px 15px;border-radius:16px;font-size:14.5px;line-height:1.45;word-wrap:break-word;white-space:pre-wrap;}
    .msg.them .bubble{background:#fff;color:#1F2937;border:1px solid #EAECEF;border-bottom-left-radius:5px;}
    .msg.me .bubble{background:var(--indigo);color:#fff;border-bottom-right-radius:5px;}
    .msg-time{font-size:10.5px;color:#9CA3AF;margin:3px 3px 0;}
    .chat-empty{text-align:center;color:#9CA3AF;font-size:14px;padding:60px 20px;}
    .chat-empty svg{opacity:.4;margin-bottom:12px;}

    /* Barra de escritura */
    .composer{flex-shrink:0;background:#fff;border-top:1px solid #E5E7EB;padding:14px 24px;}
    .composer-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:10px;}
    .composer input{flex:1;padding:13px 18px;border:1px solid #E5E7EB;border-radius:26px;font-size:14.5px;color:#111;outline:none;font-family:inherit;background:#F3F4F6;}
    .composer input:focus{border-color:var(--indigo);background:#fff;}
    .send-btn{width:46px;height:46px;border-radius:50%;border:none;background:var(--indigo);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;}
    .send-btn:hover{background:var(--indigo-dark);}
    .send-btn:disabled{opacity:.5;cursor:default;}

    .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#1F2937;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:400;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .toast.err{background:#DC2626;}

    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;}
    .sidebar-overlay.open{display:block;}
    @media(max-width:768px){
      .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);transition:transform .25s;z-index:200;}
      .sidebar.open{transform:translateX(0);}
      .menu-btn{display:flex;align-items:center;justify-content:center;}
      .chat-head{padding:14px 16px;}
      .chat-inner,.composer-inner{padding-left:14px;padding-right:14px;}
      .msg{max-width:82%;}
    }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sl-mark" role="img" aria-label="NutriEntrena"></div>
    <div class="sl-txt"><b><span class="n1">NUTRI</span><span class="n2">ENTRENA</span></b><small>Mi espacio</small></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Principal</div>
    <a class="nav-item" href="client-home.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/></svg>Inicio</a>
    <div class="nav-section">Mi plan</div>
    <a class="nav-item" href="client-entrena.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6.5 6.5 17.5 17.5M4 12l-1.5 1.5a2.12 2.12 0 0 0 3 3L7 18M17 6l1-1a2.12 2.12 0 0 1 3 3l-1 1"/><path d="m8 8 8 8"/></svg>Entrena</a>
    <a class="nav-item" href="client-nutricion.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4Z"/><path d="M6 2v2M10 2v2M14 2v2"/></svg>Nutrición</a>
    <div class="nav-section">Seguimiento</div>
    <a class="nav-item" href="client-progreso.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></svg>Progreso</a>
    <div class="nav-section">Comunicación</div>
    <a class="nav-item active" href="client-chat.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</a>
      <div class="nav-section">Cuenta</div>
    <a class="nav-item" href="client-perfil.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Perfil</a>
</nav>
  <div class="sidebar-user">
    <div class="s-avatar" id="sidebarAvatar">C</div>
    <div class="user-info"><div class="user-name" id="sidebarName">Cargando…</div><div class="user-role">Cliente</div></div>
    <button class="logout-btn" onclick="logout()" title="Cerrar sesión"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menú"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="topbar-title">Chat</div>
  </div>

  <div class="chat-head">
    <div class="ch-avatar" id="coachAvatar">S<span class="ch-dot"></span></div>
    <div>
      <div class="ch-name" id="coachName">Tu coach</div>
      <div class="ch-status" id="coachStatus"><span class="live"></span> Activo</div>
    </div>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="chat-inner" id="chatInner">
      <div class="chat-empty">Cargando conversación…</div>
    </div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <input id="msgInput" type="text" placeholder="Escribe a tu coach…" autocomplete="off" onkeydown="if(event.key==='Enter')enviar()"/>
      <button class="send-btn" id="sendBtn" onclick="enviar()" title="Enviar">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://nutrientrena-production.up.railway.app/api';
  const token = localStorage.getItem('token');
  const headers = () => ({ Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' });
  function esc(s){ if(s==null)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function logout(){ localStorage.clear(); location.href='login.html'; }
  function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
  function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
  let _tt; function toast(msg,err){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(err?' err':''); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2400); }

  let _convId=null, _coach=null, _msgs=[], _poll=null, _lastCount=-1;

  const _DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  function dayLabel(d){
    var today=new Date(); today.setHours(0,0,0,0);
    var that=new Date(d); that.setHours(0,0,0,0);
    var diff=Math.round((today-that)/86400000);
    if(diff===0) return 'Hoy';
    if(diff===1) return 'Ayer';
    return _DAYS[that.getDay()]+' '+that.getDate()+'/'+(that.getMonth()+1);
  }
  function hhmm(d){ return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

  function renderMessages(keepScroll){
    var box=document.getElementById('chatInner');
    if(!_msgs.length){
      box.innerHTML='<div class="chat-empty"><svg width="46" height="46" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><br>Aún no hay mensajes.<br>Escríbele a tu coach para empezar.</div>';
      return;
    }
    var coachId=_coach&&_coach.user_id;
    var html='', lastDay=null;
    _msgs.forEach(function(m){
      var d=m.created_at?new Date(m.created_at):new Date();
      var dl=dayLabel(d);
      if(dl!==lastDay){ html+='<div class="sep">'+dl+'</div>'; lastDay=dl; }
      var mine=(m.sender_user_id!==coachId);
      html+='<div class="msg '+(mine?'me':'them')+'">'
        + (mine?'':'<div class="msg-sender">'+esc(m.sender_name||(_coach&&_coach.name)||'Coach')+'</div>')
        + '<div class="bubble">'+esc(m.content)+'</div>'
        + '<div class="msg-time">'+hhmm(d)+'</div>'
        + '</div>';
    });
    box.innerHTML=html;
    var body=document.getElementById('chatBody');
    if(keepScroll!==false) body.scrollTop=body.scrollHeight;
  }

  function applyCoach(){
    if(!_coach) return;
    document.getElementById('coachName').textContent=_coach.name||'Tu coach';
    var av=document.getElementById('coachAvatar');
    if(_coach.photo){ av.innerHTML='<img src="'+esc(_coach.photo)+'" alt=""><span class="ch-dot"></span>'; av.style.background='transparent'; }
    else { av.innerHTML=esc(_coach.initials||(_coach.name||'C').trim()[0]||'C')+'<span class="ch-dot"></span>'; }
  }

  async function loadMessages(initial){
    if(!_convId) return;
    try{
      const r=await fetch(API+'/chat/conversations/'+_convId+'/messages?per_page=200',{headers:headers()});
      const d=await r.json();
      var list=(d.data&&d.data.messages)||[];
      // Solo re-render si cambió el número de mensajes (evita parpadeo).
      if(list.length!==_lastCount){
        _msgs=list; _lastCount=list.length; renderMessages(true);
        markRead();
      }
    }catch(e){ if(initial) document.getElementById('chatInner').innerHTML='<div class="chat-empty">No se pudo cargar el chat.</div>'; }
  }

  async function markRead(){
    if(!_convId) return;
    try{ await fetch(API+'/chat/conversations/'+_convId+'/read',{method:'POST',headers:headers()}); }catch(e){}
    if(window.refreshChatUnread) window.refreshChatUnread();
  }

  async function enviar(){
    var inp=document.getElementById('msgInput');
    var txt=(inp.value||'').trim();
    if(!txt || !_convId) return;
    var btn=document.getElementById('sendBtn'); btn.disabled=true;
    inp.value='';
    try{
      const r=await fetch(API+'/chat/conversations/'+_convId+'/messages',{method:'POST',headers:headers(),body:JSON.stringify({content:txt})});
      if(!r.ok) throw new Error();
      await loadMessages(false);
    }catch(e){ inp.value=txt; toast('No se pudo enviar', true); }
    finally{ btn.disabled=false; inp.focus(); }
  }

  async function loadProfile(){
    try{ const r=await fetch(API+'/auth/me',{headers:headers()}); const d=await r.json(); const u=d.data||d;
      const name=u.name||u.email||'Cliente'; document.getElementById('sidebarName').textContent=name;
      const sav=document.getElementById('sidebarAvatar');
      if(u.photo){sav.innerHTML='<img src="'+u.photo+'" alt="">';sav.style.background='transparent';}else{sav.textContent=(name.trim()[0]||'C').toUpperCase();}
    }catch(e){}
  }

  async function initChat(){
    try{
      const r=await fetch(API+'/client/chat',{headers:headers()});
      const d=await r.json();
      _convId=(d.data&&d.data.conversation_id)||null;
      _coach=(d.data&&d.data.coach)||null;
      applyCoach();
      if(!_convId){
        document.getElementById('coachStatus').innerHTML='Sin coach asignado';
        document.getElementById('chatInner').innerHTML='<div class="chat-empty">Todavía no tienes un coach asignado.<br>Cuando lo tengas, podrás escribirle por aquí.</div>';
        document.getElementById('msgInput').disabled=true; document.getElementById('sendBtn').disabled=true;
        return;
      }
      await loadMessages(true);
      _poll=setInterval(function(){ loadMessages(false); }, 8000);
    }catch(e){
      document.getElementById('chatInner').innerHTML='<div class="chat-empty">No se pudo abrir el chat.</div>';
    }
  }

  loadProfile(); initChat();
  window.addEventListener('beforeunload', function(){ if(_poll) clearInterval(_poll); });
</script>
<script>
/* CHAT_UNREAD_BADGE — badge rojo de mensajes de chat no leídos en el panel */
(function(){
  var API='https://nutrientrena-production.up.railway.app/api';
  var token=localStorage.getItem('token'); if(!token) return;
  function attach(){
    var link=document.querySelector('a[href="chat.html"], a[href="client-chat.html"]');
    if(!link){ return; }
    var dot=document.createElement('span');
    dot.setAttribute('data-chat-unread','');
    dot.style.cssText='display:none;margin-left:auto;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#DC2626;color:#fff;font-size:10px;font-weight:700;line-height:18px;text-align:center;';
    link.appendChild(dot);
    function refresh(){
      fetch(API+'/chat/unread-count',{headers:{Authorization:'Bearer '+token}})
        .then(function(r){return r.json();})
        .then(function(d){
          var n=(d&&d.data&&d.data.total)||0;
          if(n>0){ dot.style.display='inline-block'; dot.textContent=n>99?'99+':String(n); }
          else { dot.style.display='none'; dot.textContent=''; }
        }).catch(function(){});
    }
    window.refreshChatUnread=refresh;
    refresh();
    setInterval(refresh, 20000);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',attach);
  else attach();
})();
</script>
</body>
</html>
