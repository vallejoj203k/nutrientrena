name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-verify:
    name: Lint & Import Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check app/ --select E,F,W --ignore E501,F401

      - name: Verify all models import cleanly
        env:
          DATABASE_URL: "sqlite:///./ci_check.db"
          SECRET_KEY: ci-secret-key
        run: |
          python -c "
          import app.models
          from app.database import Base
          tables = list(Base.metadata.tables.keys())
          print(f'✅ {len(tables)} tablas registradas')
          assert len(tables) >= 33, f'Expected at least 33 tables, got {len(tables)}'
          "

      - name: Verify app loads all routes
        env:
          DATABASE_URL: "sqlite:///./ci_check.db"
          SECRET_KEY: ci-secret-key
        run: |
          python -c "
          from app.main import app
          routes = [r for r in app.routes if hasattr(r, 'path')]
          print(f'✅ {len(routes)} rutas registradas')
          assert len(routes) >= 50, f'Expected at least 50 routes, got {len(routes)}'
          "

      - name: Verify migration file exists
        run: |
          python -c "
          import glob
          files = glob.glob('alembic/versions/*.py')
          assert len(files) >= 1, 'No migration files found'
          print(f'✅ {len(files)} migracion(es) encontrada(s)')
          "

  test:
    name: Pytest Suite
    runs-on: ubuntu-latest
    needs: lint-and-verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite:///./test_nutrientrena.db"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_BUCKET: "test-bucket"
          RESEND_API_KEY: "test"
        run: |
          pytest tests/ --tb=short -q \
            --cov=app --cov-report=term-missing \
            --cov-fail-under=40

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
