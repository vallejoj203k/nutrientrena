<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALZUM.io — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Panel izquierdo ── */
    .left {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ── Panel derecho ── */
    .right {
      width: 480px;
      min-width: 380px;
      background: #F3F4F6;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .form-box {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Logo */
    .logo-banner {
      background: #4F46E5;
      border-radius: 10px;
      padding: 18px 24px;
      text-align: center;
    }
    .logo-text {
      font-size: 32px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-style: italic;
    }
    .logo-text span {
      color: #818CF8;
    }

    /* Inputs */
    .input-group {
      position: relative;
    }
    .input-group svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #9CA3AF;
      pointer-events: none;
    }
    .input-group input {
      width: 100%;
      padding: 14px 14px 14px 42px;
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
      color: #111827;
      outline: none;
      transition: border-color .2s;
    }
    .input-group input::placeholder { color: #9CA3AF; }
    .input-group input:focus { border-color: #4F46E5; }

    /* Botón login */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: #4F46E5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .2s, transform .1s;
      letter-spacing: .5px;
    }
    .btn-login:hover   { background: #4338CA; }
    .btn-login:active  { transform: scale(.98); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Link recuperar */
    .forgot {
      text-align: center;
      font-size: 13px;
      color: #6B7280;
    }
    .forgot a {
      color: #4F46E5;
      text-decoration: none;
      font-weight: 500;
    }
    .forgot a:hover { text-decoration: underline; }

    /* Error */
    .error-msg {
      background: #FEE2E2;
      border: 1px solid #FECACA;
      color: #DC2626;
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 14px;
      display: none;
    }

    /* Success */
    .success-msg {
      background: #DCFCE7;
      border: 1px solid #BBF7D0;
      color: #16A34A;
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 14px;
      display: none;
    }

    /* Responsive */
    @media (max-width: 720px) {
      .left { display: none; }
      .right { width: 100%; }
    }
  </style>
  <style>
    /* ALZUM.io — theme overrides */
    body { background: #F8FAFC !important; }
    .sidebar {
      background: #fff !important;
      border-right: 1px solid #E5E7EB !important;
    }
    .sidebar-logo span { color: #111827 !important; }
    .sidebar-logo span em, .sidebar-logo span span { color: #4F46E5 !important; }
    .sidebar-logo small { color: #6B7280 !important; }
    .nav-section { color: #9CA3AF !important; }
    .nav-item { color: #374151 !important; }
    .nav-item svg { color: inherit !important; opacity: 1 !important; }
    .nav-item:hover { background: #F3F4F6 !important; color: #4F46E5 !important; }
    .nav-item.active { background: #EEF2FF !important; color: #4F46E5 !important; border-left-color: #4F46E5 !important; }
    .sidebar-user { border-top: 1px solid #E5E7EB !important; }
    .avatar, .user-avatar { background: #4F46E5 !important; }
    .user-name { color: #111827 !important; }
    .user-role { color: #6B7280 !important; }
    .btn-logout { color: #6B7280 !important; }
    .btn-logout:hover { color: #4F46E5 !important; }
  </style>
</head>
<body>

  <!-- Panel izquierdo -->
  <div class="left">
    <img src="panel_login.jpg" alt="ALZUM.io" />
  </div>

  <!-- Panel derecho -->
  <div class="right">
    <div class="form-box">

      <div class="logo-banner">
        <div class="logo-text">ALZUM<span>.io</span></div>
      </div>

      <div class="error-msg"   id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="input-group">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input id="emailInput" type="email" placeholder="usuario" autocomplete="email" />
      </div>

      <div class="input-group">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input id="passInput" type="password" placeholder="password" autocomplete="current-password" />
      </div>

      <button class="btn-login" id="loginBtn" onclick="doLogin()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        <span id="btnText">Login</span>
        <div class="spinner" id="spinner"></div>
      </button>

      <div class="forgot">
        <a href="#" onclick="doRecover(); return false;">¿Olvidaste tu contraseña?</a>
      </div>

    </div>
  </div>

  <script>
    const API = 'https://nutrientrena-production.up.railway.app';

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
    }

    function setLoading(val) {
      const btn  = document.getElementById('loginBtn');
      const txt  = document.getElementById('btnText');
      const spin = document.getElementById('spinner');
      btn.disabled    = val;
      txt.style.display  = val ? 'none' : 'inline';
      spin.style.display = val ? 'block' : 'none';
    }

    async function doLogin() {
      const email    = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passInput').value;

      if (!email || !password) {
        showError('Por favor completa todos los campos.');
        return;
      }

      setLoading(true);
      document.getElementById('errorMsg').style.display   = 'none';
      document.getElementById('successMsg').style.display = 'none';

      try {
        const res  = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok || !data.success) {
          showError(data.message || 'Credenciales incorrectas.');
          return;
        }

        localStorage.setItem('token',         data.data.token);
        localStorage.setItem('refresh_token', data.data.refresh_token);

        // Fetch role to adapt sidebar on all pages
        try {
          const me = await fetch(`${API}/api/auth/me`, { headers: { Authorization: `Bearer ${data.data.token}` } });
          const mj = await me.json();
          const md = mj.data || mj;
          const roleId = md.roles?.[0]?.id || 0;
          localStorage.setItem('role_id', roleId);
        } catch {}

        showSuccess('¡Bienvenido! Redirigiendo...');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);

      } catch (e) {
        showError('Error de conexión. Verifica tu internet.');
      } finally {
        setLoading(false);
      }
    }

    async function doRecover() {
      const email = document.getElementById('emailInput').value.trim();
      if (!email) {
        showError('Escribe tu email primero.');
        return;
      }
      try {
        const res  = await fetch(`${API}/api/auth/recover-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        showSuccess(data.message || 'Correo enviado. Revisa tu bandeja de entrada.');
      } catch {
        showError('Error al enviar el correo.');
      }
    }

    // Enter para hacer login
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
