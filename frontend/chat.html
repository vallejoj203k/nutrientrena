<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ALZUM.io — Chat</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --indigo:#4F46E5;--indigo-dark:#4338CA;--indigo-light:#6366F1;
      --indigo-pale:#EEF2FF;--gray-bg:#F8FAFC;--sidebar-w:240px;
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray-bg);display:flex;height:100vh;overflow:hidden;}

    /* ── Sidebar ── */
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
    .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid #EBEBEB;}
    .sidebar-logo span{font-size:20px;font-weight:900;color:#111827;letter-spacing:1px;font-style:italic;text-transform:uppercase;}
    .sidebar-logo span em{color:var(--indigo);font-style:inherit;}
    .sidebar-logo small{display:block;color:#6B7280;font-size:11px;margin-top:2px;}
    .sidebar-nav{flex:1;padding:12px 0;}
    .nav-section{padding:8px 20px 4px;font-size:10px;color:#6B7280;text-transform:uppercase;letter-spacing:1px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#374151;cursor:pointer;font-size:14px;transition:all .15s;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:#F8FAFC;color:var(--indigo);}
    .nav-item.active{background:#EEF2FF;color:var(--indigo);border-left-color:var(--indigo);font-weight:600;}
    .nav-item svg{flex-shrink:0;opacity:.7;}
    .nav-item.active svg,.nav-item:hover svg{opacity:1;}
    .sidebar-user{padding:14px 20px;border-top:1px solid #F3F4F6;display:flex;align-items:center;gap:10px;}
    .s-avatar{width:34px;height:34px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0;}
    .user-info{flex:1;min-width:0;}
    .user-name{color:#111827;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .user-role{color:#6B7280;font-size:11px;}
    .logout-btn{background:none;border:none;color:#9CA3AF;cursor:pointer;padding:4px;border-radius:4px;}
    .logout-btn:hover{color:#EF4444;}

    /* ── Chat layout ── */
    .chat-container{flex:1;display:flex;height:100vh;overflow:hidden;}

    /* ── Conversations panel ── */
    .conv-panel{width:300px;min-width:300px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;}
    .conv-header{padding:16px;border-bottom:1px solid var(--border);}
    .conv-header h2{font-size:16px;font-weight:700;color:#111827;margin-bottom:10px;}

    /* ── New chat buttons ── */
    .new-chat-btns{display:flex;gap:8px;}
    .new-chat-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 10px;border:2px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#374151;transition:all .15s;}
    .new-chat-btn:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-light);}
    .new-chat-btn.active{border-color:var(--purple);color:var(--purple);background:var(--purple-light);}

    /* ── Inline new chat panel ── */
    .new-chat-panel{border-bottom:1px solid var(--border);background:#FAFAFA;animation:slideDown .15s ease;}
    @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .new-chat-panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;font-size:13px;font-weight:700;color:#374151;}
    .new-chat-panel-header button{background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:18px;line-height:1;padding:0;}
    .new-chat-panel-header button:hover{color:#374151;}
    .new-chat-panel-body{padding:0 14px 12px;}
    .new-chat-panel-body input[type=text]{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;background:#fff;}
    .new-chat-panel-body input[type=text]:focus{border-color:var(--purple);}
    .panel-user-results{max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-top:6px;background:#fff;}
    .panel-user-item{padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;}
    .panel-user-item:hover{background:#F9FAFB;}
    .panel-user-item.selected{background:var(--purple-light);color:var(--purple);}
    .panel-selected-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
    .sel-tag{background:var(--purple-light);color:var(--purple);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;}
    .sel-tag button{background:none;border:none;color:var(--purple);cursor:pointer;font-size:14px;line-height:1;}
    .btn-start{display:block;width:100%;margin-top:10px;padding:9px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
    .btn-start:hover{background:var(--purple-mid);}
    .btn-start:disabled{opacity:.5;cursor:not-allowed;}
    .target-opts{display:flex;flex-direction:column;gap:7px;margin-top:4px;}
    .target-opt{display:flex;align-items:center;gap:10px;padding:9px 12px;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;background:#fff;}
    .target-opt:hover{border-color:var(--purple-mid);}
    .target-opt.active{border-color:var(--purple);background:var(--purple-light);color:var(--purple);}
    .grp-name-input{margin-bottom:10px;}

    .conv-search{padding:10px 16px;border-bottom:1px solid var(--border);}
    .conv-search input{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;outline:none;}
    .conv-search input:focus{border-color:var(--purple);}
    .conv-list{flex:1;overflow-y:auto;}
    .conv-item{padding:14px 16px;cursor:pointer;border-bottom:1px solid #F3F4F6;transition:background .1s;display:flex;gap:12px;align-items:center;}
    .conv-item:hover{background:#F9FAFB;}
    .conv-item.active{background:var(--purple-light);}
    .conv-avatar{width:40px;height:40px;border-radius:50%;background:var(--purple-light);color:var(--purple);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;overflow:hidden;}
    .conv-avatar img{width:100%;height:100%;object-fit:cover;}
    .conv-info{flex:1;min-width:0;}
    .conv-name{font-size:13px;font-weight:600;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .conv-preview{font-size:11px;color:#9CA3AF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
    .conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
    .conv-time{font-size:10px;color:#9CA3AF;}
    .conv-badge{background:#EF4444;color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:10px;}
    .conv-type-badge{font-size:9px;background:#EEF2FF;color:var(--indigo);padding:2px 6px;border-radius:10px;font-weight:700;}

    /* Message panel */
    .msg-panel{flex:1;display:flex;flex-direction:column;height:100vh;background:#F8FAFC;}
    .msg-header{background:#fff;border-bottom:1px solid #E5E7EB;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .msg-header-avatar{width:38px;height:38px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;overflow:hidden;}
    .msg-header-avatar img{width:100%;height:100%;object-fit:cover;}
    .msg-header-info{flex:1;}
    .msg-header-name{font-size:15px;font-weight:700;color:#111827;}
    .msg-header-sub{font-size:11px;color:#9CA3AF;}
    .msg-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9CA3AF;}
    .msg-empty svg{margin-bottom:12px;opacity:.4;}
    .msg-empty p{font-size:14px;}
    .msg-thread{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
    .msg-thread::-webkit-scrollbar{width:4px;}
    .msg-thread::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:2px;}
    .msg-row{display:flex;align-items:flex-end;gap:8px;}
    .msg-row.mine{flex-direction:row-reverse;}
    .msg-bubble-avatar{width:30px;height:30px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden;}
    .msg-bubble-avatar img{width:100%;height:100%;object-fit:cover;}
    .msg-bubble-wrap{max-width:68%;}
    .msg-sender-name{font-size:10px;color:#9CA3AF;margin-bottom:3px;font-weight:600;}
    .msg-row.mine .msg-sender-name{text-align:right;}
    .msg-bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word;}
    .msg-row:not(.mine) .msg-bubble{background:#fff;color:#111827;border:1px solid #E5E7EB;border-bottom-left-radius:4px;}
    .msg-row.mine .msg-bubble{background:var(--indigo);color:#fff;border-bottom-right-radius:4px;}
    .msg-time{font-size:10px;color:#9CA3AF;margin-top:4px;}
    .msg-row.mine .msg-time{text-align:right;}
    .typing-indicator{font-size:11px;color:#9CA3AF;font-style:italic;padding:0 24px 8px;}

    /* Input bar */
    .msg-input-bar{background:#fff;border-top:1px solid #E5E7EB;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .msg-input{flex:1;border:1.5px solid #E5E7EB;border-radius:24px;padding:10px 16px;font-size:13px;outline:none;resize:none;max-height:100px;color:#111827;font-family:inherit;}
    .msg-input:focus{border-color:var(--indigo);}
    .btn-send{width:40px;height:40px;border:none;background:var(--indigo);color:#fff;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;}
    .btn-send:hover{background:var(--indigo-dark);}
    .btn-send:disabled{background:#E5E7EB;cursor:not-allowed;}

    /* ── Empty state ── */
    .no-conv{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9CA3AF;gap:12px;}
    .no-conv svg{opacity:.3;}
    .no-conv p{font-size:15px;}
  </style>
</head>

<!-- Chat container -->
<div class="chat-container">

  <!-- Conversation list -->
  <div class="conv-panel">
    <div class="conv-header">
      <h2>Mensajes</h2>
      <!-- New chat type buttons -->
      <div class="new-chat-btns">
        <button class="new-chat-btn" id="btnInd" onclick="showNewPanel('individual')">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Individual
        </button>
        <button class="new-chat-btn" id="btnGrp" onclick="showNewPanel('group')" style="display:none;">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Grupal
        </button>
      </div>
    </div>

    <!-- Inline panel (shown when a button is active) -->
    <div class="new-chat-panel" id="newChatPanel" style="display:none;">
      <div class="new-chat-panel-header">
        <span id="newChatPanelTitle">Nueva conversación</span>
        <button onclick="closeNewPanel()">×</button>
      </div>
      <!-- Individual sub-panel -->
      <div class="new-chat-panel-body" id="indPanel">
        <input type="text" id="userSearchInput" placeholder="Buscar por nombre o email…" oninput="searchUsers(this.value)"/>
        <div class="panel-user-results" id="userResults" style="display:none;"></div>
        <div class="panel-selected-tags" id="selectedUsers"></div>
        <button class="btn-start" id="btnStartInd" onclick="createConversation()" style="display:none;">Iniciar conversación</button>
      </div>
      <!-- Group sub-panel -->
      <div class="new-chat-panel-body" id="grpPanel" style="display:none;">
        <input type="text" class="grp-name-input" id="grpName" placeholder="Nombre del grupo (opcional)"/>
        <div class="target-opts" id="targetOpts"></div>
        <button class="btn-start" id="btnStartGrp" onclick="createConversation()">Crear grupo</button>
      </div>
    </div>

    <div class="conv-search">
      <input type="text" id="convSearch" placeholder="Buscar conversación…" oninput="filterConvs(this.value)"/>
    </div>
    <div class="conv-list" id="convList">
      <div style="text-align:center;padding:40px 20px;color:#9CA3AF;font-size:13px;">Cargando…</div>
    </div>
  </div>

  <!-- Message thread -->
  <div class="msg-panel" id="msgPanel">
    <div class="msg-empty" id="msgEmpty">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Selecciona una conversación</p>
    </div>
    <div id="convState" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="msg-header" id="msgHeader">
        <div class="msg-header-avatar" id="msgHeaderAvatar">?</div>
        <div class="msg-header-info">
          <div class="msg-header-name" id="msgHeaderName">—</div>
          <div class="msg-header-sub" id="msgHeaderSub">—</div>
        </div>
      </div>
      <div class="msg-thread" id="msgThread"></div>
      <div class="typing-indicator" id="typingIndicator" style="display:none;"></div>
      <div class="msg-input-bar">
        <textarea class="msg-input" id="msgInput" placeholder="Escribe un mensaje…" rows="1" onkeydown="handleInputKey(event)" oninput="handleTyping()"></textarea>

          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script>
const API = 'https://nutrientrena-production.up.railway.app/api';
const WS_URL = 'wss://nutrientrena-production.up.railway.app/ws/chat';
let token = localStorage.getItem('token');
let currentUser = null;
let currentUserRoles = [];
let conversations = [];
let activeConvId = null;
let ws = null;
let wsReconnectTimer = null;
let typingTimer = null;
let selectedIndividualUsers = [];
let groupSelectedUsers = [];
let allUsers = [];

let _me = null;
let _token = null;
let _convs = [];
let _activeConv = null;
let _ws = null;
let _wsReconnectTimer = null;
let _convType = 'individual';
let _selectedUsers = [];
let _target = null;
let _typingTimer = null;
let _activePanel = null; // 'individual' | 'group' | null

function logout() {
  fetch(`${API}/auth/logout`, { method:'POST', headers:{ Authorization:`Bearer ${token}` }}).catch(()=>{});
  localStorage.clear();
  location.href = 'login.html';
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await apiFetch('/auth/me');
    if (!r.success) { location.href = 'login.html'; return; }
    _me = r.data;
  } catch { location.href = 'login.html'; return; }

  // Sidebar
  const av = document.getElementById('sidebarAvatar');
  if (_me.photo) {
    av.innerHTML = `<img src="${_me.photo}" alt="">`;
  } else {
    av.textContent = (_me.name || '?')[0].toUpperCase();
  }
  document.getElementById('sidebarName').textContent = _me.name || _me.email || '';
  document.getElementById('sidebarRole').textContent = _me.roles?.[0]?.name || '';

  // Show Grupal button only for non-client roles
  const roles = (_me.roles || []).map(r => r.id || r.role_id);
  const canGroup = roles.includes(1) || roles.includes(2) || roles.includes(5);
  if (canGroup) {
    document.getElementById('btnGrp').style.display = '';
  }

  await loadConversations();
  connectWS();
}

// ── New chat panel ─────────────────────────────────────────────────────────

function showNewPanel(type) {
  const panel = document.getElementById('newChatPanel');
  const indPanel = document.getElementById('indPanel');
  const grpPanel = document.getElementById('grpPanel');
  const title = document.getElementById('newChatPanelTitle');

  // Toggle off if same button clicked again
  if (_activePanel === type) {
    closeNewPanel();
    return;
  }

  _activePanel = type;
  _convType = type;
  _selectedUsers = [];

  // Update button active states
  document.getElementById('btnInd').classList.toggle('active', type === 'individual');
  document.getElementById('btnGrp').classList.toggle('active', type === 'group');

  if (type === 'individual') {
    title.textContent = 'Nueva conversación individual';
    indPanel.style.display = '';
    grpPanel.style.display = 'none';
    document.getElementById('userSearchInput').value = '';
    document.getElementById('userResults').style.display = 'none';
    document.getElementById('selectedUsers').innerHTML = '';
    document.getElementById('btnStartInd').style.display = 'none';
  } else {
    title.textContent = 'Nuevo grupo';
    indPanel.style.display = 'none';
    grpPanel.style.display = '';
    document.getElementById('grpName').value = '';
    _target = null;
    renderTargetOpts();
  }

  panel.style.display = '';
}

function closeNewPanel() {
  _activePanel = null;
  document.getElementById('newChatPanel').style.display = 'none';
  document.getElementById('btnInd').classList.remove('active');
  document.getElementById('btnGrp').classList.remove('active');
}

// ── WebSocket ──────────────────────────────────────────────────────────────

function connectWS() {
  if (_ws) { try { _ws.close(); } catch(e) {} }
  _ws = new WebSocket(`${WS_BASE}?token=${_token}`);

  _ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'message') {
        handleIncomingMessage(data.message);
      } else if (data.type === 'typing') {
        showTyping(data);
      }
    } catch(err) {}
  };

  _ws.onclose = () => {
    _wsReconnectTimer = setTimeout(connectWS, 3000);
  };
}

function wsSend(data) {
  if (_ws && _ws.readyState === WebSocket.OPEN) {
    _ws.send(JSON.stringify(data));
  }
}

function renderSidebarUser() {
  const detail = currentUser.detail || {};
  const name = detail.name || currentUser.name || 'Usuario';
  const initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('sidebarAvatar').textContent = initials;
  document.getElementById('sidebarName').textContent = name;
  const roles = currentUser.roles || [];
  document.getElementById('sidebarRole').textContent = roles.map(r => r.name || r).join(', ') || '—';
}

function adjustUIForRole() {
  const isClient = currentUserRoles.includes(6) && !currentUserRoles.includes(5) && !currentUserRoles.includes(2) && !currentUserRoles.includes(1);
  const isCoach = currentUserRoles.includes(5);
  const isAdmin = currentUserRoles.includes(1) || currentUserRoles.includes(2);

  if (isClient) {
    // Clients can't create groups, hide new conv button or limit it
    document.getElementById('btnNewConv').style.display = 'none';
  }

async function selectConversation(id) {
  _activeConv = _convs.find(c => c.id === id) || { id };
  closeNewPanel();
  renderConvList(_convs);

  document.getElementById('noConvState').style.display = 'none';
  const cs = document.getElementById('convState');
  cs.style.display = 'flex';

  // Header
  const isGroup = _activeConv.type === 'group';
  const others = (_activeConv.participants || []).filter(p => p.user_id !== _me?.user_id);
  const photo = !isGroup && others[0]?.photo;
  const av = document.getElementById('msgAvatar');
  if (photo) {
    av.innerHTML = `<img src="${photo}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  } else {
    av.textContent = isGroup ? '👥' : (_activeConv.name || '?')[0].toUpperCase();
  }
  document.getElementById('msgHeaderName').textContent = _activeConv.name || '—';
  const sub = isGroup ? `${(_activeConv.participants || []).length} participantes` : '';
  document.getElementById('msgHeaderSub').textContent = sub;

  groupTarget.addEventListener('change', () => {
    const custom = groupTarget.value === 'custom';
    document.getElementById('groupCustomSection').style.display = custom ? 'block' : 'none';
  });
}

// ── Conversations ─────────────────────────────────────────────────────────────
async function loadConversations() {
  try {
    const r = await fetch(`${API}/chat/conversations`, { headers: { Authorization: `Bearer ${token}` }});
    const d = await r.json();
    conversations = d.data || [];
    renderConversations(conversations);
  } catch(e) {
    document.getElementById('convList').innerHTML = '<div style="text-align:center;padding:40px;color:#9CA3AF;font-size:13px;">Error al cargar</div>';
  }
}

function renderConversations(convs) {
  const list = document.getElementById('convList');
  if (!convs.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#9CA3AF;font-size:13px;">Sin conversaciones aún</div>';
    return;
  }
  list.innerHTML = convs.map(c => convItemHtml(c)).join('');
}

function convItemHtml(c) {
  const isGroup = c.type === 'group';
  let displayName = c.name || '';
  if (!displayName) {
    const others = (c.participants || []).filter(p => p.user_id !== (currentUser && currentUser.id));
    displayName = others.map(p => p.name).join(', ') || 'Sin nombre';
  }
  const preview = c.last_message ? truncate(c.last_message.content, 40) : 'Sin mensajes';
  const time = c.last_message ? fmtTime(c.last_message.created_at) : '';
  const firstP = c.participants && c.participants[0];
  const avatarHtml = isGroup
    ? `<div class="conv-avatar" style="background:#7C3AED;font-size:11px;">GRP</div>`
    : (firstP && firstP.photo
      ? `<div class="conv-avatar"><img src="${firstP.photo}" alt=""/></div>`
      : `<div class="conv-avatar">${initials(displayName)}</div>`);
  const active = activeConvId === c.id ? 'active' : '';
  return `<div class="conv-item ${active}" onclick="selectConversation('${c.id}')">
    ${avatarHtml}
    <div class="conv-info">
      <div class="conv-name">${esc(displayName)}</div>
      <div class="conv-preview">${esc(preview)}</div>
    </div>
    <div class="conv-meta">
      <span class="conv-time">${time}</span>
      ${isGroup ? '<span class="conv-type-badge">Grupo</span>' : ''}
    </div>
  </div>`;
}

function handleIncomingMessage(msg) {
  const conv = _convs.find(c => c.id === msg.conversation_id);
  if (conv) {
    conv.last_message = msg;
    renderConvList(_convs);
  } else {
    loadConversations();
  }
  if (_activeConv?.id === msg.conversation_id) {
    const body = document.getElementById('msgBody');
    const emptyDiv = body.querySelector('div[style]');
    if (emptyDiv) emptyDiv.remove();
    const div = document.createElement('div');
    div.innerHTML = renderMessage(msg);
    body.appendChild(div.firstElementChild);
    body.scrollTop = body.scrollHeight;
  }
}

function appendMessage(msg, scroll) {
  if (activeConvId !== msg.conversation_id) return;
  const thread = document.getElementById('msgThread');
  const isMine = currentUser && msg.sender_user_id === currentUser.id;
  const senderName = msg.sender_name || 'Usuario';
  const time = fmtTime(msg.created_at);
  const avatarContent = msg.sender_photo
    ? `<img src="${msg.sender_photo}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`
    : initials(senderName);

  const el = document.createElement('div');
  el.className = `msg-row${isMine ? ' mine' : ''}`;
  el.innerHTML = `
    <div class="msg-bubble-avatar">${avatarContent}</div>
    <div class="msg-bubble-wrap">
      <div class="msg-sender-name">${esc(senderName)}</div>
      <div class="msg-bubble">${esc(msg.content)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  thread.appendChild(el);
  if (scroll) { scrollToBottom(); }
}

function scrollToBottom() {
  const thread = document.getElementById('msgThread');
  thread.scrollTop = thread.scrollHeight;
}

// ── Send message ──────────────────────────────────────────────────────────────
function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function handleTyping() {
  if (!ws || ws.readyState !== WebSocket.OPEN || !activeConvId) return;
  clearTimeout(typingTimer);
  ws.send(JSON.stringify({ type: 'typing', conversation_id: activeConvId }));
  typingTimer = setTimeout(() => {}, 2000);
}

    wsSend({ conversation_id: _activeConv.id, content });
  } else {
    const r = await apiFetch(`/chat/conversations/${_activeConv.id}/messages`, {

    });

// ── User search (individual) ───────────────────────────────────────────────

let _searchTimer = null;
async function searchUsers(q) {
  clearTimeout(_searchTimer);
  if (!q) { document.getElementById('userResults').style.display = 'none'; return; }
  _searchTimer = setTimeout(async () => {
    const [rc, rch] = await Promise.all([
      apiFetch(`/users/client/search?search=${encodeURIComponent(q)}&per_page=20`),
      apiFetch(`/users/coach/search?search=${encodeURIComponent(q)}&per_page=20`),
    ]);
    const items = [
      ...(rc.data?.data || []),
      ...(rch.data?.data || []),
    ].filter(u => u.user_id !== _me?.user_id);
    const el = document.getElementById('userResults');
    if (!items.length) { el.style.display = 'none'; return; }
    el.style.display = '';
    el.innerHTML = items.map(u => {
      const sel = _selectedUsers.find(s => s.user_id === u.user_id);
      const uJson = JSON.stringify(u).replace(/"/g, '&quot;');
      return `<div class="panel-user-item ${sel ? 'selected' : ''}" onclick="toggleUser(${uJson})">
        ${u.photo
          ? `<img src="${u.photo}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;" alt="">`
          : `<div style="width:28px;height:28px;border-radius:50%;background:#EDE7F6;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#5B2D8E;">${(u.name||'?')[0]}</div>`}
        <div><div style="font-weight:600;">${escHtml(u.name||'')}</div><div style="font-size:11px;color:#9CA3AF;">${escHtml(u.email||'')}</div></div>
      </div>`;
    }).join('');
  }, 300);
}

function toggleUser(u) {
  const idx = _selectedUsers.findIndex(s => s.user_id === u.user_id);
  if (idx >= 0) _selectedUsers.splice(idx, 1);
  else _selectedUsers.push(u);
  renderSelectedUsers();
  searchUsers(document.getElementById('userSearchInput').value);
}

function renderSelectedUsers() {
  document.getElementById('selectedUsers').innerHTML = _selectedUsers.map(u => {
    const uJson = JSON.stringify(u).replace(/"/g, '&quot;');
    return `<span class="sel-tag">
      ${escHtml(u.name || u.email || '')}
      <button onclick="toggleUser(${uJson})">×</button>
    </span>`;
  }).join('');
  document.getElementById('btnStartInd').style.display = _selectedUsers.length ? '' : 'none';
}

// ── Group targets ──────────────────────────────────────────────────────────

function renderTargetOpts() {
  const roles = (_me?.roles || []).map(r => r.id || r.role_id);
  const isAdmin = roles.includes(1) || roles.includes(2);
  const isCoach = roles.includes(5);
  const opts = [];
  if (isCoach || isAdmin) {
    opts.push({ value: 'my_clients', label: '👤 Mis clientes', desc: 'Todos tus clientes asignados' });
  }
  if (isAdmin) {
    opts.push({ value: 'all_coaches', label: '🏋️ Todos los coaches', desc: 'Mensaje a todo el equipo' });
    opts.push({ value: 'all_clients', label: '👥 Todos los clientes', desc: 'Mensaje masivo a clientes' });
  }
  document.getElementById('targetOpts').innerHTML = opts.map(o => `
    <div class="target-opt ${_target === o.value ? 'active' : ''}" onclick="selectTarget('${o.value}')">
      <div>
        <div>${o.label}</div>
        <div style="font-size:11px;color:#9CA3AF;font-weight:400;">${o.desc}</div>
      </div>
    </div>`).join('');
}

function searchUsers() {
  const q = document.getElementById('userSearch').value.toLowerCase();
  const res = document.getElementById('userSearchResults');
  if (!q) { res.style.display = 'none'; return; }
  const filtered = allUsers.filter(u => {
    const name = `${u.name || ''} ${u.last_name || ''}`.toLowerCase();
    const email = (u.email || '').toLowerCase();
    return name.includes(q) || email.includes(q);
  }).slice(0, 8);
  if (!filtered.length) { res.style.display = 'none'; return; }
  const alreadySelected = new Set(selectedIndividualUsers.map(u => u.user_id));
  res.style.display = 'block';
  res.innerHTML = filtered.map(u => {
    const uid = u.user_id || u.id;
    const selected = alreadySelected.has(uid);
    return `<div class="user-result-item ${selected ? 'selected' : ''}" onclick="toggleIndividualUser(${uid}, '${esc(u.name)} ${esc(u.last_name||'')}')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>${esc(u.name)} ${esc(u.last_name||'')} ${u.email ? '· ' + esc(u.email) : ''}</span>
    </div>`;
  }).join('');
}

// ── Create conversation ────────────────────────────────────────────────────

async function createConversation() {
  const body = { type: convType };

  const body = {
    type: _convType,
    participant_user_ids: _selectedUsers.map(u => u.user_id),
    name: _convType === 'group' ? (document.getElementById('grpName').value.trim() || null) : null,
    target: _convType === 'group' ? _target : null,
  };

  const r = await apiFetch('/chat/conversations', { method: 'POST', body: JSON.stringify(body) });
  if (r.success) {
    closeNewPanel();
    await loadConversations();
    selectConversation(r.data.id);
  } else {
    const target = document.getElementById('groupTarget').value;
    const name = document.getElementById('groupName').value.trim();
    if (name) { body.name = name; }
    if (target === 'custom') {
      if (!groupSelectedUsers.length) {
        showToast('Selecciona al menos un usuario', 'error'); return;
      }
      body.participant_user_ids = groupSelectedUsers.map(u => u.user_id);
    } else if (target === 'coaches') {
      body.target = 'coaches';
    } else if (target === 'all_clients') {
      body.target = 'clients';
    }
    // my_clients: no participant_user_ids, no target => backend auto-adds coach's clients
  }

  try {
    const r = await fetch(`${API}/chat/conversations`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (d.success) {
      closeModal();
      conversations.unshift(d.data);
      renderConversations(conversations);
      selectConversation(d.data.id);
      showToast('Conversación creada', 'success');
    } else {
      showToast(d.message || 'Error', 'error');
    }
  } catch(e) {
    showToast('Error al crear', 'error');
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function initials(name) {
  return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function truncate(s, n) {
  return s && s.length > n ? s.slice(0, n) + '…' : (s || '');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'ahora';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m`;
  if (diff < 86400000) return d.toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('es', {day:'2-digit',month:'2-digit'});
}

let _toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show${type ? ' '+type : ''}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
