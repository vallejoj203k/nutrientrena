<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <title>NutriEntrena — Calendario</title>
  <script>
    (function(){ var t=localStorage.getItem('token'),r=localStorage.getItem('role_id')||'';
      if(!t){location.replace('login.html');return;} if(r&&r!=='6'){location.replace('dashboard.html');} })();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--indigo:#4F46E5;--indigo-dark:#4338CA;--indigo-pale:#EEF2FF;--green:#059669;--amber:#F59E0B;--red:#DC2626;--gray-bg:#F8FAFC;--sidebar-w:240px;}
    body{font-family:'Space Grotesk','Segoe UI',system-ui,sans-serif;background:var(--gray-bg);display:flex;height:100vh;overflow:hidden;}
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
    .sidebar-logo{display:flex;align-items:center;gap:11px;padding:18px 18px 16px;border-bottom:1px solid #EBEBEB;}
    .sl-mark{width:40px;height:40px;border-radius:9px;background:url('logo.webp') no-repeat 50% 41%;background-size:210px;flex-shrink:0;}
    .sl-txt{display:flex;flex-direction:column;line-height:1.15;}
    .sl-txt b{font-size:17px;font-weight:800;letter-spacing:.3px;}
    .sl-txt b .n1{color:var(--indigo);}.sl-txt b .n2{color:var(--green);}
    .sl-txt small{color:#6B7280;font-size:11px;margin-top:2px;}
    .sidebar-nav{flex:1;padding:12px 0;}
    .nav-section{padding:12px 20px 4px;font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#374151;cursor:pointer;font-size:14px;transition:all .15s;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:#F8FAFC;color:var(--indigo);}
    .nav-item.active{background:#EEF2FF;color:var(--indigo);border-left-color:var(--indigo);font-weight:600;}
    .nav-item svg{flex-shrink:0;opacity:.75;}
    .nav-item.active svg,.nav-item:hover svg{opacity:1;}
    .sidebar-user{padding:14px 20px;border-top:1px solid #F3F4F6;display:flex;align-items:center;gap:10px;}
    .s-avatar{width:34px;height:34px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0;overflow:hidden;}
    .s-avatar img{width:100%;height:100%;object-fit:cover;}
    .user-info{flex:1;min-width:0;}.user-name{color:#111827;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.user-role{color:#6B7280;font-size:11px;}
    .logout-btn{background:none;border:none;color:#9CA3AF;cursor:pointer;padding:4px;border-radius:4px;display:flex;}
    .logout-btn:hover{color:#EF4444;}

    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    .topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 28px;height:64px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
    .menu-btn{display:none;background:none;border:none;cursor:pointer;color:#374151;padding:6px;border-radius:8px;}
    .menu-btn:hover{background:#F3F4F6;}
    .topbar-title{font-size:17px;font-weight:800;color:#111827;flex:1;}

    .content{flex:1;overflow-y:auto;padding:26px 28px 40px;}
    .content-inner{max-width:820px;margin:0 auto;}
    .page-head{margin-bottom:16px;}
    .page-head h1{font-size:26px;font-weight:800;color:#111827;}
    .page-head p{font-size:14px;color:#6B7280;margin-top:2px;}

    .cal-card{background:#fff;border:1px solid #E5E7EB;border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
    .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .cal-nav{width:36px;height:36px;border-radius:50%;border:none;background:#F3F4F6;color:#6B7280;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
    .cal-nav:hover{background:#E5E7EB;color:#111827;}
    .cal-month{font-size:17px;font-weight:800;color:#111827;text-transform:capitalize;}
    .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;}
    .cal-dow div{text-align:center;font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
    .cal-cell{aspect-ratio:1;border:1px solid #EEF0F3;border-radius:12px;padding:6px 5px 5px;cursor:pointer;display:flex;flex-direction:column;transition:.12s;position:relative;background:#fff;}
    .cal-cell.empty{border:none;cursor:default;background:transparent;}
    .cal-cell:not(.empty):hover{border-color:#C7D2FE;background:#F9FAFF;}
    .cal-cell.today{border-color:var(--indigo);background:var(--indigo-pale);}
    .cal-cell.sel{border-color:var(--indigo);box-shadow:0 0 0 2px rgba(79,70,229,.25);}
    .cal-dnum{font-size:13px;font-weight:700;color:#374151;line-height:1;}
    .cal-cell.today .cal-dnum{color:var(--indigo);}
    .cal-cell.past .cal-dnum{color:#9CA3AF;}
    .cal-done{position:absolute;top:5px;right:5px;width:15px;height:15px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;}
    .cal-dots{margin-top:auto;display:flex;gap:3px;flex-wrap:wrap;}
    .cal-dot{width:6px;height:6px;border-radius:50%;}
    .cal-dot.tr{background:var(--indigo);}
    .cal-dot.nu{background:var(--green);}
    .cal-dot.ci{background:var(--amber);}
    .cal-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:#6B7280;}
    .cal-legend span{display:flex;align-items:center;gap:6px;}
    .cal-legend i{width:9px;height:9px;border-radius:50%;display:inline-block;}

    /* Detalle del día */
    .det-card{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:18px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
    .det-date{font-size:15px;font-weight:800;color:#111827;text-transform:capitalize;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .det-date .pill{font-size:10px;font-weight:800;color:#fff;background:var(--indigo);padding:2px 9px;border-radius:20px;text-transform:uppercase;}
    .det-row{display:flex;align-items:center;gap:12px;border-radius:12px;padding:13px;margin-bottom:10px;}
    .det-row.tr{background:#F5F3FF;border:1px solid #E7E3FB;}
    .det-row.nu{background:#ECFDF3;border:1px solid #C6F0D8;}
    .det-row.ci{background:#FFF7ED;border:1px solid #FCE3BE;}
    .det-row.ci.done{background:#ECFDF3;border-color:#C6F0D8;}
    .det-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
    .det-row.tr .det-ico{background:var(--indigo);}
    .det-row.nu .det-ico{background:var(--green);}
    .det-row.ci .det-ico{background:var(--amber);}
    .det-row.ci.done .det-ico{background:var(--green);}
    .det-info{flex:1;min-width:0;}
    .det-info b{font-size:14.5px;font-weight:800;color:#111827;}
    .det-info div{font-size:12.5px;color:#6B7280;margin-top:2px;}
    .det-tag{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;white-space:nowrap;}
    .det-tag.done{color:#047857;background:#A7F3D0;}
    .det-tag.pend{color:#B45309;background:#FDE68A;}
    .det-empty{text-align:center;color:#9CA3AF;font-size:13.5px;padding:28px 12px;}
    .det-link{color:var(--indigo);font-weight:700;text-decoration:none;font-size:12.5px;white-space:nowrap;}
    .det-sec-lbl{font-size:11px;font-weight:800;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;}
    .det-task{display:flex;align-items:center;gap:11px;border:1px solid #E5E7EB;border-radius:12px;padding:11px 13px;margin-bottom:8px;}
    .det-task .bar{width:5px;align-self:stretch;border-radius:3px;flex-shrink:0;}
    .det-task-info{flex:1;min-width:0;}
    .det-task-info b{font-size:14px;font-weight:700;color:#111827;display:block;}
    .det-task.done .det-task-info b{text-decoration:line-through;color:#9CA3AF;}
    .det-task-info small{font-size:11.5px;color:#9CA3AF;text-transform:capitalize;}
    .det-task-info .nt{font-size:12px;color:#6B7280;margin-top:2px;white-space:pre-wrap;}
    .det-chk{width:26px;height:26px;border-radius:8px;border:2px solid #D1D5DB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent;flex-shrink:0;transition:.15s;padding:0;}
    .det-chk:hover{border-color:var(--green);}
    .det-chk.on{background:var(--green);border-color:var(--green);color:#fff;}
    .cal-dot.task{width:6px;height:6px;}

    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;}
    .sidebar-overlay.open{display:block;}
    @media(max-width:768px){
      body{overflow:auto;}
      .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);transition:transform .25s;z-index:200;}
      .sidebar.open{transform:translateX(0);}
      .menu-btn{display:flex;align-items:center;justify-content:center;}
      .content{padding:18px 14px 40px;}
      .page-head h1{font-size:22px;}
      .cal-cell{border-radius:9px;padding:4px 3px 3px;}
      .cal-dnum{font-size:12px;}
    }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sl-mark" role="img" aria-label="NutriEntrena"></div>
    <div class="sl-txt"><b><span class="n1">NUTRI</span><span class="n2">ENTRENA</span></b><small>Mi espacio</small></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Principal</div>
    <a class="nav-item" href="client-home.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/></svg>Inicio</a>
    <a class="nav-item active" href="client-calendario.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendario</a>
    <div class="nav-section">Mi plan</div>
    <a class="nav-item" href="client-entrena.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6.5 6.5 17.5 17.5M4 12l-1.5 1.5a2.12 2.12 0 0 0 3 3L7 18M17 6l1-1a2.12 2.12 0 0 1 3 3l-1 1"/><path d="m8 8 8 8"/></svg>Entrena</a>
    <a class="nav-item" href="client-nutricion.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4Z"/><path d="M6 2v2M10 2v2M14 2v2"/></svg>Nutrición</a>
    <div class="nav-section">Seguimiento</div>
    <a class="nav-item" href="client-progreso.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></svg>Progreso</a>
    <div class="nav-section">Comunicación</div>
    <a class="nav-item" href="client-chat.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</a>
    <div class="nav-section">Cuenta</div>
    <a class="nav-item" href="client-perfil.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Perfil</a>
  </nav>
  <div class="sidebar-user">
    <div class="s-avatar" id="sidebarAvatar">C</div>
    <div class="user-info"><div class="user-name" id="sidebarName">Cargando…</div><div class="user-role">Cliente</div></div>
    <button class="logout-btn" onclick="logout()" title="Cerrar sesión"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menú"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="topbar-title">Calendario</div>
  </div>

  <div class="content">
    <div class="content-inner">
      <div class="page-head"><h1>Mi calendario</h1><p>Todo lo que tu coach te asigna, día a día</p></div>

      <div class="cal-card">
        <div class="cal-head">
          <button class="cal-nav" onclick="shiftMonth(-1)"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div class="cal-month" id="calMonth">…</div>
          <button class="cal-nav" onclick="shiftMonth(1)"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
        <div class="cal-dow"><div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div></div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-legend">
          <span><i style="background:var(--indigo)"></i> Entreno</span>
          <span><i style="background:var(--green)"></i> Nutrición</span>
          <span><i style="background:var(--amber)"></i> Check-in</span>
        </div>
      </div>

      <div id="dayDetail"></div>
    </div>
  </div>
</div>

<script>
  const API = 'https://nutrientrena-production.up.railway.app/api';
  const token = localStorage.getItem('token');
  const headers = () => ({ Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' });
  function esc(s){ if(s==null)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function logout(){ localStorage.clear(); location.href='login.html'; }
  function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
  function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }

  const WD_NAMES=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  var _y=null,_m=null,_data=null,_selKey=null;

  const I = {
    dumbbell:'<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6.5 6.5 17.5 17.5M4 12l-1.5 1.5a2.12 2.12 0 0 0 3 3L7 18M17 6l1-1a2.12 2.12 0 0 1 3 3l-1 1"/><path d="m8 8 8 8"/></svg>',
    fork:'<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 2v7c0 1.1.9 2 2 2h1v11M8 2v20M13 2v20M18 2c-1.5 0-3 1.5-3 4v6h3z"/></svg>',
    scale:'<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 21h18"/><path d="M12 3v18"/><path d="M7 7h10l3 8a5 5 0 0 1-10 0"/><path d="M7 7 4 15a5 5 0 0 0 10 0"/></svg>',
    check:'<svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="3.2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
    moon:'<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>',
  };

  function render(){
    document.getElementById('calMonth').textContent = _data.month_name + ' ' + _data.year;
    var grid = document.getElementById('calGrid');
    var html = '';
    for (var i=0;i<_data.first_weekday;i++) html += '<div class="cal-cell empty"></div>';
    (_data.days||[]).forEach(function(d){
      var cls = 'cal-cell' + (d.is_today?' today':'') + (d.is_past?' past':'') + (d.date===_selKey?' sel':'');
      var dots = '';
      if (d.training) dots += '<span class="cal-dot tr"></span>';
      if (d.nutrition) dots += '<span class="cal-dot nu"></span>';
      if (d.checkin_done) dots += '<span class="cal-dot ci"></span>';
      (d.tasks||[]).slice(0,4).forEach(function(t){ dots += '<span class="cal-dot task" style="background:'+esc(t.color||'#9CA3AF')+'"></span>'; });
      var done = d.workout_done ? '<span class="cal-done">'+I.check+'</span>' : '';
      html += '<div class="'+cls+'" onclick="selectDay(\''+d.date+'\')">'+done
        + '<div class="cal-dnum">'+d.day+'</div>'
        + '<div class="cal-dots">'+dots+'</div></div>';
    });
    grid.innerHTML = html;
    renderDetail();
  }

  function selectDay(key){ _selKey = key; render(); }

  function renderDetail(){
    var box = document.getElementById('dayDetail');
    if (!_selKey){ box.innerHTML=''; return; }
    var d = (_data.days||[]).find(function(x){return x.date===_selKey;});
    if (!d){ box.innerHTML=''; return; }
    var dt = new Date(_selKey+'T00:00:00');
    var title = WD_NAMES[d.weekday] + ' ' + d.day + ' de ' + _data.month_name;
    var html = '<div class="det-card"><div class="det-date">'+esc(title)+(d.is_today?'<span class="pill">Hoy</span>':'')+'</div>';

    // Entreno
    if (d.training){
      var sub = [ (d.training.muscles||[]).join(' · '), d.training.duration_min?(d.training.duration_min+' min'):null ].filter(Boolean).join(' · ');
      html += '<div class="det-row tr"><div class="det-ico">'+I.dumbbell+'</div>'
        + '<div class="det-info"><b>'+esc(d.training.name||'Entrenamiento')+'</b><div>'+esc(sub||'Entrenamiento')+'</div></div>'
        + (d.workout_done?'<span class="det-tag done">Hecho</span>':'<a class="det-link" href="client-entrena.html">Ver →</a>')+'</div>';
    } else {
      html += '<div class="det-row" style="background:#F9FAFB;border:1px solid #EEF0F3;"><div class="det-ico" style="background:#D1D5DB;">'+I.moon+'</div>'
        + '<div class="det-info"><b>Día de descanso</b><div>Sin entrenamiento asignado</div></div></div>';
    }

    // Nutrición
    if (d.nutrition){
      var ns = [ d.nutrition.kcal?(d.nutrition.kcal+' kcal'):null, (d.nutrition.meals_count!=null?d.nutrition.meals_count+' comida'+(d.nutrition.meals_count!==1?'s':''):null) ].filter(Boolean).join(' · ');
      html += '<a class="det-row nu" href="client-nutricion.html" style="text-decoration:none;"><div class="det-ico">'+I.fork+'</div>'
        + '<div class="det-info"><b>Menú del día</b><div>'+esc(ns||'Tu plan')+'</div></div>'
        + '<span class="det-link">Ver →</span></a>';
    }

    // Check-in (semanal). Se destaca si ese día se hizo el check-in.
    if (d.checkin_done){
      html += '<div class="det-row ci done"><div class="det-ico">'+I.check.replace('width="10" height="10"','width="20" height="20"')+'</div>'
        + '<div class="det-info"><b>Check-in</b><div>Enviado este día</div></div><span class="det-tag done">Hecho</span></div>';
    } else if (d.is_today){
      html += '<div class="det-row ci"><div class="det-ico">'+I.scale+'</div>'
        + '<div class="det-info"><b>Check-in semanal</b><div>Tu coach espera tu reporte</div></div><a class="det-link" href="client-progreso.html">Hacer →</a></div>';
    }

    // Tareas asignadas por el coach
    var tasks = d.tasks || [];
    if (tasks.length){
      html += '<div class="det-sec-lbl">Tareas de tu coach</div>';
      tasks.forEach(function(t){
        html += '<div class="det-task'+(t.done?' done':'')+'" id="task-'+t.id+'"><span class="bar" style="background:'+esc(t.color||'#9CA3AF')+'"></span>'
          + '<div class="det-task-info"><b>'+esc(t.title||'Tarea')+'</b><small>'+esc(t.task_type||'')+'</small>'
          + (t.notes?'<div class="nt">'+esc(t.notes)+'</div>':'')+'</div>'
          + '<button class="det-chk'+(t.done?' on':'')+'" title="Marcar hecha" onclick="toggleTask('+t.id+','+(!t.done)+')"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button></div>';
      });
    }

    if (!d.training && !d.nutrition && !d.checkin_done && !tasks.length){
      html += '<div class="det-empty">Nada asignado para este día.</div>';
    }
    html += '</div>';
    box.innerHTML = html;
  }

  async function toggleTask(id, done){
    try{
      await fetch(API+'/calendar-tasks/'+id+'/done',{method:'PATCH',headers:headers(),body:JSON.stringify({done:done})});
      // Actualiza el estado local y re-renderiza
      (_data.days||[]).forEach(function(dd){ (dd.tasks||[]).forEach(function(t){ if(t.id===id) t.done=done; }); });
      render();
    }catch(e){}
  }

  function shiftMonth(dir){
    var t = dir<0 ? _data.prev : _data.next;
    _y = t.year; _m = t.month; _selKey = null; load();
  }

  async function loadProfile(){
    try{ const r=await fetch(API+'/auth/me',{headers:headers()}); const d=await r.json(); const u=d.data||d;
      const name=u.name||u.email||'Cliente'; document.getElementById('sidebarName').textContent=name;
      const sav=document.getElementById('sidebarAvatar');
      if(u.photo){sav.innerHTML='<img src="'+u.photo+'" alt="">';sav.style.background='transparent';}else{sav.textContent=(name.trim()[0]||'C').toUpperCase();}
    }catch(e){}
  }
  async function load(){
    var q = (_y&&_m) ? ('?year='+_y+'&month='+_m) : '';
    try{
      const r=await fetch(API+'/client/calendar'+q,{headers:headers()});
      const d=await r.json(); _data=d.data||{};
      _y=_data.year; _m=_data.month;
      if (!_selKey){ var t=(_data.days||[]).find(function(x){return x.is_today;}); _selKey = t?t.date:null; }
      render();
    }catch(e){ document.getElementById('calGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;color:#9CA3AF;padding:30px;">No se pudo cargar el calendario.</div>'; }
  }
  loadProfile(); load();
</script>
</body>
</html>
