<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <title>NutriEntrena — Entrena</title>
  <script>
    (function(){
      var t = localStorage.getItem('token');
      var r = localStorage.getItem('role_id') || '';
      if (!t) { location.replace('login.html'); return; }
      if (r && r !== '6') { location.replace('dashboard.html'); }
    })();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--indigo:#4F46E5;--indigo-dark:#4338CA;--indigo-pale:#EEF2FF;--green:#059669;--amber:#F59E0B;--gray-bg:#F8FAFC;--sidebar-w:240px;}
    body{font-family:'Space Grotesk','Segoe UI',system-ui,sans-serif;background:var(--gray-bg);display:flex;height:100vh;overflow:hidden;}
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
    .sidebar-logo{display:flex;align-items:center;gap:11px;padding:18px 18px 16px;border-bottom:1px solid #EBEBEB;}
    .sl-mark{width:40px;height:40px;border-radius:9px;background:url('logo.webp') no-repeat 50% 41%;background-size:210px;flex-shrink:0;}
    .sl-txt{display:flex;flex-direction:column;line-height:1.15;}
    .sl-txt b{font-size:17px;font-weight:800;letter-spacing:.3px;}
    .sl-txt b .n1{color:var(--indigo);}.sl-txt b .n2{color:var(--green);}
    .sl-txt small{color:#6B7280;font-size:11px;margin-top:2px;}
    .sidebar-nav{flex:1;padding:12px 0;}
    .nav-section{padding:12px 20px 4px;font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#374151;cursor:pointer;font-size:14px;transition:all .15s;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:#F8FAFC;color:var(--indigo);}
    .nav-item.active{background:#EEF2FF;color:var(--indigo);border-left-color:var(--indigo);font-weight:600;}
    .nav-item svg{flex-shrink:0;opacity:.75;}
    .nav-item.active svg,.nav-item:hover svg{opacity:1;}
    .nav-item.disabled{opacity:.6;cursor:default;}
    .nav-item.disabled:hover{background:none;color:#374151;}
    .nav-soon-tag{margin-left:auto;font-size:9px;font-weight:700;color:#9CA3AF;background:#F3F4F6;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;}
    .sidebar-user{padding:14px 20px;border-top:1px solid #F3F4F6;display:flex;align-items:center;gap:10px;}
    .s-avatar{width:34px;height:34px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0;overflow:hidden;}
    .s-avatar img{width:100%;height:100%;object-fit:cover;}
    .user-info{flex:1;min-width:0;}
    .user-name{color:#111827;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .user-role{color:#6B7280;font-size:11px;}
    .logout-btn{background:none;border:none;color:#9CA3AF;cursor:pointer;padding:4px;border-radius:4px;display:flex;}
    .logout-btn:hover{color:#EF4444;}

    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    .topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 28px;height:64px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
    .menu-btn{display:none;background:none;border:none;cursor:pointer;color:#374151;padding:6px;border-radius:8px;}
    .menu-btn:hover{background:#F3F4F6;}
    .topbar-title{font-size:17px;font-weight:800;color:#111827;flex:1;}

    .content{flex:1;overflow-y:auto;padding:26px 28px 40px;}
    .content-inner{max-width:820px;margin:0 auto;}
    .page-head{margin-bottom:20px;}
    .page-head h1{font-size:26px;font-weight:800;color:#111827;}
    .page-head p{font-size:14px;color:#6B7280;margin-top:2px;}
    .sec-lbl{font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.8px;margin:22px 0 10px;}

    /* Planes */
    .plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
    .plan{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid #E5E7EB;border-radius:14px;padding:14px 16px;cursor:pointer;transition:.15s;text-align:left;font-family:inherit;}
    .plan:hover{border-color:#C7D2FE;}
    .plan.sel{border-color:var(--indigo);background:var(--indigo-pale);}
    .plan-ico{width:40px;height:40px;border-radius:11px;background:#F3F4F6;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--indigo);}
    .plan.sel .plan-ico{background:#fff;}
    .plan-nm{font-size:14.5px;font-weight:800;color:#111827;}
    .plan.sel .plan-nm{color:var(--indigo);}
    .plan-sub{font-size:12px;color:#6B7280;margin-top:1px;}

    /* Selector de días de la semana */
    .weekbar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;}
    .wday{flex:1;min-width:46px;background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:9px 4px 8px;text-align:center;cursor:pointer;transition:.15s;}
    .wday:hover{border-color:#C7D2FE;}
    .wday.sel{background:var(--indigo);border-color:var(--indigo);}
    .wday .wl{font-size:12px;font-weight:700;color:#6B7280;}
    .wday .wn{font-size:13px;font-weight:800;color:#111827;margin-top:2px;}
    .wday.sel .wl,.wday.sel .wn{color:#fff;}
    .wday .wdot{width:5px;height:5px;border-radius:50%;background:var(--green);margin:5px auto 0;}
    .wday .wdot.off{background:transparent;}
    .wday.sel .wdot{background:#fff;}

    /* Cabecera del día */
    .day-head{margin-bottom:12px;}
    .day-title{font-size:20px;font-weight:800;color:#111827;}
    .today-pill{display:inline-block;font-size:10px;font-weight:800;color:#fff;background:var(--indigo);padding:2px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;vertical-align:middle;margin-left:8px;}
    .day-sub{font-size:13px;color:#6B7280;margin-top:3px;}
    .day-note{margin:12px 0 4px;background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;font-size:13px;border-radius:12px;padding:11px 14px;white-space:pre-wrap;}

    /* Descanso */
    .rest-card{padding:48px 22px;text-align:center;background:#fff;border:1px solid #E5E7EB;border-radius:16px;}
    .rest-card .rest-ico{width:60px;height:60px;border-radius:16px;background:var(--indigo-pale);color:var(--indigo);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
    .rest-card h3{font-size:17px;font-weight:800;color:#111827;}
    .rest-card p{font-size:13.5px;color:#6B7280;margin-top:4px;}

    /* Tarjeta de ejercicio: imagen cuadrada arriba (completa), nombre debajo */
    .exc{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
    .ex-media{width:100%;max-width:360px;margin:0 auto;aspect-ratio:1/1;border-radius:12px;background:#F3F4F6;border:1px solid #EEF0F3;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;text-decoration:none;}
    .ex-media img,.ex-media video{width:100%;height:100%;object-fit:contain;display:block;}
    .ex-media.placeholder{color:#C4C7CF;}
    .ex-media .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
    .ex-media .play svg{filter:drop-shadow(0 2px 5px rgba(0,0,0,.45));}
    .exc-body{padding:14px 4px 2px;}
    .exc-top{display:flex;align-items:center;gap:10px;}
    .exc-num{width:24px;height:24px;border-radius:50%;background:var(--indigo-pale);color:var(--indigo);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .exc-nm{font-size:16px;font-weight:800;color:#111827;flex:1;min-width:0;}
    .exc-dose{font-size:13px;color:#9CA3AF;white-space:nowrap;}
    .exc-dose b{color:var(--indigo);font-weight:800;}
    .exc-meta{font-size:12.5px;color:#9CA3AF;margin:5px 0 0 34px;}
    .exc-notes{font-size:12.5px;color:#6B7280;margin:5px 0 0 34px;}
    .blk-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#9CA3AF;margin:16px 0 8px;display:flex;align-items:center;gap:7px;}
    .blk-lbl.warmup{color:#D97706;}.blk-lbl.superset{color:var(--indigo);}.blk-lbl.circuit{color:var(--green);}

    .empty{padding:44px 22px;text-align:center;color:#6B7280;font-size:14px;background:#fff;border:1px solid #E5E7EB;border-radius:16px;}

    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;}
    .sidebar-overlay.open{display:block;}
    @media(max-width:768px){
      body{overflow:auto;}
      .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);transition:transform .25s;z-index:200;}
      .sidebar.open{transform:translateX(0);}
      .menu-btn{display:flex;align-items:center;justify-content:center;}
      .content{padding:18px 14px 40px;}
      .page-head h1{font-size:22px;}
    }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sl-mark" role="img" aria-label="NutriEntrena"></div>
    <div class="sl-txt"><b><span class="n1">NUTRI</span><span class="n2">ENTRENA</span></b><small>Mi espacio</small></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Principal</div>
    <a class="nav-item" href="client-home.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/></svg>
      Inicio
    </a>
    <div class="nav-section">Mi plan</div>
    <a class="nav-item active" href="client-entrena.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6.5 6.5 17.5 17.5M4 12l-1.5 1.5a2.12 2.12 0 0 0 3 3L7 18M17 6l1-1a2.12 2.12 0 0 1 3 3l-1 1"/><path d="m8 8 8 8"/></svg>
      Entrena
    </a>
    <a class="nav-item" href="client-nutricion.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4Z"/><path d="M6 2v2M10 2v2M14 2v2"/></svg>
      Nutrición
    </a>
    <div class="nav-section">Seguimiento</div>
    <a class="nav-item" href="client-progreso.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></svg>
      Progreso
    </a>
    <div class="nav-section">Comunicación</div>
    <a class="nav-item" href="client-chat.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Chat
    </a>
  </nav>
  <div class="sidebar-user">
    <div class="s-avatar" id="sidebarAvatar">C</div>
    <div class="user-info">
      <div class="user-name" id="sidebarName">Cargando…</div>
      <div class="user-role">Cliente</div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Cerrar sesión">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menú">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-title">Entrena</div>
  </div>

  <div class="content">
    <div class="content-inner">
      <div class="page-head">
        <h1>Tu entrenamiento</h1>
        <p id="todayLabel">Cargando…</p>
      </div>

      <div id="plansWrap" style="display:none;">
        <div class="sec-lbl">Tus planes</div>
        <div class="plans" id="plans"></div>
      </div>

      <div class="weekbar" id="weekbar" style="display:none;"></div>
      <div id="dayPanel"><div class="empty" id="loadingBox">Cargando tus entrenamientos…</div></div>
    </div>
  </div>
</div>

<script>
  const API = 'https://nutrientrena-production.up.railway.app/api';
  const token = localStorage.getItem('token');
  const headers = () => ({ Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' });
  function esc(s){ if(s==null)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function logout(){ localStorage.removeItem('token'); localStorage.removeItem('role_id'); localStorage.removeItem('refresh_token'); location.href = 'login.html'; }
  function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
  function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }

  const DUMBBELL = '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6.5 6.5 17.5 17.5M4 12l-1.5 1.5a2.12 2.12 0 0 0 3 3L7 18M17 6l1-1a2.12 2.12 0 0 1 3 3l-1 1"/><path d="m8 8 8 8"/></svg>';
  const DUMBBELL_LG = '<svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6.5 6.5 17.5 17.5M4 12l-1.5 1.5a2.12 2.12 0 0 0 3 3L7 18M17 6l1-1a2.12 2.12 0 0 1 3 3l-1 1"/><path d="m8 8 8 8"/></svg>';
  const REST_ICO = '<svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>';

  const WD_LABELS = ['L','M','X','J','V','S','D'];
  const WD_NAMES  = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  function todayIndex(){ return (new Date().getDay() + 6) % 7; } // Lunes = 0

  let _routines = [], _sel = 0, _selWd = todayIndex();

  function dayExercises(day){
    var out = [];
    (day.blocks || []).forEach(function(b){ (b.exercises || []).forEach(function(e){ out.push(e); }); });
    return out;
  }
  function dose(e){
    var s = e.series, r = (e.repetitions || '').toString().trim();
    if (s && r) return '<b>' + esc(s) + '</b> × ' + esc(r);
    if (s) return '<b>' + esc(s) + '</b> series';
    if (r) return esc(r);
    return '—';
  }

  // Devuelve el día de la rutina que corresponde al índice de la semana
  // (Lunes=0 → Día 1, Martes=1 → Día 2 … según el ejemplo del cliente).
  function dayForWeekday(r, wd){
    var days = (r && r.days_list) || [];
    return wd < days.length ? days[wd] : null;
  }

  function ytId(url){ var m = String(url).match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{6,})/); return m ? m[1] : null; }
  function vimeoId(url){ var m = String(url).match(/vimeo\.com\/(?:video\/)?(\d+)/); return m ? m[1] : null; }
  var PLAY = '<div class="play"><svg width="34" height="34" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="rgba(17,24,39,.55)"/><path d="M10 8l6 4-6 4z" fill="#fff"/></svg></div>';
  function exMedia(e){
    var v = e.video_url, img = e.image;
    if (v){
      var yt = ytId(v);
      if (yt){
        var thumb = img || ('https://img.youtube.com/vi/' + yt + '/mqdefault.jpg');
        return '<a class="ex-media" href="https://www.youtube.com/watch?v=' + esc(yt) + '" target="_blank" rel="noopener" title="Ver video"><img src="' + esc(thumb) + '" alt="" loading="lazy">' + PLAY + '</a>';
      }
      var vm = vimeoId(v);
      if (vm){
        var inner = img ? '<img src="' + esc(img) + '" alt="" loading="lazy">' : DUMBBELL_LG;
        return '<a class="ex-media' + (img ? '' : ' placeholder') + '" href="https://vimeo.com/' + esc(vm) + '" target="_blank" rel="noopener" title="Ver video">' + inner + PLAY + '</a>';
      }
      // Archivo de video directo (mp4, etc.)
      return '<div class="ex-media"><video src="' + esc(v) + '"' + (img ? ' poster="' + esc(img) + '"' : '') + ' controls playsinline preload="metadata"></video></div>';
    }
    if (img) return '<div class="ex-media"><img src="' + esc(img) + '" alt="" loading="lazy"></div>';
    return '<div class="ex-media placeholder">' + DUMBBELL_LG + '</div>';
  }

  const BLK_LABEL = { warmup:'Calentamiento', superset:'Superserie', circuit:'Circuito' };

  function renderPlans(){
    var wrap = document.getElementById('plansWrap');
    if (_routines.length <= 1) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';
    document.getElementById('plans').innerHTML = _routines.map(function(r, i){
      var focus = [r.objective || r.training, r.days ? (r.days + ' días/semana') : null].filter(Boolean).join(' · ');
      return '<button class="plan' + (i === _sel ? ' sel' : '') + '" onclick="selectPlan(' + i + ')">'
        + '<div class="plan-ico">' + DUMBBELL + '</div>'
        + '<div><div class="plan-nm">' + esc(r.name || 'Plan') + '</div><div class="plan-sub">' + esc(focus || 'Rutina') + '</div></div>'
        + '</button>';
    }).join('');
  }

  function renderWeekbar(){
    var r = _routines[_sel];
    var bar = document.getElementById('weekbar');
    bar.style.display = '';
    var td = todayIndex();
    bar.innerHTML = WD_LABELS.map(function(l, i){
      var hasTraining = !!dayForWeekday(r, i);
      return '<div class="wday' + (i === _selWd ? ' sel' : '') + '" onclick="selectWeekday(' + i + ')">'
        + '<div class="wl">' + l + '</div>'
        + '<div class="wn">' + (i === td ? 'Hoy' : (i + 1)) + '</div>'
        + '<div class="wdot' + (hasTraining ? '' : ' off') + '"></div>'
        + '</div>';
    }).join('');
  }

  function renderDay(){
    var r = _routines[_sel];
    var box = document.getElementById('dayPanel');
    var day = dayForWeekday(r, _selWd);
    var isToday = _selWd === todayIndex();
    var dayLabel = 'Día ' + (_selWd + 1) + ' · ' + WD_NAMES[_selWd];

    if (!day){
      box.innerHTML = '<div class="day-head"><div class="day-title">' + esc(WD_NAMES[_selWd])
        + (isToday ? '<span class="today-pill">Hoy</span>' : '') + '</div></div>'
        + '<div class="rest-card"><div class="rest-ico">' + REST_ICO + '</div>'
        + '<h3>Día de descanso</h3><p>No tienes entrenamiento asignado para este día. Aprovecha para recuperar.</p></div>';
      return;
    }

    var name = (day.day_name || '').trim();
    var dname = /^d[ií]a\s/i.test(name) ? name : (name || dayLabel);
    var exs = dayExercises(day);

    var head = '<div class="day-head"><div class="day-title">' + esc(dname)
      + (isToday ? '<span class="today-pill">Hoy</span>' : '') + '</div>'
      + '<div class="day-sub">' + WD_NAMES[_selWd] + ' · ' + exs.length + ' ejercicio' + (exs.length !== 1 ? 's' : '')
      + (r.time ? ' · ' + r.time + ' min' : '') + '</div></div>';

    var note = day.description ? '<div class="day-note">' + esc(day.description) + '</div>' : '';

    var body = '';
    if (!exs.length){
      body = '<div class="empty">Este día no tiene ejercicios cargados.</div>';
    } else {
      var num = 0;
      (day.blocks || []).forEach(function(blk){
        var bexs = (blk.exercises || []);
        if (blk.block_type === 'text'){
          if (blk.content) body += '<div class="day-note">' + esc(blk.content) + '</div>';
          return;
        }
        if (!bexs.length) return;
        if (blk.block_type && blk.block_type !== 'normal' && BLK_LABEL[blk.block_type]){
          body += '<div class="blk-lbl ' + blk.block_type + '">' + BLK_LABEL[blk.block_type] + '</div>';
        }
        bexs.forEach(function(e){
          num++;
          body += '<div class="exc">' + exMedia(e)
            + '<div class="exc-body"><div class="exc-top">'
            + '<div class="exc-num">' + num + '</div>'
            + '<div class="exc-nm">' + esc(e.training_name || 'Ejercicio') + '</div>'
            + '<div class="exc-dose">' + dose(e) + '</div></div>'
            + (e.muscle_group_name ? '<div class="exc-meta">' + esc(e.muscle_group_name) + '</div>' : '')
            + (e.notes ? '<div class="exc-notes">' + esc(e.notes) + '</div>' : '')
            + '</div></div>';
        });
      });
    }
    box.innerHTML = head + note + body;
  }

  function renderAll(){ renderPlans(); renderWeekbar(); renderDay(); }
  function selectPlan(i){ _sel = i; renderAll(); }
  function selectWeekday(i){ _selWd = i; renderWeekbar(); renderDay(); }

  async function loadProfile(){
    try{
      const r = await fetch(API + '/auth/me', { headers: headers() });
      const d = await r.json(); const u = d.data || d;
      const name = u.name || u.email || 'Cliente';
      document.getElementById('sidebarName').textContent = name;
      const sav = document.getElementById('sidebarAvatar');
      if (u.photo) { sav.innerHTML = '<img src="' + u.photo + '" alt="">'; sav.style.background = 'transparent'; }
      else { sav.textContent = (name.trim()[0] || 'C').toUpperCase(); }
    }catch(e){}
  }
  function setTodayLabel(){
    var now = new Date();
    document.getElementById('todayLabel').textContent =
      WD_NAMES[todayIndex()] + ', ' + now.getDate() + ' de ' + MONTHS[now.getMonth()];
  }

  async function loadRoutines(){
    try{
      const r = await fetch(API + '/client/routines', { headers: headers() });
      const d = await r.json();
      _routines = Array.isArray(d.data) ? d.data : [];
      if (!_routines.length){
        document.getElementById('weekbar').style.display = 'none';
        document.getElementById('dayPanel').innerHTML = '<div class="empty">Tu coach aún no te ha asignado ninguna rutina.</div>';
        return;
      }
      _selWd = todayIndex();
      renderAll();
    }catch(e){
      document.getElementById('dayPanel').innerHTML = '<div class="empty">No se pudieron cargar tus entrenamientos.</div>';
    }
  }
  setTodayLabel(); loadProfile(); loadRoutines();
</script>
<script>
/* CHAT_UNREAD_BADGE — badge rojo de mensajes de chat no leídos en el panel */
(function(){
  var API='https://nutrientrena-production.up.railway.app/api';
  var token=localStorage.getItem('token'); if(!token) return;
  function attach(){
    var link=document.querySelector('a[href="chat.html"], a[href="client-chat.html"]');
    if(!link){ return; }
    var dot=document.createElement('span');
    dot.setAttribute('data-chat-unread','');
    dot.style.cssText='display:none;margin-left:auto;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#DC2626;color:#fff;font-size:10px;font-weight:700;line-height:18px;text-align:center;';
    link.appendChild(dot);
    function refresh(){
      fetch(API+'/chat/unread-count',{headers:{Authorization:'Bearer '+token}})
        .then(function(r){return r.json();})
        .then(function(d){
          var n=(d&&d.data&&d.data.total)||0;
          if(n>0){ dot.style.display='inline-block'; dot.textContent=n>99?'99+':String(n); }
          else { dot.style.display='none'; dot.textContent=''; }
        }).catch(function(){});
    }
    window.refreshChatUnread=refresh;
    refresh();
    setInterval(refresh, 20000);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',attach);
  else attach();
})();
</script>
