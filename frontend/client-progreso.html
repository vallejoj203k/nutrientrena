<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <title>NutriEntrena — Progreso</title>
  <script>
    (function(){ var t=localStorage.getItem('token'),r=localStorage.getItem('role_id')||'';
      if(!t){location.replace('login.html');return;} if(r&&r!=='6'){location.replace('dashboard.html');} })();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--indigo:#4F46E5;--indigo-dark:#4338CA;--indigo-pale:#EEF2FF;--green:#059669;--green-pale:#D1FAE5;--amber:#F59E0B;--red:#DC2626;--gray-bg:#F8FAFC;--sidebar-w:240px;}
    body{font-family:'Space Grotesk','Segoe UI',system-ui,sans-serif;background:var(--gray-bg);display:flex;height:100vh;overflow:hidden;}
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
    .sidebar-logo{display:flex;align-items:center;gap:11px;padding:18px 18px 16px;border-bottom:1px solid #EBEBEB;}
    .sl-mark{width:40px;height:40px;border-radius:9px;background:url('logo.webp') no-repeat 50% 41%;background-size:210px;flex-shrink:0;}
    .sl-txt{display:flex;flex-direction:column;line-height:1.15;}
    .sl-txt b{font-size:17px;font-weight:800;letter-spacing:.3px;}
    .sl-txt b .n1{color:var(--indigo);}.sl-txt b .n2{color:var(--green);}
    .sl-txt small{color:#6B7280;font-size:11px;margin-top:2px;}
    .sidebar-nav{flex:1;padding:12px 0;}
    .nav-section{padding:12px 20px 4px;font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#374151;cursor:pointer;font-size:14px;transition:all .15s;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:#F8FAFC;color:var(--indigo);}
    .nav-item.active{background:#EEF2FF;color:var(--indigo);border-left-color:var(--indigo);font-weight:600;}
    .nav-item svg{flex-shrink:0;opacity:.75;}
    .nav-item.active svg,.nav-item:hover svg{opacity:1;}
    .nav-item.disabled{opacity:.6;cursor:default;}
    .nav-item.disabled:hover{background:none;color:#374151;}
    .nav-soon-tag{margin-left:auto;font-size:9px;font-weight:700;color:#9CA3AF;background:#F3F4F6;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;}
    .sidebar-user{padding:14px 20px;border-top:1px solid #F3F4F6;display:flex;align-items:center;gap:10px;}
    .s-avatar{width:34px;height:34px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0;overflow:hidden;}
    .s-avatar img{width:100%;height:100%;object-fit:cover;}
    .user-info{flex:1;min-width:0;}.user-name{color:#111827;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.user-role{color:#6B7280;font-size:11px;}
    .logout-btn{background:none;border:none;color:#9CA3AF;cursor:pointer;padding:4px;border-radius:4px;display:flex;}
    .logout-btn:hover{color:#EF4444;}

    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    .topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 28px;height:64px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
    .menu-btn{display:none;background:none;border:none;cursor:pointer;color:#374151;padding:6px;border-radius:8px;}
    .menu-btn:hover{background:#F3F4F6;}
    .topbar-title{font-size:17px;font-weight:800;color:#111827;flex:1;}

    .content{flex:1;overflow-y:auto;padding:26px 28px 40px;}
    .content-inner{max-width:720px;margin:0 auto;}
    .page-head{margin-bottom:18px;}
    .page-head h1{font-size:26px;font-weight:800;color:#111827;}
    .page-head p{font-size:14px;color:#6B7280;margin-top:2px;}

    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
    .stat{background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:16px;text-align:center;box-shadow:0 1px 2px rgba(16,24,40,.04);}
    .stat-v{font-size:22px;font-weight:800;}
    .stat-l{font-size:11.5px;color:#9CA3AF;margin-top:2px;}
    .stat.a .stat-v{color:var(--indigo);}.stat.b .stat-v{color:var(--green);}.stat.c .stat-v{color:var(--amber);}

    .card{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
    .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .card-title{font-size:16px;font-weight:800;color:#111827;display:flex;align-items:center;gap:8px;}
    .badge-green{font-size:12px;font-weight:700;color:var(--green);background:var(--green-pale);padding:3px 10px;border-radius:20px;}

    .chart{display:flex;align-items:flex-end;gap:8px;height:120px;margin-bottom:6px;}
    .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
    .bar{width:100%;max-width:44px;border-radius:8px 8px 0 0;background:#DDD6FE;transition:.2s;}
    .bar.now{background:var(--green);}
    .bar-lbl{font-size:11px;color:#9CA3AF;}
    .chart-empty{color:#9CA3AF;font-size:13px;text-align:center;padding:24px 0;}

    .reg-row{display:flex;gap:10px;margin-top:12px;}
    .reg-row input{flex:1;padding:12px 14px;border:1px solid #E5E7EB;border-radius:10px;font-size:15px;color:#111;outline:none;font-family:inherit;background:#F9FAFB;}
    .reg-row input:focus{border-color:var(--indigo);background:#fff;}
    .btn-green{display:inline-flex;align-items:center;gap:6px;padding:12px 18px;border-radius:10px;border:none;background:var(--green);color:#fff;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
    .btn-green:hover{background:#047857;}
    .btn-green:disabled{opacity:.6;cursor:default;}
    .btn-indigo{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;border:none;background:var(--indigo);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
    .btn-indigo:hover{background:var(--indigo-dark);}

    .ptabs{display:flex;gap:2px;background:#F3F4F6;border-radius:10px;padding:3px;margin-bottom:16px;}
    .ptab{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;font-size:13px;font-weight:600;color:#6B7280;cursor:pointer;font-family:inherit;transition:.15s;}
    .ptab.sel{background:#fff;color:#111827;box-shadow:0 1px 2px rgba(0,0,0,.08);}
    .cmp-lbl{text-align:center;font-size:10.5px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;}
    .cmp{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .cmp-col{text-align:center;}
    .cmp-ph{position:relative;aspect-ratio:3/4;border-radius:14px;overflow:hidden;background:#EEF0F3;display:flex;align-items:center;justify-content:center;color:#C7CBD4;}
    .cmp-ph.now{outline:2px solid var(--green);outline-offset:-2px;}
    .cmp-ph img{width:100%;height:100%;object-fit:cover;}
    .cmp-tag{position:absolute;bottom:8px;left:8px;font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);text-align:left;}
    .cmp-cap{font-size:12.5px;font-weight:700;color:#6B7280;margin-top:7px;}
    .cmp-col.now .cmp-cap{color:var(--green);}
    .cmp-summary{margin-top:14px;background:var(--green-pale);color:var(--green);text-align:center;font-size:13.5px;font-weight:700;padding:11px;border-radius:12px;}
    .hist-btn{width:100%;margin-top:12px;padding:12px;border-radius:12px;border:1px solid #E5E7EB;background:#F9FAFB;color:#374151;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;}
    .hist-btn:hover{background:#F3F4F6;}

    .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#1F2937;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:400;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .toast.err{background:#DC2626;}

    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;}
    .sidebar-overlay.open{display:block;}
    @media(max-width:768px){
      body{overflow:auto;}
      .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);transition:transform .25s;z-index:200;}
      .sidebar.open{transform:translateX(0);}
      .menu-btn{display:flex;align-items:center;justify-content:center;}
      .content{padding:18px 14px 40px;}
      .page-head h1{font-size:22px;}
    }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sl-mark" role="img" aria-label="NutriEntrena"></div>
    <div class="sl-txt"><b><span class="n1">NUTRI</span><span class="n2">ENTRENA</span></b><small>Mi espacio</small></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Principal</div>
    <a class="nav-item" href="client-home.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/></svg>Inicio</a>
    <div class="nav-section">Mi plan</div>
    <a class="nav-item" href="client-entrena.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6.5 6.5 17.5 17.5M4 12l-1.5 1.5a2.12 2.12 0 0 0 3 3L7 18M17 6l1-1a2.12 2.12 0 0 1 3 3l-1 1"/><path d="m8 8 8 8"/></svg>Entrena</a>
    <a class="nav-item" href="client-nutricion.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4Z"/><path d="M6 2v2M10 2v2M14 2v2"/></svg>Nutrición</a>
    <div class="nav-section">Seguimiento</div>
    <a class="nav-item active" href="client-progreso.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></svg>Progreso</a>
    <div class="nav-section">Comunicación</div>
    <a class="nav-item" href="client-chat.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</a>
  </nav>
  <div class="sidebar-user">
    <div class="s-avatar" id="sidebarAvatar">C</div>
    <div class="user-info"><div class="user-name" id="sidebarName">Cargando…</div><div class="user-role">Cliente</div></div>
    <button class="logout-btn" onclick="logout()" title="Cerrar sesión"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menú"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="topbar-title">Progreso</div>
  </div>

  <div class="content">
    <div class="content-inner">
      <div class="page-head"><h1>Mi Progreso</h1><p>Tu evolución</p></div>
      <div class="stats" id="stats"></div>

      <div class="card">
        <div class="card-head">
          <div class="card-title">Peso corporal</div>
          <span class="badge-green" id="wDelta" style="display:none;"></span>
        </div>
        <div id="chart"><div class="chart-empty">Aún no hay registros de peso.</div></div>
        <div class="reg-row">
          <input id="wInput" type="number" step="0.1" min="0" placeholder="Tu peso (kg)"/>
          <button class="btn-green" id="wBtn" onclick="registrarPeso()">+ Registrar</button>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <div class="card-title">📸 Fotos de progreso</div>
          <button class="btn-indigo" onclick="pickPhoto()">+ Añadir</button>
          <input type="file" id="photoFile" accept="image/*" style="display:none" onchange="uploadPhoto(this)"/>
        </div>
        <div class="ptabs">
          <button class="ptab sel" id="tab-frontal" onclick="setTab('frontal')">Frontal</button>
          <button class="ptab" id="tab-lateral" onclick="setTab('lateral')">Lateral</button>
          <button class="ptab" id="tab-espalda" onclick="setTab('espalda')">Espalda</button>
        </div>
        <div id="photos"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://nutrientrena-production.up.railway.app/api';
  const token = localStorage.getItem('token');
  const headers = () => ({ Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' });
  function esc(s){ if(s==null)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function logout(){ localStorage.clear(); location.href='login.html'; }
  function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
  function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
  let _tt; function toast(msg,err){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(err?' err':''); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2400); }

  let _data = null, _tab = 'frontal';

  function fmtDate(iso){ try{ const d=new Date(iso+'T00:00:00'); return d.getDate()+' '+['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()]; }catch(e){ return iso; } }

  function renderStats(){
    var s=_data.stats||{};
    document.getElementById('stats').innerHTML =
      '<div class="stat a"><div class="stat-v">'+(s.weeks||0)+'</div><div class="stat-l">semanas</div></div>'
      +'<div class="stat b"><div class="stat-v">'+(s.kg_lost!=null?(s.kg_lost>0?'-':'+')+Math.abs(s.kg_lost)+'kg':'—')+'</div><div class="stat-l">'+(s.kg_lost>0?'perdidos':'cambio')+'</div></div>'
      +'<div class="stat c"><div class="stat-v">'+(s.workouts||0)+'</div><div class="stat-l">entrenos</div></div>';
  }
  function renderChart(){
    var w=_data.weight||{}, series=(w.series||[]).slice(-6);
    var box=document.getElementById('chart');
    var badge=document.getElementById('wDelta');
    if(w.delta!=null){ badge.style.display=''; badge.textContent=(w.delta>0?'+':'')+w.delta+' kg '+(w.delta<0?'↓':(w.delta>0?'↑':'')); }
    else badge.style.display='none';
    if(series.length<2){ box.innerHTML='<div class="chart-empty">Registra tu peso al menos 2 veces para ver la gráfica.</div>'; return; }
    var vals=series.map(function(p){return p.weight;});
    var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals), rng=(mx-mn)||1;
    box.innerHTML='<div class="chart">'+series.map(function(p,i){
      var h=35+((p.weight-mn)/rng)*60; // %
      return '<div class="bar-wrap"><div class="bar'+(i===series.length-1?' now':'')+'" style="height:'+h+'%" title="'+p.weight+' kg"></div><div class="bar-lbl">S'+(i+1)+'</div></div>';
    }).join('')+'</div>';
  }
  function setTab(t){ _tab=t; ['frontal','lateral','espalda'].forEach(function(k){ document.getElementById('tab-'+k).classList.toggle('sel',k===t); }); renderPhotos(); }
  function renderPhotos(){
    var ph=(_data.photos||{})[_tab]||[];
    var box=document.getElementById('photos');
    if(!ph.length){
      box.innerHTML='<div class="cmp-lbl">Inicio vs Ahora</div><div class="cmp">'
        +'<div class="cmp-col"><div class="cmp-ph"><svg width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><div class="cmp-cap">Inicio</div></div>'
        +'<div class="cmp-col now"><div class="cmp-ph"><svg width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><div class="cmp-cap">Ahora</div></div>'
        +'</div><div class="cmp-summary" style="background:#F3F4F6;color:#6B7280;">Aún no tienes fotos ' + _tab + '. Pulsa «+ Añadir».</div>';
      return;
    }
    var start=ph[0], now=ph[ph.length-1];
    function ph_html(p, isNow){
      return '<div class="cmp-col'+(isNow?' now':'')+'"><div class="cmp-ph'+(isNow?' now':'')+'"><img src="'+esc(p.url)+'" alt=""><div class="cmp-tag">'+fmtDate(p.date)+(p.weight!=null?'<br>'+p.weight+' kg':'')+'</div></div><div class="cmp-cap">'+(isNow?'Ahora':'Inicio')+'</div></div>';
    }
    var html='<div class="cmp-lbl">Inicio vs Ahora</div><div class="cmp">'+ph_html(start,false)+ph_html(now,true)+'</div>';
    if(_data.weight && _data.weight.delta!=null && (_data.stats.weeks)){
      html+='<div class="cmp-summary">'+(_data.weight.delta>0?'+':'')+_data.weight.delta+' kg · '+_data.stats.weeks+' semanas</div>';
    }
    html+='<button class="hist-btn" onclick="toast(\'Historial próximamente\')">Ver historial completo ('+((_data.photos||{}).total||ph.length)+' fotos) →</button>';
    box.innerHTML=html;
  }
  function render(){ renderStats(); renderChart(); renderPhotos(); }

  async function registrarPeso(){
    var v=parseFloat(document.getElementById('wInput').value);
    if(!(v>0)){ toast('Indica un peso válido', true); return; }
    var btn=document.getElementById('wBtn'); btn.disabled=true; btn.textContent='Guardando…';
    try{
      const r=await fetch(API+'/client/checkin',{method:'POST',headers:headers(),body:JSON.stringify({weight:v})});
      if(!r.ok) throw new Error();
      document.getElementById('wInput').value='';
      toast('Peso registrado');
      await loadProgress();
    }catch(e){ toast('No se pudo registrar', true); }
    finally{ btn.disabled=false; btn.textContent='+ Registrar'; }
  }
  function pickPhoto(){ document.getElementById('photoFile').click(); }
  async function uploadPhoto(input){
    var file=input.files[0]; if(!file) return;
    toast('Subiendo foto…');
    try{
      var fd=new FormData(); fd.append('file',file); fd.append('folder','progress');
      var up=await fetch(API+'/files/upload',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd});
      var ud=await up.json();
      if(!up.ok||!(ud.data&&ud.data.url)) throw new Error();
      var body={}; body['photo_'+_tab]=ud.data.url;
      var r=await fetch(API+'/client/checkin',{method:'POST',headers:headers(),body:JSON.stringify(body)});
      if(!r.ok) throw new Error();
      toast('Foto añadida');
      await loadProgress();
    }catch(e){ toast('No se pudo subir la foto', true); }
    finally{ input.value=''; }
  }

  async function loadProfile(){
    try{ const r=await fetch(API+'/auth/me',{headers:headers()}); const d=await r.json(); const u=d.data||d;
      const name=u.name||u.email||'Cliente'; document.getElementById('sidebarName').textContent=name;
      const sav=document.getElementById('sidebarAvatar');
      if(u.photo){sav.innerHTML='<img src="'+u.photo+'" alt="">';sav.style.background='transparent';}else{sav.textContent=(name.trim()[0]||'C').toUpperCase();}
    }catch(e){}
  }
  async function loadProgress(){
    try{ const r=await fetch(API+'/client/progress',{headers:headers()}); const d=await r.json(); _data=d.data||{}; render(); }
    catch(e){ document.getElementById('stats').innerHTML='<div class="stat" style="grid-column:1/-1;color:#9CA3AF;">No se pudo cargar tu progreso.</div>'; }
  }
  loadProfile(); loadProgress();
</script>
</body>
</html>
